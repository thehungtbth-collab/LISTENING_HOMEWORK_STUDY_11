:6px 12px; border-radius:6px; font-weight:bold; border:1px solid #cbd5e1; outline:none; cursor:pointer; background:#f8fafc; color:#334155;\\\"></select>\\n        <div class=\\\"timer\\\" id=\\\"timer\\\">--:--</div>\\n        <button class=\\\"game-btn\\\" onclick=\\\"toggleGame()\\\">🎮 Play Vocab Game</button>\\n\\t\\t<button class=\\\"game-btn\\\" onclick=\\\"toggleMifMode()\\\" style=\\\"background:#8b5cf6;color:#fff\\\">🎯 Luyện Mif</button>\\n    </div>\\n    <div class=\\\"progress-container\\\" id=\\\"progressBar\\\"></div>\\n    <div style=\\\"display:flex; align-items:center;\\\">\\n        <button class=\\\"check-btn\\\" id=\\\"saveBtn\\\" onclick=\\\"saveResult()\\\" style=\\\"display:none; background:#f59e0b; margin-right:8px;\\\">SAVE RESULT</button>\\n        <button class=\\\"check-btn\\\" onclick=\\\"check()\\\" id=\\\"submitBtn\\\">SUBMIT</button>\\n    </div>\\n</div>\\n\\n<div id=\\\"reading-view\\\" class=\\\"container\\\">\\n  <div class=\\\"pane left\\\" id=\\\"lp\\\"><h2 style=\\\"font-size:18px; font-weight:700; color:#334155; margin-bottom:15px\\\">Reading Passage</h2><div id=\\\"articleArea\\\"></div></div>\\n  <div class=\\\"resizer\\\" id=\\\"rs\\\"></div>\\n  <div class=\\\"pane right\\\"><h2 style=\\\"font-size:18px; font-weight:700; color:#334155; margin-bottom:15px\\\">Questions</h2><div id=\\\"headingsArea\\\"></div><div id=\\\"qs\\\"></div></div>\\n</div>\\n\\n<div id=\\\"game-view\\\">\\n  <div class=\\\"g-container\\\">\\n    <header class=\\\"g-header\\\">\\n      <h1 class=\\\"g-h1\\\">Vocabulary Matching Game</h1>\\n      <div class=\\\"g-controls\\\">\\n        <div class=\\\"g-badge\\\" id=\\\"score\\\">Đúng: 0 / 0</div>\\n        <button class=\\\"g-btn\\\" id=\\\"shuffleBtn\\\">Trộn</button>\\n        <button class=\\\"g-btn\\\" id=\\\"resetBtn\\\">Làm lại</button>\\n        <button class=\\\"g-btn\\\" style=\\\"background:linear-gradient(90deg,#ef4444,#dc2626);color:#fff\\\" onclick=\\\"toggleGame()\\\">Close Game</button>\\n      </div>\\n    </header>\\n\\n    <section class=\\\"g-card\\\" style=\\\"margin-bottom:12px;\\\">\\n      <h3 style=\\\"margin-top:0; color:var(--accent)\\\">Flashcards Ôn Tập</h3>\\n      <div style=\\\"display:flex; gap:12px; align-items:center; flex-wrap:wrap;\\\">\\n        <div class=\\\"flash-wrap\\\">\\n          <div id=\\\"flashcard\\\" class=\\\"flashcard\\\" tabindex=\\\"0\\\" role=\\\"button\\\" aria-pressed=\\\"false\\\">\\n            <div class=\\\"flash-face front\\\" id=\\\"flashFront\\\">Nhấn Next để bắt đầu</div>\\n            <div class=\\\"flash-face back\\\" id=\\\"flashBack\\\">Back</div>\\n          </div>\\n        </div>\\n        <div style=\\\"display:flex; flex-direction:column; gap:8px;\\\">\\n          <div style=\\\"display:flex; gap:8px;\\\">\\n            <button class=\\\"g-btn\\\" id=\\\"prevCard\\\">Prev</button>\\n            <button class=\\\"g-btn\\\" id=\\\"flipCard\\\">Flip</button>\\n            <button class=\\\"g-btn\\\" id=\\\"nextCard\\\">Next</button>\\n          </div>\\n          <div style=\\\"display:flex; gap:8px;\\\">\\n            <button class=\\\"g-btn\\\" id=\\\"autoPlay\\\">Auto</button>\\n            <button class=\\\"g-btn\\\" id=\\\"showBoth\\\">Show Both</button>\\n          </div>\\n        </div>\\n      </div>\\n      <div class=\\\"small\\\" style=\\\"margin-top:8px; color:var(--muted); font-size:13px\\\">Nhấn flashcard để lật. Auto sẽ tự chuyển sau 2s. Show Both hiển thị cả 2 mặt tạm thời.</div>\\n    </section>\\n\\n    <section class=\\\"g-layout\\\">\\n      <div class=\\\"g-card\\\">\\n        <h3 style=\\\"margin-top:0; color:var(--accent)\\\">Phần 1 Matching</h3>\\n        <div class=\\\"small\\\" style=\\\"color:var(--muted); font-size:13px\\\">Kéo nghĩa vào ô tương ứng. Hoặc chạm để chọn rồi chạm vào ô.</div>\\n        <div class=\\\"g-list\\\" id=\\\"engList\\\" style=\\\"margin-top:12px;\\\"></div>\\n      </div>\\n      <div class=\\\"g-card\\\">\\n        <h3 style=\\\"margin-top:0; color:var(--accent)\\\">Phần 2 Vietnamese</h3>\\n        <div class=\\\"g-vie-list\\\" id=\\\"vieList\\\" style=\\\"margin-top:12px;\\\"></div>\\n      </div>\\n    </section>\\n\\n    <section class=\\\"g-card\\\" style=\\\"margin-top:12px; margin-bottom: 50px;\\\">\\n      <h3 style=\\\"margin-top:0; color:var(--accent)\\\">Bài Điền Chữ</h3>\\n      <div class=\\\"small\\\" style=\\\"color:var(--muted); font-size:13px\\\">Bên trái là tiếng Việt, bên phải học sinh điền tiếng Anh. Nhấn Kiểm tra để chấm.</div>\\n      <div style=\\\"margin-top:10px;\\\">\\n        <div class=\\\"fill-list\\\" id=\\\"fillList\\\"></div>\\n        <div style=\\\"margin-top:10px; display:flex; gap:8px; align-items:center;\\\">\\n          <button class=\\\"g-btn\\\" id=\\\"checkFill\\\">Kiểm tra</button>\\n          <button class=\\\"g-btn\\\" id=\\\"showAnswers\\\">Hiện đáp án</button>\\n          <button class=\\\"g-btn\\\" id=\\\"resetFill\\\">Làm lại</button>\\n          <div class=\\\"small\\\" id=\\\"fillScore\\\" style=\\\"align-self:center; color:var(--muted); font-size:13px\\\">Điểm: 0 / 0</div>\\n        </div>\\n      </div>\\n    </section>\\n  </div>\\n</div>\\n\\n<div id=\\\"mif-view\\\">\\n  <div class=\\\"mif-header\\\">\\n    <h2 id=\\\"mif-title\\\" style=\\\"margin:0;color:#4338ca;font-size:18px\\\">Luyện Mif: Đoạn ...</h2>\\n    <button class=\\\"mif-nav-btn\\\" style=\\\"background:#ef4444\\\" onclick=\\\"toggleMifMode()\\\">Đóng</button>\\n  </div>\\n  <div class=\\\"mif-body\\\">\\n    <div class=\\\"mif-left\\\">\\n      <div class=\\\"mif-col-container\\\">\\n        <div class=\\\"mif-col\\\" id=\\\"mif-en-col\\\"></div>\\n        <div class=\\\"mif-col\\\" id=\\\"mif-vi-col\\\"></div>\\n      </div>\\n    </div>\\n    <div class=\\\"mif-right\\\">\\n      <div id=\\\"mif-qs-container\\\" style=\\\"flex:1; overflow-y:auto; padding-bottom:20px;\\\"></div>\\n      <div style=\\\"display:flex; justify-content:space-between; border-top:2px solid #cbd5e1; padding-top:15px; margin-top:10px;\\\">\\n        <button class=\\\"mif-nav-btn\\\" id=\\\"mif-prev\\\" onclick=\\\"navMif(-1)\\\">⬅ Back</button>\\n        <button class=\\\"mif-nav-btn\\\" id=\\\"mif-next\\\" onclick=\\\"navMif(1)\\\">Next ➡</button>\\n      </div>\\n    </div>\\n  </div>\\n</div>\\n\\n<div id=\\\"popup\\\"></div>\\n<div class=\\\"confetti\\\" id=\\\"confetti\\\"></div>\\n\\n<script>\\n// --- MULTI-LESSON DATA INJECTION ---\\nconst lessonsData = [{\\\"name\\\":\\\"Passage 1\\\",\\\"articleHtml\\\":\\\"\\\\u003cdiv class=\\\\\\\"reading-content\\\\\\\">\\\\u003cdiv class=\\\\\\\"para-box\\\\\\\">\\\\u003cdiv class=\\\\\\\"para-header-row\\\\\\\">\\\\u003cdiv class=\\\\\\\"para-header\\\\\\\">Paragraph A\\\\u003c/div>\\\\u003c/div>\\\\u003cp class=\\\\\\\"en-text\\\\\\\">\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p0s0\\\\\\\">We all think we can \\\\u003cspan class=\\\\\\\"vocab\\\\\\\" data-vid=\\\\\\\"v0\\\\\\\">break\\\\u003c/span> our bad habits - but they can stay with us for life \\\\u003c/span>\\\\u003c/p>\\\\u003cbutton class=\\\\\\\"trans-btn\\\\\\\" onclick=\\\\\\\"toggleTrans('t0')\\\\\\\">Show Translation\\\\u003c/button>\\\\u003cdiv id=\\\\\\\"t0\\\\\\\" class=\\\\\\\"vi-text hidden\\\\\\\">\\\\u003cspan id=\\\\\\\"p0s0\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Tất cả chúng ta đều nghĩ rằng mình có thể từ bỏ những thói quen xấu - nhưng chúng có thể theo chúng ta suốt đời \\\\u003c/span>\\\\u003c/div>\\\\u003c/div>\\\\u003cdiv class=\\\\\\\"para-box\\\\\\\">\\\\u003cdiv class=\\\\\\\"para-header-row\\\\\\\">\\\\u003cdiv class=\\\\\\\"para-header\\\\\\\">Paragraph B\\\\u003c/div>\\\\u003c/div>\\\\u003cp class=\\\\\\\"en-text\\\\\\\">\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p1s0\\\\\\\">What is a bad habit? \\\\u003c/span>\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p1s1\\\\\\\">The most common \\\\u003cspan class=\\\\\\\"vocab\\\\\\\" data-vid=\\\\\\\"v1\\\\\\\">definition\\\\u003c/span> is that it is something that we do regularly, almost without thinking about it, and which has some sort of \\\\u003cspan class=\\\\\\\"vocab\\\\\\\" data-vid=\\\\\\\"v2\\\\\\\">negative consequence\\\\u003c/span>. \\\\u003c/span>\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p1s2\\\\\\\">This consequence could affect those around us, or it could affect us personally. \\\\u003c/span>\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p1s3\\\\\\\">Those who deny having bad habits are probably lying. \\\\u003c/span>\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p1s4\\\\\\\">Bad habits are part of what makes us human. \\\\u003c/span>\\\\u003c/p>\\\\u003cbutton class=\\\\\\\"trans-btn\\\\\\\" onclick=\\\\\\\"toggleTrans('t1')\\\\\\\">Show Translation\\\\u003c/button>\\\\u003cdiv id=\\\\\\\"t1\\\\\\\" class=\\\\\\\"vi-text hidden\\\\\\\">\\\\u003cspan id=\\\\\\\"p1s0\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Thói quen xấu là gì? \\\\u003c/span>\\\\u003cspan id=\\\\\\\"p1s1\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Định nghĩa phổ biến nhất là đó là việc chúng ta làm thường xuyên, hầu như không nghĩ đến nó và có một số hậu quả tiêu cực. \\\\u003c/span>\\\\u003cspan id=\\\\\\\"p1s2\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Hậu quả này có thể ảnh hưởng đến những người xung quanh hoặc có thể ảnh hưởng đến cá nhân chúng ta. \\\\u003c/span>\\\\u003cspan id=\\\\\\\"p1s3\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Những người phủ nhận có những thói quen xấu có lẽ đang nói dối. \\\\u003c/span>\\\\u003cspan id=\\\\\\\"p1s4\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Những thói quen xấu là một phần tạo nên con người chúng ta. \\\\u003c/span>\\\\u003c/div>\\\\u003c/div>\\\\u003cdiv class=\\\\\\\"para-box\\\\\\\">\\\\u003cdiv class=\\\\\\\"para-header-row\\\\\\\">\\\\u003cdiv class=\\\\\\\"para-header\\\\\\\">Paragraph C\\\\u003c/div>\\\\u003c/div>\\\\u003cp class=\\\\\\\"en-text\\\\\\\">\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p2s0\\\\\\\">Many early habits, like sucking our thumb, are broken when we are very young. \\\\u003c/span>\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p2s1\\\\\\\">We are either told to stop doing it by our parents, or we \\\\u003cspan class=\\\\\\\"vocab\\\\\\\" data-vid=\\\\\\\"v3\\\\\\\">consciously\\\\u003c/span> or \\\\u003cspan class=\\\\\\\"vocab\\\\\\\" data-vid=\\\\\\\"v4\\\\\\\">subconsciously\\\\u003c/span> observe that others do not have the same habit, and we gradually grow out of it. \\\\u003c/span>\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p2s2\\\\\\\">It is when we intentionally or unintentionally pick up new habits in our later childhood or early adulthood that it becomes a problem. \\\\u003c/span>\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p2s3\\\\\\\">Unless we can \\\\u003cspan class=\\\\\\\"vocab\\\\\\\" data-vid=\\\\\\\"v0\\\\\\\">break\\\\u003c/span> that habit early on, it becomes a part of our life, and becomes ‘programmed' into our brain. \\\\u003c/span>\\\\u003c/p>\\\\u003cbutton class=\\\\\\\"trans-btn\\\\\\\" onclick=\\\\\\\"toggleTrans('t2')\\\\\\\">Show Translation\\\\u003c/button>\\\\u003cdiv id=\\\\\\\"t2\\\\\\\" class=\\\\\\\"vi-text hidden\\\\\\\">\\\\u003cspan id=\\\\\\\"p2s0\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Nhiều thói quen ban đầu, như mút ngón tay cái, bị bỏ khi chúng ta còn rất nhỏ. \\\\u003c/span>\\\\u003cspan id=\\\\\\\"p2s1\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Chúng ta hoặc được cha mẹ yêu cầu ngừng làm việc đó, hoặc chúng ta quan sát một cách có ý thức hoặc tiềm thức rằng những người khác không có thói quen tương tự và chúng ta dần dần bỏ thói quen đó. \\\\u003c/span>\\\\u003cspan id=\\\\\\\"p2s2\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Khi chúng ta cố tình hoặc vô tình hình thành những thói quen mới trong thời thơ ấu hoặc tuổi trưởng thành thì điều đó sẽ trở thành một vấn đề. \\\\u003c/span>\\\\u003cspan id=\\\\\\\"p2s3\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Trừ khi chúng ta có thể từ bỏ thói quen đó sớm, nếu không nó sẽ trở thành một phần cuộc sống và được “lập trình” trong não chúng ta. \\\\u003c/span>\\\\u003c/div>\\\\u003c/div>\\\\u003cdiv class=\\\\\\\"para-box\\\\\\\">\\\\u003cdiv class=\\\\\\\"para-header-row\\\\\\\">\\\\u003cdiv class=\\\\\\\"para-header\\\\\\\">Paragraph D\\\\u003c/div>\\\\u003c/div>\\\\u003cp class=\\\\\\\"en-text\\\\\\\">\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p3s0\\\\\\\">A recent study of human memory suggests that no matter how hard we try to change our habits, it is the old ways that tend to win, especially in situations where we are \\\\u003cspan class=\\\\\\\"vocab\\\\\\\" data-vid=\\\\\\\"v5\\\\\\\">rushed\\\\u003c/span>, stressed or \\\\u003cspan class=\\\\\\\"vocab\\\\\\\" data-vid=\\\\\\\"v6\\\\\\\">overworked\\\\u003c/span>. \\\\u003c/span>\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p3s1\\\\\\\">Habits that we thought we had got rid of can suddenly come back. \\\\u003c/span>\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p3s2\\\\\\\">During the study programme, the researchers showed a group of \\\\u003cspan class=\\\\\\\"vocab\\\\\\\" data-vid=\\\\\\\"v7\\\\\\\">volunteers\\\\u003c/span> several pictures, and gave them words to associate with them (for example, see a picture of tea, and associate it with 'breakfast'). \\\\u003c/span>\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p3s3\\\\\\\">They then showed the \\\\u003cspan class=\\\\\\\"vocab\\\\\\\" data-vid=\\\\\\\"v7\\\\\\\">volunteers\\\\u003c/span> the same pictures again, and gave them new words to associate with them (see a picture of tea, and say 'afternoon'). \\\\u003c/span>\\\\u003c/p>\\\\u003cbutton class=\\\\\\\"trans-btn\\\\\\\" onclick=\\\\\\\"toggleTrans('t3')\\\\\\\">Show Translation\\\\u003c/button>\\\\u003cdiv id=\\\\\\\"t3\\\\\\\" class=\\\\\\\"vi-text hidden\\\\\\\">\\\\u003cspan id=\\\\\\\"p3s0\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Một nghiên cứu gần đây về trí nhớ con người cho thấy rằng dù chúng ta có cố gắng thay đổi thói quen của mình đến mức nào thì những cách làm cũ vẫn có xu hướng giành chiến thắng, đặc biệt là trong những tình huống chúng ta vội vã, căng thẳng hoặc làm việc quá sức. \\\\u003c/span>\\\\u003cspan id=\\\\\\\"p3s1\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Những thói quen mà chúng ta tưởng đã bỏ được có thể bất ngờ quay trở lại. \\\\u003c/span>\\\\u003cspan id=\\\\\\\"p3s2\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Trong chương trình nghiên cứu, các nhà nghiên cứu đã cho một nhóm tình nguyện viên xem một số bức tranh và cho họ những từ để liên tưởng đến chúng (ví dụ: xem một bức ảnh về trà và liên tưởng nó với 'bữa sáng'). \\\\u003c/span>\\\\u003cspan id=\\\\\\\"p3s3\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Sau đó, họ cho các tình nguyện viên xem lại những bức tranh tương tự và đưa cho họ những từ mới để liên tưởng đến chúng (xem bức tranh về trà và nói 'buổi chiều'). \\\\u003c/span>\\\\u003c/div>\\\\u003c/div>\\\\u003cdiv class=\\\\\\\"para-box\\\\\\\">\\\\u003cdiv class=\\\\\\\"para-header-row\\\\\\\">\\\\u003cdiv class=\\\\\\\"para-header\\\\\\\">Paragraph E\\\\u003c/div>\\\\u003c/div>\\\\u003cp class=\\\\\\\"en-text\\\\\\\">\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p4s0\\\\\\\">A few days later, the \\\\u003cspan class=\\\\\\\"vocab\\\\\\\" data-vid=\\\\\\\"v7\\\\\\\">volunteers\\\\u003c/span> were given a test. \\\\u003c/span>\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p4s1\\\\\\\">The researchers showed them the pictures, and told them to respond with one of the words they had been given for each one. \\\\u003c/span>\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p4s2\\\\\\\">It \\\\u003cspan class=\\\\\\\"vocab\\\\\\\" data-vid=\\\\\\\"v8\\\\\\\">came as no surprise\\\\u003c/span> that their answers were split between the first set of words and the second. \\\\u003c/span>\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p4s3\\\\\\\">Two weeks later, they were given the same test again. \\\\u003c/span>\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p4s4\\\\\\\">This time, most of them only gave the first set of words. \\\\u003c/span>\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p4s5\\\\\\\">They appeared to have completely forgotten the second set. \\\\u003c/span>\\\\u003c/p>\\\\u003cbutton class=\\\\\\\"trans-btn\\\\\\\" onclick=\\\\\\\"toggleTrans('t4')\\\\\\\">Show Translation\\\\u003c/button>\\\\u003cdiv id=\\\\\\\"t4\\\\\\\" class=\\\\\\\"vi-text hidden\\\\\\\">\\\\u003cspan id=\\\\\\\"p4s0\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Vài ngày sau, các tình nguyện viên được làm một bài kiểm tra. \\\\u003c/span>\\\\u003cspan id=\\\\\\\"p4s1\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Các nhà nghiên cứu cho họ xem những bức tranh và yêu cầu họ trả lời bằng một trong những từ mà họ được giao cho mỗi bức tranh. \\\\u003c/span>\\\\u003cspan id=\\\\\\\"p4s2\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Không có gì ngạc nhiên khi câu trả lời của họ được chia thành nhóm từ đầu tiên và nhóm từ thứ hai. \\\\u003c/span>\\\\u003cspan id=\\\\\\\"p4s3\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Hai tuần sau, họ lại được làm bài kiểm tra tương tự. \\\\u003c/span>\\\\u003cspan id=\\\\\\\"p4s4\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Lần này đa số chỉ đưa ra cụm từ đầu tiên. \\\\u003c/span>\\\\u003cspan id=\\\\\\\"p4s5\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Họ dường như đã hoàn toàn quên mất set thứ hai. \\\\u003c/span>\\\\u003c/div>\\\\u003c/div>\\\\u003cdiv class=\\\\\\\"para-box\\\\\\\">\\\\u003cdiv class=\\\\\\\"para-header-row\\\\\\\">\\\\u003cdiv class=\\\\\\\"para-header\\\\\\\">Paragraph F\\\\u003c/div>\\\\u003c/div>\\\\u003cp class=\\\\\\\"en-text\\\\\\\">\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p5s0\\\\\\\">The study confirms that the \\\\u003cspan class=\\\\\\\"vocab\\\\\\\" data-vid=\\\\\\\"v9\\\\\\\">responses\\\\u003c/span> we learn first are those that remain strongest over time. \\\\u003c/span>\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p5s1\\\\\\\">We may try to change our ways, but after a while, the response that comes to mind first is usually the first one we learned. \\\\u003c/span>\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p5s2\\\\\\\">The more that response is used, the more \\\\u003cspan class=\\\\\\\"vocab\\\\\\\" data-vid=\\\\\\\"v10\\\\\\\">automatic\\\\u003c/span> it becomes and the harder it becomes to respond in any other way. \\\\u003c/span>\\\\u003c/p>\\\\u003cbutton class=\\\\\\\"trans-btn\\\\\\\" onclick=\\\\\\\"toggleTrans('t5')\\\\\\\">Show Translation\\\\u003c/button>\\\\u003cdiv id=\\\\\\\"t5\\\\\\\" class=\\\\\\\"vi-text hidden\\\\\\\">\\\\u003cspan id=\\\\\\\"p5s0\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Nghiên cứu xác nhận rằng những phản ứng mà chúng ta học được đầu tiên là những phản ứng mạnh mẽ nhất theo thời gian. \\\\u003c/span>\\\\u003cspan id=\\\\\\\"p5s1\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Chúng ta có thể cố gắng thay đổi cách làm của mình, nhưng sau một thời gian, phản ứng hiện lên trong đầu thường là điều đầu tiên chúng ta học được. \\\\u003c/span>\\\\u003cspan id=\\\\\\\"p5s2\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Phản hồi đó càng được sử dụng nhiều thì nó càng trở nên tự động hơn và càng khó phản hồi theo bất kỳ cách nào khác. \\\\u003c/span>\\\\u003c/div>\\\\u003c/div>\\\\u003cdiv class=\\\\\\\"para-box\\\\\\\">\\\\u003cdiv class=\\\\\\\"para-header-row\\\\\\\">\\\\u003cdiv class=\\\\\\\"para-header\\\\\\\">Paragraph G\\\\u003c/div>\\\\u003c/div>\\\\u003cp class=\\\\\\\"en-text\\\\\\\">\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p6s0\\\\\\\">The study therefore suggests that over time, our bad habits also become \\\\u003cspan class=\\\\\\\"vocab\\\\\\\" data-vid=\\\\\\\"v10\\\\\\\">automatic\\\\u003c/span>, learned behaviour. \\\\u003c/span>\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p6s1\\\\\\\">This is not good news for people who \\\\u003cspan class=\\\\\\\"vocab\\\\\\\" data-vid=\\\\\\\"v11\\\\\\\">picked up\\\\u003c/span> bad habits early in life and now want to change or \\\\u003cspan class=\\\\\\\"vocab\\\\\\\" data-vid=\\\\\\\"v0\\\\\\\">break\\\\u003c/span> them. \\\\u003c/span>\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p6s2\\\\\\\">Even when we try to put new, good intentions into practice, those previously learned habits remain stronger in more \\\\u003cspan class=\\\\\\\"vocab\\\\\\\" data-vid=\\\\\\\"v10\\\\\\\">automatic\\\\u003c/span>, \\\\u003cspan class=\\\\\\\"vocab\\\\\\\" data-vid=\\\\\\\"v12\\\\\\\">unconscious\\\\u003c/span> forms of memory. \\\\u003c/span>\\\\u003c/p>\\\\u003cbutton class=\\\\\\\"trans-btn\\\\\\\" onclick=\\\\\\\"toggleTrans('t6')\\\\\\\">Show Translation\\\\u003c/button>\\\\u003cdiv id=\\\\\\\"t6\\\\\\\" class=\\\\\\\"vi-text hidden\\\\\\\">\\\\u003cspan id=\\\\\\\"p6s0\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Do đó, nghiên cứu cho thấy rằng theo thời gian, những thói quen xấu của chúng ta cũng trở thành hành vi tự động được học hỏi. \\\\u003c/span>\\\\u003cspan id=\\\\\\\"p6s1\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Đây không phải là tin tốt cho những người đã sớm hình thành thói quen xấu và hiện muốn thay đổi hoặc từ bỏ chúng. \\\\u003c/span>\\\\u003cspan id=\\\\\\\"p6s2\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Ngay cả khi chúng ta cố gắng thực hành những ý định tốt mới, những thói quen đã học trước đó vẫn mạnh mẽ hơn ở dạng trí nhớ vô thức, tự động hơn. \\\\u003c/span>\\\\u003c/div>\\\\u003c/div>\\\\u003c/div>\\\",\\\"headingsHtml\\\":\\\"\\\",\\\"qs\\\":[{\\\"id\\\":1,\\\"type\\\":\\\"ynng\\\",\\\"text\\\":\\\"We usually develop bad habits when we are very young. \\\",\\\"options\\\":[],\\\"correctAnswer\\\":\\\"NOT GIVEN\\\",\\\"location\\\":\\\"we intentionally or unintentionally pick up new habits in our later childhood or early adulthood that it becomes a problem\\\",\\\"explanation\\\":\\\"o\\\\tPhân tích: Bài đọc có nói về các thói quen sớm (early habits) khi còn nhỏ nhưng thường bị phá vỡ sớm (như mút tay). Tuy nhiên, bài đọc không khẳng định chúng ta \\\\\\\"thường xuyên\\\\\\\" phát triển các thói quen xấu (bad habits) ngay từ khi còn rất nhỏ; thay vào đó, nó nhấn mạnh vấn đề thường nảy sinh ở giai đoạn cuối tuổi thơ hoặc đầu tuổi trưởng thành.\\\\no\\\\tKết luận: Tác giả không đưa ra khẳng định chung về thời điểm \\\\\\\"thường xuyên\\\\\\\" nhất để hình thành thói quen xấu.\\\",\\\"_orderId\\\":1},{\\\"id\\\":2,\\\"type\\\":\\\"ynng\\\",\\\"text\\\":\\\"We can only break bad habits if people tell us to do so. \\\",\\\"options\\\":[],\\\"correctAnswer\\\":\\\"NO\\\",\\\"location\\\":\\\"We are either told to stop doing it by our parents, or we consciously or subconsciously observe that others do not have the same habit, and we gradually grow out of it\\\",\\\"explanation\\\":\\\"o\\\\tPhân tích: Đề bài nói chúng ta \\\\\\\"chỉ có thể\\\\\\\" (only) bỏ thói quen xấu nếu được người khác nhắc nhở. Thực tế bài đọc đưa ra hai cách: một là được nhắc nhở, hai là tự quan sát một cách có ý thức hoặc vô thức để thay đổi.\\\\no\\\\tKết luận: Thông tin trái ngược hoàn toàn (từ \\\\\\\"only\\\\\\\" làm câu sai).\\\",\\\"_orderId\\\":2},{\\\"id\\\":3,\\\"type\\\":\\\"ynng\\\",\\\"text\\\":\\\"Bad habits may return when we are under pressure. \\\",\\\"options\\\":[],\\\"correctAnswer\\\":\\\"YES\\\",\\\"location\\\":\\\"it is the old ways that tend to win, especially in situations where we are rushed\\\",\\\"explanation\\\":\\\"o\\\\tPhân tích: Bài đọc xác nhận những thói quen cũ (thường là thói quen xấu) có xu hướng trỗi dậy khi chúng ta vội vã, căng thẳng (stressed) hoặc làm việc quá sức. \\\\\\\"Under pressure\\\\\\\" đồng nghĩa với \\\\\\\"rushed, stressed or overworked\\\\\\\".\\\\no\\\\tKết luận: Thông tin trùng khớp.\\\",\\\"_orderId\\\":3},{\\\"id\\\":4,\\\"type\\\":\\\"ynng\\\",\\\"text\\\":\\\"Researchers were surprised by the answers that the volunteers gave in the first test. \\\",\\\"options\\\":[],\\\"correctAnswer\\\":\\\"NO\\\",\\\"location\\\":\\\"It came as no surprise that their answers were split between the first set of words and the second\\\",\\\"explanation\\\":\\\"o\\\\tPhân tích: Đề bài nói các nhà nghiên cứu \\\\\\\"ngạc nhiên\\\\\\\" (surprised). Bài đọc khẳng định việc kết quả bị chia đôi giữa hai nhóm từ là \\\\\\\"không có gì ngạc nhiên\\\\\\\" (no surprise).\\\\no\\\\tKết luận: Thông tin trái ngược hoàn toàn.\\\",\\\"_orderId\\\":4},{\\\"id\\\":5,\\\"type\\\":\\\"ynng\\\",\\\"text\\\":\\\"The volunteers found the test more difficult when they did it the second time. \\\",\\\"options\\\":[],\\\"correctAnswer\\\":\\\"NOT GIVEN\\\",\\\"location\\\":\\\"Two weeks later, they were given the same test again. This time, most of them only gave the first set of words\\\",\\\"explanation\\\":\\\"o\\\\tPhân tích: Bài đọc mô tả kết quả của bài kiểm tra lần thứ hai (hầu hết quên bộ từ thứ hai). Tuy nhiên, không có thông tin nào mô tả cảm nhận của tình nguyện viên về việc bài thi có \\\\\\\"khó hơn\\\\\\\" (more difficult) hay không.\\\\no\\\\tKết luận: Thông tin không có trong bài.\\\",\\\"_orderId\\\":5},{\\\"id\\\":6,\\\"type\\\":\\\"ynng\\\",\\\"text\\\":\\\"People find it more difficult to remember things they learnt when they were young. \\\",\\\"options\\\":[],\\\"correctAnswer\\\":\\\"NO\\\",\\\"location\\\":\\\"The study confirms that the responses we learn first are those that remain strongest over time\\\",\\\"explanation\\\":\\\"o\\\\tPhân tích: Đề bài nói mọi người thấy \\\\\\\"khó nhớ\\\\\\\" những gì học khi còn trẻ. Ngược lại, bài đọc khẳng định những gì được học đầu tiên (thường là khi trẻ) lại là những thứ tồn tại mạnh mẽ nhất theo thời gian.\\\\no\\\\tKết luận: Thông tin trái ngược hoàn toàn.\\\",\\\"_orderId\\\":6},{\\\"id\\\":7,\\\"type\\\":\\\"ynng\\\",\\\"text\\\":\\\"If we develop bad habits early in life, they are harder to get rid of.\\\",\\\"options\\\":[],\\\"correctAnswer\\\":\\\"YES\\\",\\\"location\\\":\\\"This is not good news for people who picked up bad habits early in life and now want to change or break them\\\",\\\"explanation\\\":\\\"o\\\\tPhân tích: Bài đọc nêu rõ những thói quen hình thành sớm và được sử dụng nhiều sẽ trở nên tự động và rất khó để thay đổi hoặc phản ứng theo cách khác.\\\\no\\\\tKết luận: Thông tin trùng khớp.\\\",\\\"_orderId\\\":7}],\\\"vocab\\\":[{\\\"id\\\":\\\"v0\\\",\\\"word\\\":\\\"break\\\",\\\"meaning\\\":\\\"phá vỡ, nghỉ (pause, interrupt)\\\",\\\"synonym\\\":\\\"Take a short break from work. (Hãy nghỉ ngắn khỏi công việc.)\\\",\\\"example\\\":\\\"/breɪk/\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"id\\\":\\\"v1\\\",\\\"word\\\":\\\"definition\\\",\\\"meaning\\\":\\\"định nghĩa (meaning, explanation)\\\",\\\"synonym\\\":\\\"The dictionary gives the definition of the word. (Từ điển đưa ra định nghĩa của từ.)\\\",\\\"example\\\":\\\"/ˌdɛfəˈnɪʃən/\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"id\\\":\\\"v2\\\",\\\"word\\\":\\\"negative consequence\\\",\\\"meaning\\\":\\\"hậu quả tiêu cực (harmful result, drawback)\\\",\\\"synonym\\\":\\\"Smoking has negative consequences. (Hút thuốc có hậu quả tiêu cực.)\\\",\\\"example\\\":\\\"/ˈnɛɡətɪv ˈkɒnsɪkwəns/\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"id\\\":\\\"v3\\\",\\\"word\\\":\\\"consciously\\\",\\\"meaning\\\":\\\"một cách có ý thức (deliberately, intentionally)\\\",\\\"synonym\\\":\\\"He consciously avoided the mistake. (Anh ấy có ý thức tránh sai lầm.)\\\",\\\"example\\\":\\\"/ˈkɑːnʃəsli/\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"id\\\":\\\"v4\\\",\\\"word\\\":\\\"subconsciously\\\",\\\"meaning\\\":\\\"một cách vô thức (unintentionally, automatically)\\\",\\\"synonym\\\":\\\"She subconsciously smiled. (Cô ấy vô thức mỉm cười.)\\\",\\\"example\\\":\\\"/ˌsʌbˈkɑːnʃəsli/\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"id\\\":\\\"v5\\\",\\\"word\\\":\\\"rushed\\\",\\\"meaning\\\":\\\"vội vã (hurried, hasty)\\\",\\\"synonym\\\":\\\"He rushed to finish the work. (Anh ấy vội vã hoàn thành công việc.)\\\",\\\"example\\\":\\\"/rʌʃt/\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"id\\\":\\\"v6\\\",\\\"word\\\":\\\"overworked\\\",\\\"meaning\\\":\\\"làm việc quá sức (exhausted, overloaded)\\\",\\\"synonym\\\":\\\"She felt overworked after long hours. (Cô ấy cảm thấy làm việc quá sức sau nhiều giờ.)\\\",\\\"example\\\":\\\"/ˌoʊvərˈwɜːrkt/\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"id\\\":\\\"v7\\\",\\\"word\\\":\\\"volunteers\\\",\\\"meaning\\\":\\\"tình nguyện viên (helpers, contributors)\\\",\\\"synonym\\\":\\\"Many volunteers joined the project. (Nhiều tình nguyện viên tham gia dự án.)\\\",\\\"example\\\":\\\"/ˌvɑːlənˈtɪrz/\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"id\\\":\\\"v8\\\",\\\"word\\\":\\\"came as no surprise\\\",\\\"meaning\\\":\\\"không có gì ngạc nhiên (expected, predictable)\\\",\\\"synonym\\\":\\\"His success came as no surprise. (Thành công của anh ấy không có gì ngạc nhiên.)\\\",\\\"example\\\":\\\"/keɪm æz noʊ səˈpraɪz/\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"id\\\":\\\"v9\\\",\\\"word\\\":\\\"responses\\\",\\\"meaning\\\":\\\"phản ứng, câu trả lời (answers, reactions)\\\",\\\"synonym\\\":\\\"The teacher received many responses. (Giáo viên nhận được nhiều phản hồi.)\\\",\\\"example\\\":\\\"/rɪˈspɑːnsɪz/\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"id\\\":\\\"v10\\\",\\\"word\\\":\\\"automatic\\\",\\\"meaning\\\":\\\"tự động (mechanical, instinctive)\\\",\\\"synonym\\\":\\\"The door opens automatic. (Cánh cửa mở tự động.)\\\",\\\"example\\\":\\\"/ˌɔːtəˈmætɪk/\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"id\\\":\\\"v11\\\",\\\"word\\\":\\\"picked up\\\",\\\"meaning\\\":\\\"nhặt lên, học được (collected, learned)\\\",\\\"synonym\\\":\\\"He picked up new skills quickly. (Anh ấy học được kỹ năng mới nhanh chóng.)\\\",\\\"example\\\":\\\"/pɪkt ʌp/\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"id\\\":\\\"v12\\\",\\\"word\\\":\\\"unconscious\\\",\\\"meaning\\\":\\\"bất tỉnh, vô thức (insensible, unaware)\\\",\\\"synonym\\\":\\\"He was knocked unconscious. (Anh ấy bị đánh bất tỉnh.)\\\",\\\"example\\\":\\\"/ʌnˈkɑːnʃəs/\\\",\\\"phonetic\\\":\\\"\\\"}],\\\"headings\\\":[],\\\"headingKey\\\":{},\\\"mifRange\\\":\\\"\\\",\\\"removeOpt\\\":false,\\\"removeFeatureOpt\\\":false,\\\"pairs\\\":[{\\\"eng\\\":\\\"break\\\",\\\"vie\\\":\\\"phá vỡ, nghỉ (pause, interrupt)\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"eng\\\":\\\"definition\\\",\\\"vie\\\":\\\"định nghĩa (meaning, explanation)\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"eng\\\":\\\"negative consequence\\\",\\\"vie\\\":\\\"hậu quả tiêu cực (harmful result, drawback)\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"eng\\\":\\\"consciously\\\",\\\"vie\\\":\\\"một cách có ý thức (deliberately, intentionally)\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"eng\\\":\\\"subconsciously\\\",\\\"vie\\\":\\\"một cách vô thức (unintentionally, automatically)\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"eng\\\":\\\"rushed\\\",\\\"vie\\\":\\\"vội vã (hurried, hasty)\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"eng\\\":\\\"overworked\\\",\\\"vie\\\":\\\"làm việc quá sức (exhausted, overloaded)\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"eng\\\":\\\"volunteers\\\",\\\"vie\\\":\\\"tình nguyện viên (helpers, contributors)\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"eng\\\":\\\"came as no surprise\\\",\\\"vie\\\":\\\"không có gì ngạc nhiên (expected, predictable)\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"eng\\\":\\\"responses\\\",\\\"vie\\\":\\\"phản ứng, câu trả lời (answers, reactions)\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"eng\\\":\\\"automatic\\\",\\\"vie\\\":\\\"tự động (mechanical, instinctive)\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"eng\\\":\\\"picked up\\\",\\\"vie\\\":\\\"nhặt lên, học được (collected, learned)\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"eng\\\":\\\"unconscious\\\",\\\"vie\\\":\\\"bất tỉnh, vô thức (insensible, unaware)\\\",\\\"phonetic\\\":\\\"\\\"}],\\\"pData\\\":[{\\\"en\\\":[\\\"We all think we can break our bad habits - but they can stay with us for life\\\"],\\\"vi\\\":[\\\"Tất cả chúng ta đều nghĩ rằng mình có thể từ bỏ những thói quen xấu - nhưng chúng có thể theo chúng ta suốt đời\\\"]},{\\\"en\\\":[\\\"What is a bad habit?\\\",\\\"The most common definition is that it is something that we do regularly, almost without thinking about it, and which has some sort of negative consequence.\\\",\\\"This consequence could affect those around us, or it could affect us personally.\\\",\\\"Those who deny having bad habits are probably lying.\\\",\\\"Bad habits are part of what makes us human.\\\"],\\\"vi\\\":[\\\"Thói quen xấu là gì?\\\",\\\"Định nghĩa phổ biến nhất là đó là việc chúng ta làm thường xuyên, hầu như không nghĩ đến nó và có một số hậu quả tiêu cực.\\\",\\\"Hậu quả này có thể ảnh hưởng đến những người xung quanh hoặc có thể ảnh hưởng đến cá nhân chúng ta.\\\",\\\"Những người phủ nhận có những thói quen xấu có lẽ đang nói dối.\\\",\\\"Những thói quen xấu là một phần tạo nên con người chúng ta.\\\"]},{\\\"en\\\":[\\\"Many early habits, like sucking our thumb, are broken when we are very young.\\\",\\\"We are either told to stop doing it by our parents, or we consciously or subconsciously observe that others do not have the same habit, and we gradually grow out of it.\\\",\\\"It is when we intentionally or unintentionally pick up new habits in our later childhood or early adulthood that it becomes a problem.\\\",\\\"Unless we can break that habit early on, it becomes a part of our life, and becomes ‘programmed' into our brain.\\\"],\\\"vi\\\":[\\\"Nhiều thói quen ban đầu, như mút ngón tay cái, bị bỏ khi chúng ta còn rất nhỏ.\\\",\\\"Chúng ta hoặc được cha mẹ yêu cầu ngừng làm việc đó, hoặc chúng ta quan sát một cách có ý thức hoặc tiềm thức rằng những người khác không có thói quen tương tự và chúng ta dần dần bỏ thói quen đó.\\\",\\\"Khi chúng ta cố tình hoặc vô tình hình thành những thói quen mới trong thời thơ ấu hoặc tuổi trưởng thành thì điều đó sẽ trở thành một vấn đề.\\\",\\\"Trừ khi chúng ta có thể từ bỏ thói quen đó sớm, nếu không nó sẽ trở thành một phần cuộc sống và được “lập trình” trong não chúng ta.\\\"]},{\\\"en\\\":[\\\"A recent study of human memory suggests that no matter how hard we try to change our habits, it is the old ways that tend to win, especially in situations where we are rushed, stressed or overworked.\\\",\\\"Habits that we thought we had got rid of can suddenly come back.\\\",\\\"During the study programme, the researchers showed a group of volunteers several pictures, and gave them words to associate with them (for example, see a picture of tea, and associate it with 'breakfast').\\\",\\\"They then showed the volunteers the same pictures again, and gave them new words to associate with them (see a picture of tea, and say 'afternoon').\\\"],\\\"vi\\\":[\\\"Một nghiên cứu gần đây về trí nhớ con người cho thấy rằng dù chúng ta có cố gắng thay đổi thói quen của mình đến mức nào thì những cách làm cũ vẫn có xu hướng giành chiến thắng, đặc biệt là trong những tình huống chúng ta vội vã, căng thẳng hoặc làm việc quá sức.\\\",\\\"Những thói quen mà chúng ta tưởng đã bỏ được có thể bất ngờ quay trở lại.\\\",\\\"Trong chương trình nghiên cứu, các nhà nghiên cứu đã cho một nhóm tình nguyện viên xem một số bức tranh và cho họ những từ để liên tưởng đến chúng (ví dụ: xem một bức ảnh về trà và liên tưởng nó với 'bữa sáng').\\\",\\\"Sau đó, họ cho các tình nguyện viên xem lại những bức tranh tương tự và đưa cho họ những từ mới để liên tưởng đến chúng (xem bức tranh về trà và nói 'buổi chiều').\\\"]},{\\\"en\\\":[\\\"A few days later, the volunteers were given a test.\\\",\\\"The researchers showed them the pictures, and told them to respond with one of the words they had been given for each one.\\\",\\\"It came as no surprise that their answers were split between the first set of words and the second.\\\",\\\"Two weeks later, they were given the same test again.\\\",\\\"This time, most of them only gave the first set of words.\\\",\\\"They appeared to have completely forgotten the second set.\\\"],\\\"vi\\\":[\\\"Vài ngày sau, các tình nguyện viên được làm một bài kiểm tra.\\\",\\\"Các nhà nghiên cứu cho họ xem những bức tranh và yêu cầu họ trả lời bằng một trong những từ mà họ được giao cho mỗi bức tranh.\\\",\\\"Không có gì ngạc nhiên khi câu trả lời của họ được chia thành nhóm từ đầu tiên và nhóm từ thứ hai.\\\",\\\"Hai tuần sau, họ lại được làm bài kiểm tra tương tự.\\\",\\\"Lần này đa số chỉ đưa ra cụm từ đầu tiên.\\\",\\\"Họ dường như đã hoàn toàn quên mất set thứ hai.\\\"]},{\\\"en\\\":[\\\"The study confirms that the responses we learn first are those that remain strongest over time.\\\",\\\"We may try to change our ways, but after a while, the response that comes to mind first is usually the first one we learned.\\\",\\\"The more that response is used, the more automatic it becomes and the harder it becomes to respond in any other way.\\\"],\\\"vi\\\":[\\\"Nghiên cứu xác nhận rằng những phản ứng mà chúng ta học được đầu tiên là những phản ứng mạnh mẽ nhất theo thời gian.\\\",\\\"Chúng ta có thể cố gắng thay đổi cách làm của mình, nhưng sau một thời gian, phản ứng hiện lên trong đầu thường là điều đầu tiên chúng ta học được.\\\",\\\"Phản hồi đó càng được sử dụng nhiều thì nó càng trở nên tự động hơn và càng khó phản hồi theo bất kỳ cách nào khác.\\\"]},{\\\"en\\\":[\\\"The study therefore suggests that over time, our bad habits also become automatic, learned behaviour.\\\",\\\"This is not good news for people who picked up bad habits early in life and now want to change or break them.\\\",\\\"Even when we try to put new, good intentions into practice, those previously learned habits remain stronger in more automatic, unconscious forms of memory.\\\"],\\\"vi\\\":[\\\"Do đó, nghiên cứu cho thấy rằng theo thời gian, những thói quen xấu của chúng ta cũng trở thành hành vi tự động được học hỏi.\\\",\\\"Đây không phải là tin tốt cho những người đã sớm hình thành thói quen xấu và hiện muốn thay đổi hoặc từ bỏ chúng.\\\",\\\"Ngay cả khi chúng ta cố gắng thực hành những ý định tốt mới, những thói quen đã học trước đó vẫn mạnh mẽ hơn ở dạng trí nhớ vô thức, tự động hơn.\\\"]}],\\\"timeLimit\\\":20,\\\"rawInputs\\\":{\\\"rawText\\\":\\\"We all think we can break our bad habits - but they can stay with us for life \\\\n\\\\nWhat is a bad habit? The most common definition is that it is something that we do regularly, almost without thinking about it, and which has some sort of negative consequence. This consequence could affect those around us, or it could affect us personally. Those who deny having bad habits are probably lying. Bad habits are part of what makes us human. \\\\n\\\\nMany early habits, like sucking our thumb, are broken when we are very young. We are either told to stop doing it by our parents, or we consciously or subconsciously observe that others do not have the same habit, and we gradually grow out of it. It is when we intentionally or unintentionally pick up new habits in our later childhood or early adulthood that it becomes a problem. Unless we can break that habit early on, it becomes a part of our life, and becomes ‘programmed' into our brain. \\\\n\\\\nA recent study of human memory suggests that no matter how hard we try to change our habits, it is the old ways that tend to win, especially in situations where we are rushed, stressed or overworked. Habits that we thought we had got rid of can suddenly come back. During the study programme, the researchers showed a group of volunteers several pictures, and gave them words to associate with them (for example, see a picture of tea, and associate it with 'breakfast'). They then showed the volunteers the same pictures again, and gave them new words to associate with them (see a picture of tea, and say 'afternoon'). \\\\n\\\\nA few days later, the volunteers were given a test. The researchers showed them the pictures, and told them to respond with one of the words they had been given for each one. It came as no surprise that their answers were split between the first set of words and the second. Two weeks later, they were given the same test again. This time, most of them only gave the first set of words. They appeared to have completely forgotten the second set. \\\\n\\\\nThe study confirms that the responses we learn first are those that remain strongest over time. We may try to change our ways, but after a while, the response that comes to mind first is usually the first one we learned. The more that response is used, the more automatic it becomes and the harder it becomes to respond in any other way. \\\\n\\\\nThe study therefore suggests that over time, our bad habits also become automatic, learned behaviour. This is not good news for people who picked up bad habits early in life and now want to change or break them. Even when we try to put new, good intentions into practice, those previously learned habits remain stronger in more automatic, unconscious forms of memory.\\\\n\\\",\\\"transText\\\":\\\"Tất cả chúng ta đều nghĩ rằng mình có thể từ bỏ những thói quen xấu - nhưng chúng có thể theo chúng ta suốt đời\\\\n\\\\nThói quen xấu là gì?\\\\nĐịnh nghĩa phổ biến nhất là đó là việc chúng ta làm thường xuyên, hầu như không nghĩ đến nó và có một số hậu quả tiêu cực.\\\\nHậu quả này có thể ảnh hưởng đến những người xung quanh hoặc có thể ảnh hưởng đến cá nhân chúng ta.\\\\nNhững người phủ nhận có những thói quen xấu có lẽ đang nói dối.\\\\nNhững thói quen xấu là một phần tạo nên con người chúng ta.\\\\n\\\\nNhiều thói quen ban đầu, như mút ngón tay cái, bị bỏ khi chúng ta còn rất nhỏ.\\\\nChúng ta hoặc được cha mẹ yêu cầu ngừng làm việc đó, hoặc chúng ta quan sát một cách có ý thức hoặc tiềm thức rằng những người khác không có thói quen tương tự và chúng ta dần dần bỏ thói quen đó.\\\\nKhi chúng ta cố tình hoặc vô tình hình thành những thói quen mới trong thời thơ ấu hoặc tuổi trưởng thành thì điều đó sẽ trở thành một vấn đề.\\\\nTrừ khi chúng ta có thể từ bỏ thói quen đó sớm, nếu không nó sẽ trở thành một phần cuộc sống và được “lập trình” trong não chúng ta.\\\\n\\\\nMột nghiên cứu gần đây về trí nhớ con người cho thấy rằng dù chúng ta có cố gắng thay đổi thói quen của mình đến mức nào thì những cách làm cũ vẫn có xu hướng giành chiến thắng, đặc biệt là trong những tình huống chúng ta vội vã, căng thẳng hoặc làm việc quá sức.\\\\nNhững thói quen mà chúng ta tưởng đã bỏ được có thể bất ngờ quay trở lại.\\\\nTrong chương trình nghiên cứu, các nhà nghiên cứu đã cho một nhóm tình nguyện viên xem một số bức tranh và cho họ những từ để liên tưởng đến chúng (ví dụ: xem một bức ảnh về trà và liên tưởng nó với 'bữa sáng').\\\\nSau đó, họ cho các tình nguyện viên xem lại những bức tranh tương tự và đưa cho họ những từ mới để liên tưởng đến chúng (xem bức tranh về trà và nói 'buổi chiều').\\\\n\\\\nVài ngày sau, các tình nguyện viên được làm một bài kiểm tra.\\\\nCác nhà nghiên cứu cho họ xem những bức tranh và yêu cầu họ trả lời bằng một trong những từ mà họ được giao cho mỗi bức tranh.\\\\nKhông có gì ngạc nhiên khi câu trả lời của họ được chia thành nhóm từ đầu tiên và nhóm từ thứ hai.\\\\nHai tuần sau, họ lại được làm bài kiểm tra tương tự.\\\\nLần này đa số chỉ đưa ra cụm từ đầu tiên.\\\\nHọ dường như đã hoàn toàn quên mất set thứ hai.\\\\n\\\\nNghiên cứu xác nhận rằng những phản ứng mà chúng ta học được đầu tiên là những phản ứng mạnh mẽ nhất theo thời gian.\\\\nChúng ta có thể cố gắng thay đổi cách làm của mình, nhưng sau một thời gian, phản ứng hiện lên trong đầu thường là điều đầu tiên chúng ta học được.\\\\nPhản hồi đó càng được sử dụng nhiều thì nó càng trở nên tự động hơn và càng khó phản hồi theo bất kỳ cách nào khác.\\\\n\\\\nDo đó, nghiên cứu cho thấy rằng theo thời gian, những thói quen xấu của chúng ta cũng trở thành hành vi tự động được học hỏi.\\\\nĐây không phải là tin tốt cho những người đã sớm hình thành thói quen xấu và hiện muốn thay đổi hoặc từ bỏ chúng.\\\\nNgay cả khi chúng ta cố gắng thực hành những ý định tốt mới, những thói quen đã học trước đó vẫn mạnh mẽ hơn ở dạng trí nhớ vô thức, tự động hơn.\\\\n\\\",\\\"excelInput\\\":\\\"phá vỡ, nghỉ (pause, interrupt)\\\\tTake a short break from work. (Hãy nghỉ ngắn khỏi công việc.)\\\\t/breɪk/\\\\nđịnh nghĩa (meaning, explanation)\\\\tThe dictionary gives the definition of the word. (Từ điển đưa ra định nghĩa của từ.)\\\\t/ˌdɛfəˈnɪʃən/\\\\nhậu quả tiêu cực (harmful result, drawback)\\\\tSmoking has negative consequences. (Hút thuốc có hậu quả tiêu cực.)\\\\t/ˈnɛɡətɪv ˈkɒnsɪkwəns/\\\\nmột cách có ý thức (deliberately, intentionally)\\\\tHe consciously avoided the mistake. (Anh ấy có ý thức tránh sai lầm.)\\\\t/ˈkɑːnʃəsli/\\\\nmột cách vô thức (unintentionally, automatically)\\\\tShe subconsciously smiled. (Cô ấy vô thức mỉm cười.)\\\\t/ˌsʌbˈkɑːnʃəsli/\\\\nvội vã (hurried, hasty)\\\\tHe rushed to finish the work. (Anh ấy vội vã hoàn thành công việc.)\\\\t/rʌʃt/\\\\nlàm việc quá sức (exhausted, overloaded)\\\\tShe felt overworked after long hours. (Cô ấy cảm thấy làm việc quá sức sau nhiều giờ.)\\\\t/ˌoʊvərˈwɜːrkt/\\\\ntình nguyện viên (helpers, contributors)\\\\tMany volunteers joined the project. (Nhiều tình nguyện viên tham gia dự án.)\\\\t/ˌvɑːlənˈtɪrz/\\\\nkhông có gì ngạc nhiên (expected, predictable)\\\\tHis success came as no surprise. (Thành công của anh ấy không có gì ngạc nhiên.)\\\\t/keɪm æz noʊ səˈpraɪz/\\\\nphản ứng, câu trả lời (answers, reactions)\\\\tThe teacher received many responses. (Giáo viên nhận được nhiều phản hồi.)\\\\t/rɪˈspɑːnsɪz/\\\\ntự động (mechanical, instinctive)\\\\tThe door opens automatic. (Cánh cửa mở tự động.)\\\\t/ˌɔːtəˈmætɪk/\\\\nnhặt lên, học được (collected, learned)\\\\tHe picked up new skills quickly. (Anh ấy học được kỹ năng mới nhanh chóng.)\\\\t/pɪkt ʌp/\\\\nbất tỉnh, vô thức (insensible, unaware)\\\\tHe was knocked unconscious. (Anh ấy bị đánh bất tỉnh.)\\\\t/ʌnˈkɑːnʃəs/\\\",\\\"txtHeadingsList\\\":\\\"\\\",\\\"mifOptions\\\":\\\"\\\",\\\"txtTfngMifList\\\":\\\"1 \\\\tWe usually develop bad habits when we are very young. \\\\n2 \\\\tWe can only break bad habits if people tell us to do so. \\\\n3 \\\\tBad habits may return when we are under pressure. \\\\n4 \\\\tResearchers were surprised by the answers that the volunteers gave in the first test. \\\\n5 \\\\tThe volunteers found the test more difficult when they did it the second time. \\\\n6 \\\\tPeople find it more difficult to remember things they learnt when they were young. \\\\n7 \\\\tIf we develop bad habits early in life, they are harder to get rid of.\\\",\\\"txtMatchFeature\\\":\\\"\\\",\\\"rawQuestions\\\":\\\"\\\",\\\"bulkKeyInput\\\":\\\"1 NOT GIVEN\\\\n2 NO\\\\n3 YES\\\\n4 NO\\\\n5 NOT GIVEN\\\\n6 NO\\\\n7 YES\\\\n\\\",\\\"bulkLocInput\\\":\\\"\\\",\\\"bulkExpInput\\\":\\\"\\\",\\\"bulkLocExpInput\\\":\\\"1. \\\\n•\\\\twe intentionally or unintentionally pick up new habits in our later childhood or early adulthood that it becomes a problem\\\\n•\\\\tExplanation:\\\\no\\\\tPhân tích: Bài đọc có nói về các thói quen sớm (early habits) khi còn nhỏ nhưng thường bị phá vỡ sớm (như mút tay). Tuy nhiên, bài đọc không khẳng định chúng ta \\\\\\\"thường xuyên\\\\\\\" phát triển các thói quen xấu (bad habits) ngay từ khi còn rất nhỏ; thay vào đó, nó nhấn mạnh vấn đề thường nảy sinh ở giai đoạn cuối tuổi thơ hoặc đầu tuổi trưởng thành.\\\\no\\\\tKết luận: Tác giả không đưa ra khẳng định chung về thời điểm \\\\\\\"thường xuyên\\\\\\\" nhất để hình thành thói quen xấu.\\\\n2. \\\\n•\\\\tWe are either told to stop doing it by our parents, or we consciously or subconsciously observe that others do not have the same habit, and we gradually grow out of it \\\\n•\\\\tExplanation:\\\\no\\\\tPhân tích: Đề bài nói chúng ta \\\\\\\"chỉ có thể\\\\\\\" (only) bỏ thói quen xấu nếu được người khác nhắc nhở. Thực tế bài đọc đưa ra hai cách: một là được nhắc nhở, hai là tự quan sát một cách có ý thức hoặc vô thức để thay đổi.\\\\no\\\\tKết luận: Thông tin trái ngược hoàn toàn (từ \\\\\\\"only\\\\\\\" làm câu sai).\\\\n3. \\\\n•\\\\tit is the old ways that tend to win, especially in situations where we are rushed\\\\n•\\\\tExplanation:\\\\no\\\\tPhân tích: Bài đọc xác nhận những thói quen cũ (thường là thói quen xấu) có xu hướng trỗi dậy khi chúng ta vội vã, căng thẳng (stressed) hoặc làm việc quá sức. \\\\\\\"Under pressure\\\\\\\" đồng nghĩa với \\\\\\\"rushed, stressed or overworked\\\\\\\".\\\\no\\\\tKết luận: Thông tin trùng khớp.\\\\n4. \\\\n•\\\\tIt came as no surprise that their answers were split between the first set of words and the second\\\\n•\\\\tExplanation:\\\\no\\\\tPhân tích: Đề bài nói các nhà nghiên cứu \\\\\\\"ngạc nhiên\\\\\\\" (surprised). Bài đọc khẳng định việc kết quả bị chia đôi giữa hai nhóm từ là \\\\\\\"không có gì ngạc nhiên\\\\\\\" (no surprise).\\\\no\\\\tKết luận: Thông tin trái ngược hoàn toàn.\\\\n5. \\\\n•\\\\tTwo weeks later, they were given the same test again. This time, most of them only gave the first set of words\\\\n•\\\\tExplanation:\\\\no\\\\tPhân tích: Bài đọc mô tả kết quả của bài kiểm tra lần thứ hai (hầu hết quên bộ từ thứ hai). Tuy nhiên, không có thông tin nào mô tả cảm nhận của tình nguyện viên về việc bài thi có \\\\\\\"khó hơn\\\\\\\" (more difficult) hay không.\\\\no\\\\tKết luận: Thông tin không có trong bài.\\\\n6. \\\\n•\\\\tThe study confirms that the responses we learn first are those that remain strongest over time\\\\n•\\\\tExplanation:\\\\no\\\\tPhân tích: Đề bài nói mọi người thấy \\\\\\\"khó nhớ\\\\\\\" những gì học khi còn trẻ. Ngược lại, bài đọc khẳng định những gì được học đầu tiên (thường là khi trẻ) lại là những thứ tồn tại mạnh mẽ nhất theo thời gian.\\\\no\\\\tKết luận: Thông tin trái ngược hoàn toàn.\\\\n7. \\\\n•\\\\tThis is not good news for people who picked up bad habits early in life and now want to change or break them \\\\n•\\\\tExplanation:\\\\no\\\\tPhân tích: Bài đọc nêu rõ những thói quen hình thành sớm và được sử dụng nhiều sẽ trở nên tự động và rất khó để thay đổi hoặc phản ứng theo cách khác.\\\\no\\\\tKết luận: Thông tin trùng khớp.\\\",\\\"timeLimitInput\\\":\\\"20\\\",\\\"chkMatchHeadings\\\":false,\\\"chkRemoveOpt\\\":false,\\\"chkTfngMif\\\":true,\\\"chkMatchFeature\\\":false,\\\"chkRemoveFeatureOpt\\\":false}}];\\n\\nlet currentLessonIndex = 0;\\nlet qs, vocab, headings, headingKey, mifRange, removeOpt, removeFeatureOpt, pairs, pData;\\n\\nlet timeLeft = 0;\\nlet timerInterval;\\nconst timerEl = document.getElementById('timer');\\n\\nfunction startTimer() {\\n    timerInterval = setInterval(() => {\\n        if(timeLeft <= 0) {\\n            clearInterval(timerInterval);\\n            timerEl.innerText = \\\"00:00\\\";\\n            alert(\\\"Time is up!\\\");\\n            return;\\n        }\\n        timeLeft--;\\n        const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');\\n        const s = (timeLeft % 60).toString().padStart(2, '0');\\n        timerEl.innerText = `${m}:${s}`;\\n    }, 1000);\\n}\\n\\nfunction switchLesson(idx) {\\n    currentLessonIndex = parseInt(idx);\\n    const l = lessonsData[currentLessonIndex];\\n    qs = l.qs; vocab = l.vocab; headings = l.headings; headingKey = l.headingKey;\\n    mifRange = l.mifRange; removeOpt = l.removeOpt; removeFeatureOpt = l.removeFeatureOpt;\\n    pairs = l.pairs; pData = l.pData;\\n\\n    // Reset UI\\n    document.getElementById('articleArea').innerHTML = l.articleHtml;\\n    document.getElementById('headingsArea').innerHTML = l.headingsHtml;\\n    document.getElementById('qs').innerHTML = '';\\n    document.getElementById('progressBar').innerHTML = '';\\n    document.getElementById('saveBtn').style.display = 'none';\\n    \\n    // Reset Timer\\n    clearInterval(timerInterval);\\n    timeLeft = l.timeLimit * 60;\\n    timerEl.innerText = \\\"--:--\\\";\\n    startTimer();\\n\\n    // Render Questions & Attach Events\\n    renderStudentQuestions();\\n    attachEvents();\\n\\n    // Manage Views\\n    if(document.getElementById('game-view').style.display === 'block') initGame();\\n    if(document.getElementById('mif-view').style.display === 'flex') {\\n        document.getElementById('mif-view').style.display = 'none';\\n    }\\n}\\n\\n// --- RENDERING QUESTIONS ---\\nfunction renderStudentQuestions() {\\n    const qDiv=document.getElementById('qs');\\n    qDiv.innerHTML = '';\\n    \\n    qs.forEach(q=>{\\n      if(q.type==='text-only'){ qDiv.innerHTML+=`<div class=\\\"text-only\\\">${q.text}</div>`; }\\n      else if(q.type==='summary') { \\n          let h = `<div class=\\\"q-block\\\" id=\\\"q-card-${q.id}\\\">`;\\n          let txt = q.text.replace(/\\\\n/g, '<br>');\\n          q.gapIds.forEach(gid => {\\n              const isFeat = q.isFeature ? 'true' : 'false';\\n              \\n              const loc = (q.locations && q.locations[gid]) ? q.locations[gid] : \\\"\\\";\\n              const locBtn = loc ? `<button class=\\\"loc-btn\\\" onclick=\\\"showLoc(${q.id}, ${gid})\\\">📍</button>` : \\\"\\\";\\n              \\n              const dz = `<span class=\\\"drop-zone\\\" id=\\\"dz-${gid}\\\" data-gid=\\\"${gid}\\\" data-isfeat=\\\"${isFeat}\\\" ondragover=\\\"allowDrop(event)\\\" ondrop=\\\"drop(event)\\\" onclick=\\\"clearDrop(${gid})\\\"></span><span class=\\\"q-num\\\" style=\\\"vertical-align:super;font-size:10px\\\">${gid}</span>${locBtn}&nbsp;`;\\n              \\n              // Dùng nối chuỗi (String concatenation) thay cho template literal để tránh lỗi invalid token\\n              let replaced = txt.replace(new RegExp(gid + '\\\\\\\\s*([._…-]{2,}|_{2,}|…+)'), dz);\\n              if(replaced === txt) replaced = txt.replace(new RegExp(gid + '[.]\\\\\\\\s+'), dz + ' ');\\n              txt = replaced;\\n              \\n              const d=document.createElement('div'); d.className='progress-circle'; d.id='prog-'+gid; d.innerText=gid;\\n              d.onclick=()=>document.getElementById('q-card-'+q.id).scrollIntoView({behavior:'smooth',block:'center'});\\n              document.getElementById('progressBar').appendChild(d);\\n          });\\n          h += `<div style=\\\"line-height:2;font-size:15px\\\">${txt}</div><div style=\\\"margin-top:15px;display:flex;flex-wrap:wrap;gap:8px;padding-top:10px;border-top:1px dashed #e2e8f0\\\">`;\\n          q.options.forEach(optLine => {\\n              const m = optLine.match(/^([A-Z])\\\\s*[.)]?\\\\s*(.+)/);\\n              if(m) h += `<div class=\\\"heading-item\\\" id=\\\"opt-${q.id}-${m[1]}\\\" style=\\\"display:inline-flex;width:auto;margin:0\\\" draggable=\\\"true\\\" ondragstart=\\\"drag(event)\\\" data-val=\\\"${m[1]}\\\"><span style=\\\"font-weight:bold;color:#2563eb\\\">${m[1]}</span> ${m[2]}</div>`;\\n          });\\n          h += `</div><div id=\\\"fb-${q.id}\\\" style=\\\"margin-top:10px; font-size:13px\\\"></div></div>`;\\n          qDiv.innerHTML += h;\\n      }\\n      else if(q.type==='gap-fill-block') { \\n          let h = `<div class=\\\"q-block\\\" id=\\\"q-card-${q.id}\\\">`;\\n          let txt = q.text.replace(/\\\\n/g, '<br>'); \\n          q.gapIds.forEach(gid => {\\n              const loc = (q.locations && q.locations[gid]) ? q.locations[gid] : \\\"\\\";\\n              const locBtn = loc ? `<button class=\\\"loc-btn\\\" onclick=\\\"showLoc(${q.id}, ${gid})\\\">📍</button>` : \\\"\\\";\\n              const inp = `<span class=\\\"q-num\\\">${gid}</span><input type=\\\"text\\\" class=\\\"gap-input\\\" data-gid=\\\"${gid}\\\" oninput=\\\"upd(${gid})\\\">${locBtn}&nbsp;`;\\t\\n              txt = txt.replace(new RegExp(`${gid}[\\\\\\\\s:.)]*(?:[_….\\\\\\\\-]\\\\\\\\s*){2,}`), inp);\\n              const d=document.createElement('div'); d.className='progress-circle'; d.id='prog-'+gid; d.innerText=gid;\\n              d.onclick=()=>document.getElementById('q-card-'+q.id).scrollIntoView({behavior:'smooth',block:'center'});\\n              document.getElementById('progressBar').appendChild(d);\\n          });\\n          h += `<div style=\\\"line-height:2.2;font-size:16px\\\">${txt}</div><div id=\\\"fb-${q.id}\\\" style=\\\"margin-top:10px; font-size:13px\\\"></div></div>`;\\n          qDiv.innerHTML += h;\\n      }\\n      else if(q.type==='mcq-multi') {\\n          let h = `<div class=\\\"q-block\\\" id=\\\"q-card-${q.id}\\\">`;\\n          const locBtn1 = (q.locations && q.locations[q.gapIds[0]]) ? `<button class=\\\"loc-btn\\\" onclick=\\\"showLoc(${q.id}, ${q.gapIds[0]})\\\">📍</button>` : \\\"\\\";\\n          h += `<div style=\\\"display:flex;align-items:baseline;margin-bottom:8px;\\\"><span class=\\\"q-num\\\">${q.gapIds[0]}-${q.gapIds[q.gapIds.length-1]}</span> <span>${q.text}</span> ${locBtn1}</div>`;\\n          q.options.forEach((o, i) => {\\n              const optLetterMatch = o.match(/^([A-Z])/i);\\n              const optLetter = optLetterMatch ? optLetterMatch[1].toUpperCase() : o.trim()[0].toUpperCase();\\n              h += `<label style=\\\"display:block;margin:5px 0;cursor:pointer;transition:all 0.2s;\\\">\\n                      <input type=\\\"checkbox\\\" name=\\\"mcq_${q.id}\\\" value=\\\"${optLetter}\\\" onchange=\\\"updMcqMulti(${q.id}, '${q.gapIds.join(',')}', event)\\\"> ${o} <span id=\\\"mcq-mark-${q.id}-${i}\\\" class=\\\"mcq-mark\\\"></span>\\n                    </label>`;\\n          });\\n          h += `<div id=\\\"fb-${q.id}\\\" class=\\\"feedback\\\" style=\\\"margin-top:8px;font-size:13px\\\"></div></div>`;\\n          qDiv.innerHTML += h;\\n          q.gapIds.forEach(gid => {\\n              const d=document.createElement('div'); d.className='progress-circle'; d.id='prog-'+gid; d.innerText=gid;\\n              d.onclick=()=>document.getElementById('q-card-'+q.id).scrollIntoView({behavior:'smooth',block:'center'});\\n              document.getElementById('progressBar').appendChild(d);\\n          });\\n      }\\n      else { \\n        let h=`<div class=\\\"q-block\\\" id=\\\"q-card-${q.id}\\\">`;\\n        const loc = q.location || \\\"\\\";\\n        const locBtn = loc ? `<button class=\\\"loc-btn\\\" onclick=\\\"showLoc(${q.id})\\\">📍</button>` : \\\"\\\";\\n        \\n        if(q.type==='gap-fill'){\\n           let t=q.text.replace(/(\\\\d+)[\\\\s:.)]*(?:[_….\\\\-]\\\\s*){2,}/g, '<span class=\\\"q-num\\\">$1</span><input type=\\\"text\\\" class=\\\"gap-input\\\" data-id=\\\"'+q.id+'\\\" oninput=\\\"upd('+q.id+')\\\">'+locBtn+'&nbsp;');\\n           h+=`<div>${t}</div>`;\\n        } else {\\n           h+=`<div style=\\\"display:flex;align-items:baseline\\\"><span class=\\\"q-num\\\">${q.id}.</span> <span>${q.text}</span> ${locBtn}</div>`;\\n           if(q.type==='mcq') q.options.forEach((o, i) => { h += `<label class=\\\"mcq-label\\\" style=\\\"display:block;margin:5px 0;cursor:pointer\\\"><input type=\\\"radio\\\" name=\\\"q${q.id}\\\" value=\\\"${o.trim()[0]}\\\" onchange=\\\"upd(${q.id})\\\"> ${o} <span id=\\\"mcq-mark-${q.id}-${i}\\\" class=\\\"mcq-mark\\\"></span></label>`; });\\n           if(q.type==='tfng') {\\n               h+='<div class=\\\"tfng-container\\\">';\\n               ['TRUE', 'FALSE', 'NOT GIVEN'].forEach(opt => {\\n                   h+=`<label class=\\\"tfng-label\\\"><input type=\\\"radio\\\" name=\\\"tfng${q.id}\\\" value=\\\"${opt}\\\" onchange=\\\"upd(${q.id})\\\"><span class=\\\"tfng-btn\\\">${opt}</span></label>`;\\n               });\\n               h+='</div>';\\n           }\\n           if(q.type==='ynng') {\\n               h+='<div class=\\\"tfng-container\\\">';\\n               ['YES', 'NO', 'NOT GIVEN'].forEach(opt => {\\n                   h+=`<label class=\\\"tfng-label\\\"><input type=\\\"radio\\\" name=\\\"ynng${q.id}\\\" value=\\\"${opt}\\\" onchange=\\\"upd(${q.id})\\\"><span class=\\\"tfng-btn\\\">${opt}</span></label>`;\\n               });\\n               h+='</div>';\\n           }\\n           if(q.type==='mif') {\\n               h+='<div class=\\\"mif-container\\\">';\\n               mifRange.split('').forEach(char => {\\n                   h+=`<label class=\\\"mif-label\\\"><input type=\\\"radio\\\" name=\\\"mif${q.id}\\\" value=\\\"${char}\\\" onchange=\\\"upd(${q.id})\\\"><span class=\\\"mif-circle\\\">${char}</span></label>`;\\n               });\\n               h+='</div>';\\n           }\\n        }\\n        h+=`<div id=\\\"fb-${q.id}\\\" class=\\\"feedback\\\" style=\\\"margin-top:8px;font-size:13px\\\"></div></div>`;\\n        qDiv.innerHTML+=h;\\n        const d=document.createElement('div'); d.className='progress-circle'; d.id='prog-'+q.id; d.innerText=q.id;\\n        d.onclick=()=>document.getElementById('q-card-'+q.id).scrollIntoView({behavior:'smooth',block:'center'});\\n        document.getElementById('progressBar').appendChild(d);\\n      }\\n    });\\n\\n    document.querySelectorAll('input[type=\\\"radio\\\"][name^=\\\"mif\\\"]').forEach(radio => {\\n        radio.addEventListener('change', (e) => {\\n            const qId = radio.name.replace('mif', '');\\n            const pChar = radio.value;\\n            document.querySelectorAll(`.mif-inline-btn[data-qid=\\\"${qId}\\\"]`).forEach(btn => {\\n                const btnPara = btn.closest('.mif-inline-box').dataset.para;\\n                if(btnPara === pChar) {\\n                    btn.classList.remove('hidden-by-other');\\n                    btn.classList.add('selected');\\n                } else {\\n                    btn.classList.remove('selected');\\n                    btn.classList.add('hidden-by-other');\\n                }\\n            });\\n        });\\n    });\\n}\\n\\nfunction attachEvents() {\\n    const pp = document.getElementById('popup');\\n    document.querySelectorAll('.vocab').forEach(s => {\\n      s.onclick = e => {\\n        const v = vocab.find(x => x.id === s.dataset.vid); if(!v) return;\\n        pp.innerHTML = `<div style=\\\"background:#1e293b;color:#fff;padding:12px;font-weight:700;display:flex;justify-content:space-between;align-items:center\\\"><div><span>${v.word}</span> <span style=\\\"font-weight:normal;font-size:12px;color:#94a3b8;margin-left:8px\\\">${v.phonetic||''}</span></div><span onclick=\\\"speak('${v.word}')\\\" style=\\\"cursor:pointer;background:#334155;padding:4px;border-radius:50%\\\">🔊</span></div><div style=\\\"padding:16px;font-size:14px;color:#334155\\\"><p style=\\\"margin-bottom:8px\\\"><b style=\\\"color:#0f172a\\\">Meaning:</b> ${v.meaning}</p><p style=\\\"margin-bottom:8px\\\"><b style=\\\"color:#0f172a\\\">Synonyms:</b> ${v.synonym}</p><div style=\\\"background:#f1f5f9;padding:8px;border-radius:6px;margin-top:8px;color:#475569;font-style:italic\\\">\\\"${v.example}\\\"</div></div>`;\\n        pp.style.display = 'block'; pp.style.top = (e.clientY+10) + 'px'; pp.style.left = Math.min(e.clientX, window.innerWidth-330) + 'px';\\n        e.stopPropagation();\\n      }\\n    });\\n\\n    document.querySelectorAll('.sent').forEach(el => {\\n        el.addEventListener('mouseenter', () => {\\n            const tid = el.getAttribute('data-target'); const t = document.getElementById(tid);\\n            if(t) t.style.backgroundColor = '#fef08a'; \\n        });\\n        el.addEventListener('mouseleave', () => {\\n            const tid = el.getAttribute('data-target'); const t = document.getElementById(tid);\\n            if(t) t.style.backgroundColor = 'transparent';\\n        });\\n    });\\n}\\n\\nfunction allowDrop(ev) { ev.preventDefault(); }\\nfunction drag(ev) { \\n    const el = ev.target.closest('[draggable=\\\"true\\\"]') || ev.target;\\n    const val = el.dataset.val || el.innerText.split('.')[0].trim();\\n    ev.dataTransfer.setData(\\\"text\\\", val); \\n    ev.dataTransfer.setData(\\\"srcId\\\", el.id); \\n}\\nfunction dragHeading(ev) { \\n    const el = ev.target.closest('.heading-item');\\n    ev.dataTransfer.setData(\\\"hid\\\", el.dataset.hid); \\n    ev.dataTransfer.setData(\\\"srcId\\\", el.id); \\n}\\nfunction drop(ev) {\\n    ev.preventDefault();\\n    const zone = ev.target.closest('.drop-zone');\\n    if(!zone) return;\\n    \\n    const type = zone.dataset.type;\\n    if (type === 'heading') {\\n        const hid = ev.dataTransfer.getData(\\\"hid\\\");\\n        if(!hid) return; \\n        zone.innerHTML = hid.toUpperCase(); \\n        zone.dataset.val = hid; \\n        zone.classList.add('filled');\\n        \\n        const srcId = ev.data ng' ? `tfng${q.id}` : `ynng${q.id}`;\\n                 const checked = document.querySelector(`input[name=\\\"${inputName}\\\"]:checked`); u = checked ? checked.value : \\\"\\\";\\n                 if(u.toLowerCase() === keyVal.toLowerCase()) ok=true;\\n                 if(checked) { const btn = checked.nextElementSibling; if(ok) btn.classList.add('correct-opt'); else { btn.classList.add('wrong-opt'); document.getElementById('fb-'+q.id).insertAdjacentHTML('afterbegin', `<span class=\\\"ans-key\\\" style=\\\"margin-bottom:5px; display:inline-block\\\">${keyVal}</span> `); } } \\n                 else if (!ok) { document.getElementById('fb-'+q.id).innerHTML += `<span class=\\\"ans-key\\\">${keyVal}</span>`; }\\n            }\\n            if(q.type==='mif') {\\n                 const checked = document.querySelector(`input[name=\\\"mif${q.id}\\\"]:checked`); u = checked ? checked.value : \\\"\\\";\\n                 if(u.toLowerCase() === keyVal.toLowerCase()) ok=true;\\n                 if(checked) { const circle = checked.nextElementSibling; if(ok) circle.classList.add('correct-opt'); else circle.classList.add('wrong-opt'); }\\n            }\\n\\n            if(ok) { score++; document.getElementById('prog-'+q.id).classList.add('prog-correct'); } \\n            else { document.getElementById('prog-'+q.id).classList.add('prog-wrong'); }\\n            \\n            if(!ok && q.type !== 'summary' && q.type !== 'gap-fill-block') { document.getElementById('fb-'+q.id).innerHTML = `<span class=\\\"wrong\\\">✗ Your: ${u||\\\"(empty)\\\"}</span> <span class=\\\"correct\\\">Key: ${keyVal}</span>`; } \\n            else if(ok && q.type !== 'summary' && q.type !== 'gap-fill-block') { document.getElementById('fb-'+q.id).innerHTML = '<span class=\\\"correct\\\">✓ Correct</span>'; }\\n            \\n            let expTxt = q.explanation || \\\"\\\";\\n            if(expTxt) {\\n                document.getElementById('fb-'+q.id).innerHTML += `<div style=\\\"margin-top:10px;\\\"><button class=\\\"exp-btn\\\" onclick=\\\"this.nextElementSibling.classList.toggle('hidden')\\\">💡 View Explanation</button><div class=\\\"exp-box hidden\\\">${expTxt}</div></div>`;\\n            }\\n        }\\n    });\\n\\t\\n    alert(`Score: ${score} / ${total}`);\\n    document.getElementById('saveBtn').style.display = 'inline-block';\\n};\\n\\nwindow.saveResult = () => {\\n    document.querySelectorAll('input[type=\\\"text\\\"]').forEach(el => el.setAttribute('value', el.value));\\n    document.querySelectorAll('input[type=\\\"checkbox\\\"], input[type=\\\"radio\\\"]').forEach(el => {\\n        if(el.checked) el.setAttribute('checked', 'checked');\\n        else el.removeAttribute('checked');\\n    });\\n    \\n    document.body.setAttribute('data-is-graded', 'true');\\n    \\n    const htmlContent = '<!DOCTYPE html>\\\\n<html lang=\\\"en\\\">' + document.documentElement.innerHTML + '</html>';\\n    const blob = new Blob([htmlContent], {type: 'text/html;charset=utf-8'});\\n    const a = document.createElement('a');\\n    a.href = URL.createObjectURL(blob);\\n    const sel = document.getElementById('lesson-selector');\\n    const lessonName = sel.options[sel.selectedIndex].text;\\n    a.download = 'Graded_' + lessonName.replace(/\\\\s+/g, '_') + '.html';\\n    document.body.appendChild(a);\\n    a.click();\\n    document.body.removeChild(a);\\n    \\n    document.body.removeAttribute('data-is-graded');\\n};\\n\\nwindow.toggleTrans=id=>document.getElementById(id).classList.toggle('hidden');\\nconst rs=document.getElementById('rs'),lp=document.getElementById('lp');\\nlet x=0,w=0,md=e=>{x=e.clientX;w=lp.offsetWidth;document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu)};\\nlet mm=e=>lp.style.width=((w+e.clientX-x)/rs.parentElement.offsetWidth*100)+'%';\\nlet mu=()=>{document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu)};\\nrs.addEventListener('mousedown',md);\\n\\ndocument.onclick = e => { \\n    // Xử lý popup từ vựng cũ\\n    const pp = document.getElementById('popup'); \\n    if(pp && !pp.contains(e.target) && e.target.id !== 'hl-toolbar') pp.style.display='none';\\n    \\n    // Xử lý tắt popup giải thích (Exp) khi click ra ngoài\\n    if(!e.target.closest('.inline-exp')) {\\n        document.querySelectorAll('.inline-exp .exp-box:not(.hidden)').forEach(box => {\\n            box.classList.add('hidden');\\n        });\\n    }\\n};\\nwindow.speak = t => window.speechSynthesis.speak(new SpeechSynthesisUtterance(t));\\n\\nlet mifMap = {};\\nlet mifParaChars = [];\\nlet currentMifIndex = 0;\\n\\nwindow.toggleMifMode = () => {\\n    const mv = document.getElementById('mif-view');\\n    if(mv.style.display === 'flex') {\\n        mv.style.display = 'none';\\n    } else {\\n        mifMap = {};\\n        qs.forEach(q => {\\n            if(q.type === 'mif' && q.mifTargets) {\\n                q.mifTargets.forEach(pChar => {\\n                    if(!mifMap[pChar]) mifMap[pChar] = [];\\n                    mifMap[pChar].push(q);\\n                });\\n            }\\n        });\\n        mifParaChars = Object.keys(mifMap).sort();\\n        if(mifParaChars.length === 0) return alert(\\\"Không có đoạn văn nào được gán câu hỏi Mif!\\\");\\n        \\n        currentMifIndex = 0;\\n        renderMifFocus();\\n        mv.style.display = 'flex';\\n    }\\n};\\n\\nwindow.renderMifFocus = () => {\\n    const pChar = mifParaChars[currentMifIndex];\\n    const pIndex = pChar.charCodeAt(0) - 65;\\n    const para = pData[pIndex];\\n    \\n    document.getElementById('mif-title').innerText = 'Luyện Mif: Đoạn ' + pChar;\\n    \\n    let enHtml = '', viHtml = '';\\n    para.en.forEach((s, i) => { enHtml += `<div class=\\\"mif-en-sent\\\" onmouseenter=\\\"hlMifVi(${i}, true)\\\" onmouseleave=\\\"hlMifVi(${i}, false)\\\">${s}</div>`; });\\n    para.vi.forEach((s, i) => { viHtml += `<div class=\\\"mif-vi-sent\\\" id=\\\"mif-vi-${i}\\\">${s}</div>`; });\\n    document.getElementById('mif-en-col').innerHTML = enHtml;\\n    document.getElementById('mif-vi-col').innerHTML = viHtml;\\n    \\n    let qsHtml = '';\\n    mifMap[pChar].forEach(q => {\\n        const mainRadio = document.querySelector(`input[name=\\\"mif${q.id}\\\"]:checked`);\\n        const isChecked = mainRadio && mainRadio.value === pChar ? 'checked' : '';\\n        qsHtml += `\\n        <div class=\\\"q-block\\\" style=\\\"background:#fff\\\">\\n            <div style=\\\"font-weight:bold;margin-bottom:8px;font-size:15px\\\"><span class=\\\"q-num\\\">${q.id}.</span> ${q.text}</div>\\n            <label class=\\\"mif-label\\\" style=\\\"display:inline-block\\\">\\n                <input type=\\\"checkbox\\\" ${isChecked} onchange=\\\"syncMif(${q.id}, '${pChar}', this.checked)\\\">\\n                <span class=\\\"mif-circle\\\" style=\\\"width:auto;padding:0 20px;border-radius:20px;height:40px;cursor:pointer\\\">Chọn đoạn ${pChar}</span>\\n            </label>\\n        </div>`;\\n    });\\n    document.getElementById('mif-qs-container').innerHTML = qsHtml;\\n    \\n    document.getElementById('mif-prev').disabled = currentMifIndex === 0;\\n    document.getElementById('mif-next').innerText = currentMifIndex === mifParaChars.length - 1 ? \\\"Hoàn thành\\\" : \\\"Next ➡\\\";\\n};\\n\\nwindow.hlMifVi = (i, isEnter) => { const el = document.getElementById('mif-vi-'+i); if(el) el.style.background = isEnter ? '#fef08a' : 'transparent'; };\\n\\nwindow.syncMif = (qId, pChar, isChecked) => {\\n    const mainRadio = document.querySelector(`input[name=\\\"mif${qId}\\\"][value=\\\"${pChar}\\\"]`);\\n    if(mainRadio) {\\n        mainRadio.checked = isChecked;\\n        if(isChecked) upd(qId);\\n        document.querySelectorAll(`.mif-inline-btn[data-qid=\\\"${qId}\\\"]`).forEach(btn => {\\n            const btnPara = btn.closest('.mif-inline-box').dataset.para;\\n            if(btnPara === pChar) { isChecked ? btn.classList.add('selected') : btn.classList.remove('selected'); isChecked ? btn.classList.remove('hidden-by-other') : null; } \\n            else { isChecked ? btn.classList.add('hidden-by-other') : btn.classList.remove('hidden-by-other'); isChecked ? btn.classList.remove('selected') : null; }\\n        });\\n    }\\n};\\n\\nwindow.toggleInlineMif = (qId, pChar) => {\\n    const mainRadio = document.querySelector(`input[name=\\\"mif${qId}\\\"][value=\\\"${pChar}\\\"]`);\\n    if (!mainRadio) return;\\n\\n    if (mainRadio.checked) {\\n        mainRadio.checked = false;\\n        const prog = document.getElementById('prog-' + qId);\\n        if (prog) prog.classList.remove('filled');\\n\\n        document.querySelectorAll(`.mif-inline-btn[data-qid=\\\"${qId}\\\"]`).forEach(btn => {\\n            btn.classList.remove('selected', 'hidden-by-other');\\n        });\\n    } else {\\n        mainRadio.checked = true;\\n        window.upd(qId);\\n\\n        document.querySelectorAll(`.mif-inline-btn[data-qid=\\\"${qId}\\\"]`).forEach(btn => {\\n            const btnPara = btn.closest('.mif-inline-box').dataset.para;\\n            if (btnPara === pChar) {\\n                btn.classList.add('selected');\\n                btn.classList.remove('hidden-by-other');\\n            } else {\\n                btn.classList.remove('selected');\\n                btn.classList.add('hidden-by-other');\\n            }\\n        });\\n    }\\n};\\n\\nwindow.navMif = (dir) => { if(dir === 1 && currentMifIndex === mifParaChars.length - 1) { toggleMifMode(); return; } currentMifIndex += dir; renderMifFocus(); };\\n\\nlet state = { engOrder: [], shuffledVie: [], matches: {}, score: 0 };\\nlet currentPicked = null;\\n\\nfunction toggleGame() {\\n    const g = document.getElementById('game-view'); const r = document.getElementById('reading-view');\\n    if(g.style.display === 'block') { g.style.display = 'none'; r.style.display = 'flex'; } \\n    else { g.style.display = 'block'; r.style.display = 'none'; if(pairs.length > 0) initGame(); }\\n}\\n\\nfunction shuffleArray(arr){ const a = arr.slice(); for(let i=a.length-1;i>0;i--){ const j = Math.floor(Math.random()*(i+1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }\\n\\nfunction initGame(){\\n  const engListEl = document.getElementById('engList');\\n  state.matches = {}; state.score = 0;\\n  if(pairs.length === 0) { engListEl.innerHTML = '<div style=\\\"color:white;padding:20px\\\">No vocab data selected in the Generator!</div>'; return; }\\n  state.engOrder = shuffleArray(pairs.map((_,i)=>i));\\n  state.shuffledVie = shuffleArray(pairs.map(p => p.vie));\\n  renderEng(); renderVie(); attachSlotEvents(); updateScore(); initFlashcards(); renderFillList();\\n}\\n\\nfunction renderEng(){\\n  const engListEl = document.getElementById('engList'); engListEl.innerHTML = '';\\n  state.engOrder.forEach((origIndex, pos) => {\\n    const p = pairs[origIndex]; const item = document.createElement('div'); item.className = 'g-eng-item'; item.dataset.origIndex = origIndex;\\n    item.innerHTML = `<div class=\\\"g-eng-left\\\"><div class=\\\"g-index\\\">${pos+1}</div><div><div style=\\\"font-weight:700;display:flex;align-items:center;gap:6px;\\\">${p.eng} <span onclick=\\\"speak('${p.eng}')\\\" style=\\\"cursor:pointer;font-size:14px;\\\" title=\\\"Nghe phát âm\\\">🔊</span></div><div style=\\\"font-size:13px; color:var(--muted)\\\">${p.phonetic ? p.phonetic : 'English'}</div></div></div><div class=\\\"g-slot\\\" data-index=\\\"${origIndex}\\\" aria-label=\\\"drop slot\\\" tabindex=\\\"0\\\"><div class=\\\"inner\\\"></div></div>`;\\n    engListEl.appendChild(item);\\n  });\\n}\\n\\nfunction renderVie(){\\n  const vieListEl = document.getElementById('vieList'); vieListEl.innerHTML = '';\\n  state.shuffledVie.forEach((text, idx) => {\\n    const d = document.createElement('div'); d.className = 'g-vie-item'; d.draggable = true; d.dataset.text = text; d.id = 'vie-'+idx; d.innerHTML = `<span style=\\\"font-weight:600\\\">${text}</span>`; vieListEl.appendChild(d);\\n    d.addEventListener('dragstart', e => { d.classList.add('dragging'); e.dataTransfer.setData('text/plain', text); currentPicked = {text, el:d}; });\\n    d.addEventListener('dragend', ()=> d.classList.remove('dragging'));\\n    d.addEventListener('click', () => { if(currentPicked && currentPicked.el === d){ currentPicked = null; d.style.outline = ''; } else { clearPicked(); currentPicked = {text, el:d}; d.style.outline = '2px solid rgba(6,182,212,0.18)'; } });\\n  });\\n}\\n\\nfunction attachSlotEvents(){\\n  const slots = document.querySelectorAll('.g-slot');\\n  slots.forEach(slot => {\\n    slot.addEventListener('dragover', e => { e.preventDefault(); slot.classList.add('active'); });\\n    slot.addEventListener('dragleave', () => slot.classList.remove('active'));\\n    slot.addEventListener('drop', e => { e.preventDefault(); slot.classList.remove('active'); const text = e.dataTransfer.getData('text/plain'); handleDrop(slot, text); });\\n    slot.addEventListener('click', () => { if(currentPicked) handleDrop(slot, currentPicked.text); });\\n    slot.addEventListener('focus', () => slot.classList.add('highlight'));\\n    slot.addEventListener('blur', () => slot.classList.remove('highlight'));\\n    slot.addEventListener('keydown', e => { if(e.key === 'Enter' && currentPicked) handleDrop(slot, currentPicked.text); });\\n  });\\n}\\n\\nfunction handleDrop(slot, vieText){\\n  const engIndex = Number(slot.dataset.index); const correctVie = pairs[engIndex].vie; if(state.matches[engIndex]) return;\\n  if(vieText === correctVie){\\n    slot.classList.add('correct'); slot.innerHTML = `<div class=\\\"inner\\\"><span style=\\\"color:#10b981;margin-right:5px\\\">✓</span> <span style=\\\"font-weight:700;color:var(--success)\\\">${vieText}</span></div>`;\\n    slot.style.borderColor = 'rgba(16,185,129,0.9)'; slot.style.boxShadow = '0 10px 30px rgba(16,185,129,0.06)';\\n    state.matches[engIndex] = vieText; state.score++; updateScore(); celebrate(); speak(pairs[engIndex].eng); removeVieItem(vieText);\\n    if(state.score === pairs.length){ setTimeout(()=> alert('Chúc mừng! Bạn đã ghép đúng tất cả.'), 300); }\\n  } else {\\n    slot.classList.add('g-wrong'); setTimeout(()=> slot.classList.remove('g-wrong'), 420);\\n    const vieEl = findVieElement(vieText);\\n    if(vieEl){ vieEl.animate([{transform:'translateX(0)'},{transform:'translateX(-6px)'},{transform:'translateX(6px)'},{transform:'translateX(0)'}], {duration:300}); }\\n  }\\n}\\n\\nfunction removeVieItem(text){ const el = findVieElement(text); if(el){ el.remove(); currentPicked = null; } }\\nfunction findVieElement(text){ return Array.from(document.querySelectorAll('.g-vie-item')).find(x => x.dataset.text === text); }\\nfunction updateScore(){ document.getElementById('score').innerHTML = `Đúng: <strong>${state.score}</strong> / ${pairs.length}`; }\\n\\nfunction celebrate(){\\n  const colors = ['#06b6d4','#f97316','#f43f5e','#10b981','#60a5fa']; const confettiEl = document.getElementById('confetti');\\n  for(let i=0;i<18;i++){\\n    const p = document.createElement('div'); p.className = 'piece'; p.style.left = Math.random()*100 + '%'; p.style.background = colors[Math.floor(Math.random()*colors.length)];\\n    p.style.width = (8 + Math.random()*10) + 'px'; p.style.height = (10 + Math.random()*14) + 'px'; p.style.animationDuration = (900 + Math.random()*700) + 'ms'; confettiEl.appendChild(p); setTimeout(()=> p.remove(), 2000);\\n  }\\n}\\n\\ndocument.getElementById('shuffleBtn').addEventListener('click', () => { state.engOrder = shuffleArray(pairs.map((_,i)=>i)); state.shuffledVie = shuffleArray(pairs.map(p => p.vie)); renderEng(); renderVie(); attachSlotEvents(); state.matches = {}; state.score = 0; updateScore(); });\\ndocument.getElementById('resetBtn').addEventListener('click', () => initGame());\\n\\nfunction clearPicked(){ if(currentPicked && currentPicked.el) currentPicked.el.style.outline = ''; currentPicked = null; }\\ndocument.addEventListener('click', (e) => { if(!e.target.closest('.g-vie-item') && !e.target.closest('.g-
