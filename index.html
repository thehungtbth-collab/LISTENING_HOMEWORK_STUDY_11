\">Đúng: 0 / 0</div>\\n        <button class=\\\"g-btn\\\" id=\\\"shuffleBtn\\\">Trộn</button>\\n        <button class=\\\"g-btn\\\" id=\\\"resetBtn\\\">Làm lại</button>\\n        <button class=\\\"g-btn\\\" style=\\\"background:linear-gradient(90deg,#ef4444,#dc2626);color:#fff\\\" onclick=\\\"toggleGame()\\\">Close Game</button>\\n      </div>\\n    </header>\\n\\n    <section class=\\\"g-card\\\" style=\\\"margin-bottom:12px;\\\">\\n      <h3 style=\\\"margin-top:0; color:var(--accent)\\\">Flashcards Ôn Tập</h3>\\n      <div style=\\\"display:flex; gap:12px; align-items:center; flex-wrap:wrap;\\\">\\n        <div class=\\\"flash-wrap\\\">\\n          <div id=\\\"flashcard\\\" class=\\\"flashcard\\\" tabindex=\\\"0\\\" role=\\\"button\\\" aria-pressed=\\\"false\\\">\\n            <div class=\\\"flash-face front\\\" id=\\\"flashFront\\\">Nhấn Next để bắt đầu</div>\\n            <div class=\\\"flash-face back\\\" id=\\\"flashBack\\\">Back</div>\\n          </div>\\n        </div>\\n        <div style=\\\"display:flex; flex-direction:column; gap:8px;\\\">\\n          <div style=\\\"display:flex; gap:8px;\\\">\\n            <button class=\\\"g-btn\\\" id=\\\"prevCard\\\">Prev</button>\\n            <button class=\\\"g-btn\\\" id=\\\"flipCard\\\">Flip</button>\\n            <button class=\\\"g-btn\\\" id=\\\"nextCard\\\">Next</button>\\n          </div>\\n          <div style=\\\"display:flex; gap:8px;\\\">\\n            <button class=\\\"g-btn\\\" id=\\\"autoPlay\\\">Auto</button>\\n            <button class=\\\"g-btn\\\" id=\\\"showBoth\\\">Show Both</button>\\n          </div>\\n        </div>\\n      </div>\\n      <div class=\\\"small\\\" style=\\\"margin-top:8px; color:var(--muted); font-size:13px\\\">Nhấn flashcard để lật. Auto sẽ tự chuyển sau 2s. Show Both hiển thị cả 2 mặt tạm thời.</div>\\n    </section>\\n\\n    <section class=\\\"g-layout\\\">\\n      <div class=\\\"g-card\\\">\\n        <h3 style=\\\"margin-top:0; color:var(--accent)\\\">Phần 1 Matching</h3>\\n        <div class=\\\"small\\\" style=\\\"color:var(--muted); font-size:13px\\\">Kéo nghĩa vào ô tương ứng. Hoặc chạm để chọn rồi chạm vào ô.</div>\\n        <div class=\\\"g-list\\\" id=\\\"engList\\\" style=\\\"margin-top:12px;\\\"></div>\\n      </div>\\n      <div class=\\\"g-card\\\">\\n        <h3 style=\\\"margin-top:0; color:var(--accent)\\\">Phần 2 Vietnamese</h3>\\n        <div class=\\\"g-vie-list\\\" id=\\\"vieList\\\" style=\\\"margin-top:12px;\\\"></div>\\n      </div>\\n    </section>\\n\\n    <section class=\\\"g-card\\\" style=\\\"margin-top:12px; margin-bottom: 50px;\\\">\\n      <h3 style=\\\"margin-top:0; color:var(--accent)\\\">Bài Điền Chữ</h3>\\n      <div class=\\\"small\\\" style=\\\"color:var(--muted); font-size:13px\\\">Bên trái là tiếng Việt, bên phải học sinh điền tiếng Anh. Nhấn Kiểm tra để chấm.</div>\\n      <div style=\\\"margin-top:10px;\\\">\\n        <div class=\\\"fill-list\\\" id=\\\"fillList\\\"></div>\\n        <div style=\\\"margin-top:10px; display:flex; gap:8px; align-items:center;\\\">\\n          <button class=\\\"g-btn\\\" id=\\\"checkFill\\\">Kiểm tra</button>\\n          <button class=\\\"g-btn\\\" id=\\\"showAnswers\\\">Hiện đáp án</button>\\n          <button class=\\\"g-btn\\\" id=\\\"resetFill\\\">Làm lại</button>\\n          <div class=\\\"small\\\" id=\\\"fillScore\\\" style=\\\"align-self:center; color:var(--muted); font-size:13px\\\">Điểm: 0 / 0</div>\\n        </div>\\n      </div>\\n    </section>\\n  </div>\\n</div>\\n\\n<div id=\\\"mif-view\\\">\\n  <div class=\\\"mif-header\\\">\\n    <h2 id=\\\"mif-title\\\" style=\\\"margin:0;color:#4338ca;font-size:18px\\\">Luyện Mif: Đoạn ...</h2>\\n    <button class=\\\"mif-nav-btn\\\" style=\\\"background:#ef4444\\\" onclick=\\\"toggleMifMode()\\\">Đóng</button>\\n  </div>\\n  <div class=\\\"mif-body\\\">\\n    <div class=\\\"mif-left\\\">\\n      <div class=\\\"mif-col-container\\\">\\n        <div class=\\\"mif-col\\\" id=\\\"mif-en-col\\\"></div>\\n        <div class=\\\"mif-col\\\" id=\\\"mif-vi-col\\\"></div>\\n      </div>\\n    </div>\\n    <div class=\\\"mif-right\\\">\\n      <div id=\\\"mif-qs-container\\\" style=\\\"flex:1; overflow-y:auto; padding-bottom:20px;\\\"></div>\\n      <div style=\\\"display:flex; justify-content:space-between; border-top:2px solid #cbd5e1; padding-top:15px; margin-top:10px;\\\">\\n        <button class=\\\"mif-nav-btn\\\" id=\\\"mif-prev\\\" onclick=\\\"navMif(-1)\\\">⬅ Back</button>\\n        <button class=\\\"mif-nav-btn\\\" id=\\\"mif-next\\\" onclick=\\\"navMif(1)\\\">Next ➡</button>\\n      </div>\\n    </div>\\n  </div>\\n</div>\\n\\n<div id=\\\"popup\\\"></div>\\n<div class=\\\"confetti\\\" id=\\\"confetti\\\"></div>\\n\\n<script>\\n// --- MULTI-LESSON DATA INJECTION ---\\nconst lessonsData = [{\\\"name\\\":\\\"Passage 1\\\",\\\"articleHtml\\\":\\\"\\\\u003cdiv class=\\\\\\\"reading-content\\\\\\\">\\\\u003cdiv class=\\\\\\\"para-box\\\\\\\">\\\\u003cdiv class=\\\\\\\"para-header-row\\\\\\\">\\\\u003cdiv class=\\\\\\\"para-header\\\\\\\">Paragraph A\\\\u003c/div>\\\\u003c/div>\\\\u003cp class=\\\\\\\"en-text\\\\\\\">\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p0s0\\\\\\\">It looks harmless and \\\\u003cspan class=\\\\\\\"vocab\\\\\\\" data-vid=\\\\\\\"v0\\\\\\\">vulnerable\\\\u003c/span>. \\\\u003c/span>\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p0s1\\\\\\\">But the honey badger is afraid of nothing... and will attack and eat almost anything \\\\u003c/span>\\\\u003c/p>\\\\u003cbutton class=\\\\\\\"trans-btn\\\\\\\" onclick=\\\\\\\"toggleTrans('t0')\\\\\\\">Show Translation\\\\u003c/button>\\\\u003cdiv id=\\\\\\\"t0\\\\\\\" class=\\\\\\\"vi-text hidden\\\\\\\">\\\\u003cspan id=\\\\\\\"p0s0\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Nó trông vô hại và dễ bị tổn thương. \\\\u003c/span>\\\\u003cspan id=\\\\\\\"p0s1\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Nhưng con lửng mật chẳng sợ gì cả... và sẽ tấn công và ăn hầu hết mọi thứ \\\\u003c/span>\\\\u003c/div>\\\\u003c/div>\\\\u003cdiv class=\\\\\\\"para-box\\\\\\\">\\\\u003cdiv class=\\\\\\\"para-header-row\\\\\\\">\\\\u003cdiv class=\\\\\\\"para-header\\\\\\\">Paragraph B\\\\u003c/div>\\\\u003c/div>\\\\u003cp class=\\\\\\\"en-text\\\\\\\">\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p1s0\\\\\\\">The honey badger (Melivora capensis), is an African and south-Asian \\\\u003cspan class=\\\\\\\"vocab\\\\\\\" data-vid=\\\\\\\"v1\\\\\\\">mammal\\\\u003c/span> that has a \\\\u003cspan class=\\\\\\\"vocab\\\\\\\" data-vid=\\\\\\\"v2\\\\\\\">reputation for\\\\u003c/span> being one of the world's most \\\\u003cspan class=\\\\\\\"vocab\\\\\\\" data-vid=\\\\\\\"v3\\\\\\\">fearless\\\\u003c/span> animals, despite its small size. \\\\u003c/span>\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p1s1\\\\\\\">And in spite of its gentle-sounding name, it is also one of its most \\\\u003cspan class=\\\\\\\"vocab\\\\\\\" data-vid=\\\\\\\"v4\\\\\\\">aggressive\\\\u003c/span>. \\\\u003c/span>\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p1s2\\\\\\\">Honey badgers have been known to attack lions, buffalo, and snakes three times their size. \\\\u003c/span>\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p1s3\\\\\\\">Even humans are not safe from a honey badger if it thinks the human will attack on harm it. \\\\u003c/span>\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p1s4\\\\\\\">They are also extremely \\\\u003cspan class=\\\\\\\"vocab\\\\\\\" data-vid=\\\\\\\"v5\\\\\\\">tough creatures\\\\u003c/span>, and can recover quickly from \\\\u003cspan class=\\\\\\\"vocab\\\\\\\" data-vid=\\\\\\\"v6\\\\\\\">injuries\\\\u003c/span> that would kill most other animals. \\\\u003c/span>\\\\u003c/p>\\\\u003cbutton class=\\\\\\\"trans-btn\\\\\\\" onclick=\\\\\\\"toggleTrans('t1')\\\\\\\">Show Translation\\\\u003c/button>\\\\u003cdiv id=\\\\\\\"t1\\\\\\\" class=\\\\\\\"vi-text hidden\\\\\\\">\\\\u003cspan id=\\\\\\\"p1s0\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Lửng mật (Melivora capensis), là một loài động vật có vú ở châu Phi và Nam Á, nổi tiếng là một trong những loài động vật dũng cảm nhất thế giới, mặc dù có kích thước nhỏ. \\\\u003c/span>\\\\u003cspan id=\\\\\\\"p1s1\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Và mặc dù có cái tên nghe có vẻ hiền lành nhưng nó cũng là một trong những loài hung hãn nhất. \\\\u003c/span>\\\\u003cspan id=\\\\\\\"p1s2\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Lửng mật được biết là có thể tấn công sư tử, trâu và rắn có kích thước gấp ba lần chúng. \\\\u003c/span>\\\\u003cspan id=\\\\\\\"p1s3\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Ngay cả con người cũng không an toàn trước lửng mật nếu nó cho rằng con người sẽ tấn công làm hại nó. \\\\u003c/span>\\\\u003cspan id=\\\\\\\"p1s4\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Chúng cũng là những sinh vật cực kỳ cứng rắn và có thể phục hồi nhanh chóng sau những vết thương có thể giết chết hầu hết các loài động vật khác. \\\\u003c/span>\\\\u003c/div>\\\\u003c/div>\\\\u003cdiv class=\\\\\\\"para-box\\\\\\\">\\\\u003cdiv class=\\\\\\\"para-header-row\\\\\\\">\\\\u003cdiv class=\\\\\\\"para-header\\\\\\\">Paragraph C\\\\u003c/div>\\\\u003c/div>\\\\u003cp class=\\\\\\\"en-text\\\\\\\">\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p2s0\\\\\\\">At first glance, honey badgers look like the common European badger. \\\\u003c/span>\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p2s1\\\\\\\">They are usually between 75 cm and 1 metre long, although males are about twice the size of females. \\\\u003c/span>\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p2s2\\\\\\\">They are \\\\u003cspan class=\\\\\\\"vocab\\\\\\\" data-vid=\\\\\\\"v7\\\\\\\">instantly recognisable\\\\u003c/span> by grey and white stripes that extend from the top of the head to the tail. \\\\u003c/span>\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p2s3\\\\\\\">Closer inspection, which is probably not a wise thing to do, reveals pointed teeth, and sharp front claws which can be four centimetres in length. \\\\u003c/span>\\\\u003c/p>\\\\u003cbutton class=\\\\\\\"trans-btn\\\\\\\" onclick=\\\\\\\"toggleTrans('t2')\\\\\\\">Show Translation\\\\u003c/button>\\\\u003cdiv id=\\\\\\\"t2\\\\\\\" class=\\\\\\\"vi-text hidden\\\\\\\">\\\\u003cspan id=\\\\\\\"p2s0\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Thoạt nhìn, lửng mật trông giống loài lửng thông thường ở châu Âu. \\\\u003c/span>\\\\u003cspan id=\\\\\\\"p2s1\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Chúng thường dài từ 75 cm đến 1 mét, mặc dù con đực có kích thước gấp đôi con cái. \\\\u003c/span>\\\\u003cspan id=\\\\\\\"p2s2\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Chúng có thể được nhận ra ngay lập tức bởi các sọc màu xám và trắng kéo dài từ đỉnh đầu đến đuôi. \\\\u003c/span>\\\\u003cspan id=\\\\\\\"p2s3\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Kiểm tra kỹ hơn, có lẽ không phải là một điều khôn ngoan để làm, sẽ phát hiện ra những chiếc răng nhọn và những móng vuốt sắc nhọn phía trước có thể dài tới 4 cm. \\\\u003c/span>\\\\u003c/div>\\\\u003c/div>\\\\u003cdiv class=\\\\\\\"para-box\\\\\\\">\\\\u003cdiv class=\\\\\\\"para-header-row\\\\\\\">\\\\u003cdiv class=\\\\\\\"para-header\\\\\\\">Paragraph D\\\\u003c/div>\\\\u003c/div>\\\\u003cp class=\\\\\\\"en-text\\\\\\\">\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p3s0\\\\\\\">Honey badgers are meat-eating animals with an extremely varied diet. \\\\u003c/span>\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p3s1\\\\\\\">They mainly eat a range of small creatures like beetles, lizards and birds, but will also catch larger \\\\u003cspan class=\\\\\\\"vocab\\\\\\\" data-vid=\\\\\\\"v8\\\\\\\">reptiles\\\\u003c/span> like snakes and small crocodiles. \\\\u003c/span>\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p3s2\\\\\\\">Some mammals, such as foxes, antelope and wild cats also form part of their diet. \\\\u003c/span>\\\\u003c/p>\\\\u003cbutton class=\\\\\\\"trans-btn\\\\\\\" onclick=\\\\\\\"toggleTrans('t3')\\\\\\\">Show Translation\\\\u003c/button>\\\\u003cdiv id=\\\\\\\"t3\\\\\\\" class=\\\\\\\"vi-text hidden\\\\\\\">\\\\u003cspan id=\\\\\\\"p3s0\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Lửng mật là loài động vật ăn thịt với chế độ ăn vô cùng đa dạng. \\\\u003c/span>\\\\u003cspan id=\\\\\\\"p3s1\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Chúng chủ yếu ăn nhiều loại sinh vật nhỏ như bọ cánh cứng, thằn lằn và chim, nhưng cũng sẽ bắt những loài bò sát lớn hơn như rắn và cá sấu nhỏ. \\\\u003c/span>\\\\u003cspan id=\\\\\\\"p3s2\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Một số động vật có vú, chẳng hạn như cáo, linh dương và mèo hoang cũng là một phần trong chế độ ăn của chúng. \\\\u003c/span>\\\\u003c/div>\\\\u003c/div>\\\\u003cdiv class=\\\\\\\"para-box\\\\\\\">\\\\u003cdiv class=\\\\\\\"para-header-row\\\\\\\">\\\\u003cdiv class=\\\\\\\"para-header\\\\\\\">Paragraph E\\\\u003c/div>\\\\u003c/div>\\\\u003cp class=\\\\\\\"en-text\\\\\\\">\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p4s0\\\\\\\">The badgers locate their prey mainly using their excellent sense of smell, and catch most of their prey through digging. \\\\u003c/span>\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p4s1\\\\\\\">During a 24-hour period, they may dig as many as fifty holes, and travel more than 40 kilometres. \\\\u003c/span>\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p4s2\\\\\\\">They are also good climbers, and can easily climb very tall trees to steal eggs from birds' nests, or catch other \\\\u003cspan class=\\\\\\\"vocab\\\\\\\" data-vid=\\\\\\\"v9\\\\\\\">tree-dwelling creatures\\\\u003c/span>. \\\\u003c/span>\\\\u003c/p>\\\\u003cbutton class=\\\\\\\"trans-btn\\\\\\\" onclick=\\\\\\\"toggleTrans('t4')\\\\\\\">Show Translation\\\\u003c/button>\\\\u003cdiv id=\\\\\\\"t4\\\\\\\" class=\\\\\\\"vi-text hidden\\\\\\\">\\\\u003cspan id=\\\\\\\"p4s0\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Những con lửng xác định vị trí con mồi chủ yếu bằng khứu giác tuyệt vời và bắt hầu hết con mồi bằng cách đào bới. \\\\u003c/span>\\\\u003cspan id=\\\\\\\"p4s1\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Trong khoảng thời gian 24 giờ, chúng có thể đào tới 50 hố và di chuyển hơn 40 km. \\\\u003c/span>\\\\u003cspan id=\\\\\\\"p4s2\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Chúng cũng là loài leo trèo giỏi và có thể dễ dàng trèo lên những cây rất cao để trộm trứng từ tổ chim hoặc bắt những sinh vật sống trên cây khác. \\\\u003c/span>\\\\u003c/div>\\\\u003c/div>\\\\u003cdiv class=\\\\\\\"para-box\\\\\\\">\\\\u003cdiv class=\\\\\\\"para-header-row\\\\\\\">\\\\u003cdiv class=\\\\\\\"para-header\\\\\\\">Paragraph F\\\\u003c/div>\\\\u003c/div>\\\\u003cp class=\\\\\\\"en-text\\\\\\\">\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p5s0\\\\\\\">As their name suggests, honey badgers have always been associated with honey, although they do not actually eat it. \\\\u003c/span>\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p5s1\\\\\\\">It is the highly \\\\u003cspan class=\\\\\\\"vocab\\\\\\\" data-vid=\\\\\\\"v10\\\\\\\">nutritious\\\\u003c/span> bee eggs (called '\\\\u003cspan class=\\\\\\\"vocab\\\\\\\" data-vid=\\\\\\\"v14\\\\\\\">brood\\\\u003c/span>') that they prefer, and they will do anything to find it. \\\\u003c/span>\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p5s2\\\\\\\">They usually cause a lot of damage to the hive in the process, and for this reason, humans are one of their main predators. \\\\u003c/span>\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p5s3\\\\\\\">Bee-keepers will often set special \\\\u003cspan class=\\\\\\\"vocab\\\\\\\" data-vid=\\\\\\\"v11\\\\\\\">traps\\\\u003c/span> for honey badgers, to protect their hives. \\\\u003c/span>\\\\u003c/p>\\\\u003cbutton class=\\\\\\\"trans-btn\\\\\\\" onclick=\\\\\\\"toggleTrans('t5')\\\\\\\">Show Translation\\\\u003c/button>\\\\u003cdiv id=\\\\\\\"t5\\\\\\\" class=\\\\\\\"vi-text hidden\\\\\\\">\\\\u003cspan id=\\\\\\\"p5s0\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Đúng như tên gọi của chúng, lửng mật luôn gắn liền với mật ong, mặc dù chúng không thực sự ăn mật ong. \\\\u003c/span>\\\\u003cspan id=\\\\\\\"p5s1\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Chúng thích những quả trứng ong có hàm lượng dinh dưỡng cao (được gọi là 'cha mẹ') và chúng sẽ làm bất cứ điều gì để tìm được nó. \\\\u003c/span>\\\\u003cspan id=\\\\\\\"p5s2\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Chúng thường gây ra nhiều thiệt hại cho tổ ong trong quá trình này và vì lý do này, con người là một trong những kẻ săn mồi chính của chúng. \\\\u003c/span>\\\\u003cspan id=\\\\\\\"p5s3\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Những người nuôi ong thường đặt bẫy đặc biệt cho lửng mật để bảo vệ tổ ong của chúng. \\\\u003c/span>\\\\u003c/div>\\\\u003c/div>\\\\u003cdiv class=\\\\\\\"para-box\\\\\\\">\\\\u003cdiv class=\\\\\\\"para-header-row\\\\\\\">\\\\u003cdiv class=\\\\\\\"para-header\\\\\\\">Paragraph G\\\\u003c/div>\\\\u003c/div>\\\\u003cp class=\\\\\\\"en-text\\\\\\\">\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p6s0\\\\\\\">One of the most fascinating aspects of the honey badger is its working relationship with a bird called the greater honeyguide (Indicator indicator). \\\\u003c/span>\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p6s1\\\\\\\">This bird \\\\u003cspan class=\\\\\\\"vocab\\\\\\\" data-vid=\\\\\\\"v12\\\\\\\">deliberately\\\\u003c/span> guides the badger to beehives, then waits while the badger breaks into the hive and \\\\u003cspan class=\\\\\\\"vocab\\\\\\\" data-vid=\\\\\\\"v13\\\\\\\">extracts\\\\u003c/span> the \\\\u003cspan class=\\\\\\\"vocab\\\\\\\" data-vid=\\\\\\\"v14\\\\\\\">brood\\\\u003c/span>. \\\\u003c/span>\\\\u003cspan class=\\\\\\\"sent\\\\\\\" data-target=\\\\\\\"p6s2\\\\\\\">The two creatures, bird and \\\\u003cspan class=\\\\\\\"vocab\\\\\\\" data-vid=\\\\\\\"v1\\\\\\\">mammal\\\\u003c/span>, then share the \\\\u003cspan class=\\\\\\\"vocab\\\\\\\" data-vid=\\\\\\\"v14\\\\\\\">brood\\\\u003c/span> between them. \\\\u003c/span>\\\\u003c/p>\\\\u003cbutton class=\\\\\\\"trans-btn\\\\\\\" onclick=\\\\\\\"toggleTrans('t6')\\\\\\\">Show Translation\\\\u003c/button>\\\\u003cdiv id=\\\\\\\"t6\\\\\\\" class=\\\\\\\"vi-text hidden\\\\\\\">\\\\u003cspan id=\\\\\\\"p6s0\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Một trong những khía cạnh hấp dẫn nhất của lửng mật là mối quan hệ làm việc của nó với một loài chim được gọi là chim dẫn mật lớn hơn (chỉ báo). \\\\u003c/span>\\\\u003cspan id=\\\\\\\"p6s1\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Loài chim này cố tình dẫn con lửng đến tổ ong, sau đó chờ đợi con lửng đột nhập vào tổ và lấy đàn ong con ra. \\\\u003c/span>\\\\u003cspan id=\\\\\\\"p6s2\\\\\\\" class=\\\\\\\"vi-sent\\\\\\\">Hai sinh vật, chim và động vật có vú, sau đó chia sẻ con cái giữa chúng. \\\\u003c/span>\\\\u003c/div>\\\\u003c/div>\\\\u003c/div>\\\",\\\"headingsHtml\\\":\\\"\\\",\\\"qs\\\":[{\\\"type\\\":\\\"gap-fill-block\\\",\\\"id\\\":1,\\\"text\\\":\\\"Complete the questions 1-8 and write \\\\u003cb>\\\\u003cb>NO MORE THAN TWO WORDS\\\\u003c/b>\\\\u003c/b> from the passage for each answer.\\\\n•\\\\tAlthough they are not big animals, honey badgers are fearless, 1 ............. and tough.\\\\n•\\\\tHoney badgers will attack 2 ……… if they need to protect themselves.\\\\n•\\\\tThe pattern and colours on the honey badger's back make it 3 ………\\\\n•\\\\tThe food they eat is meat-based and 4 ………\\\\n•\\\\t5 ……… form the biggest part of a honey badger's diet.\\\\n•\\\\tHoney badgers find the creatures they eat by their 6 ………\\\\n•\\\\t7 ……… are often used to catch honey badgers which attack beehives.\\\\n•\\\\tFor one particular type of food, the honey badger has a 8 ……… with another creature.\\\",\\\"gapIds\\\":[1,2,3,4,5,6,7,8],\\\"answers\\\":{\\\"1\\\":\\\"aggressive\\\",\\\"2\\\":\\\"humans\\\",\\\"3\\\":\\\"instantly recognisable\\\",\\\"4\\\":\\\"extremely varied\\\",\\\"5\\\":\\\"small creatures\\\",\\\"6\\\":\\\"smell\\\",\\\"7\\\":\\\"special traps\\\",\\\"8\\\":\\\"working relationship\\\"},\\\"locations\\\":{\\\"1\\\":\\\"And in spite of its gentle-sounding name, it is also one of its most aggressive\\\",\\\"2\\\":\\\"Even humans are not safe from a honey badger if it thinks the human will attack on harm it\\\",\\\"3\\\":\\\"They are instantly recognisable by grey and white stripes that extend from the top of the head to the tail\\\",\\\"4\\\":\\\"Honey badgers are meat-eating animals with an extremely varied diet\\\",\\\"5\\\":\\\"They mainly eat a range of small creatures like beetles, lizards and birds\\\",\\\"6\\\":\\\"The badgers locate their prey mainly using their excellent sense of smell\\\",\\\"7\\\":\\\"Bee-keepers will often set special traps for honey badgers, to protect their hives\\\",\\\"8\\\":\\\"One of the most fascinating aspects of the honey badger is its working relationship with a bird called the greater honeyguide\\\"},\\\"explanations\\\":{\\\"1\\\":\\\"•\\\\tPhân tích: Đoạn văn mô tả rằng mặc dù có cái tên nghe có vẻ nhẹ nhàng, lửng mật lại là một trong những loài hung dữ nhất. Điều này bổ sung cho đặc tính không sợ hãi và cứng cỏi đã nêu trong câu hỏi.\\\\n•\\\\tLoại từ: Tính từ (Adjective).\\\\n•\\\\tTừ đồng nghĩa: aggressive ≈ hung dữ/hung hăng.\\\\n•\\\\tĐáp án: aggressive\\\",\\\"2\\\":\\\"•\\\\tPhân tích: Lửng mật không chỉ tấn công các loài động vật lớn mà ngay cả con người cũng không an toàn nếu chúng cảm thấy cần phải tự vệ.\\\\n•\\\\tLoại từ: Danh từ số nhiều (Plural noun).\\\\n•\\\\tTừ đồng nghĩa: protect themselves ≈ safe from... if it thinks... attack on harm it.\\\\n•\\\\tĐáp án: humans\\\",\\\"3\\\":\\\"•\\\\tPhân tích: Đặc điểm về màu sắc và các sọc xám trắng kéo dài từ đầu đến đuôi giúp chúng ta có thể nhận ra loài vật này ngay lập tức.\\\\n•\\\\tLoại từ: Cụm tính từ (Adjective phrase).\\\\n•\\\\tTừ đồng nghĩa: make it instantly recognisable ≈ giúp nhận ra ngay lập tức.\\\\n•\\\\tĐáp án: instantly recognisable\\\",\\\"4\\\":\\\"•\\\\tPhân tích: Thức ăn của lửng mật chủ yếu là thịt và chế độ ăn uống của chúng được mô tả là cực kỳ đa dạng.\\\\n•\\\\tLoại từ: Cụm tính từ (Adjective phrase).\\\\n•\\\\tTừ đồng nghĩa: meat-based ≈ meat-eating animals.\\\\n•\\\\tĐáp án: extremely varied\\\",\\\"5\\\":\\\"•\\\\tPhân tích: Trong chế độ ăn đa dạng của mình, các loài sinh vật nhỏ như bọ cánh cứng, thằn lằn và chim chiếm phần lớn nhất.\\\\n•\\\\tLoại từ: Cụm danh từ (Noun phrase).\\\\n•\\\\tTừ đồng nghĩa: form the biggest part ≈ mainly eat.\\\\n•\\\\tĐáp án: small creatures\\\",\\\"6\\\":\\\"•\\\\tPhân tích: Lửng mật sử dụng khứu giác tuyệt vời của mình như công cụ chính để tìm kiếm và định vị con mồi.\\\\n•\\\\tLoại từ: Cụm danh từ (Noun phrase).\\\\n•\\\\tTừ đồng nghĩa: find the creatures ≈ locate their prey.\\\\n•\\\\tĐáp án: sense of smell\\\",\\\"7\\\":\\\"•\\\\tPhân tích: Những người nuôi ong thường xuyên sử dụng các loại bẫy đặc biệt để bắt lửng mật nhằm ngăn chặn chúng phá hoại tổ ong.\\\\n•\\\\tLoại từ: Cụm danh từ (Noun phrase).\\\\n•\\\\tTừ đồng nghĩa: catch honey badgers ≈ protect their hives.\\\\n•\\\\tĐáp án: special traps\\\",\\\"8\\\":\\\"•\\\\tPhân tích: Lửng mật có một mối quan hệ cộng tác đặc biệt với loài chim honeyguide để cùng tìm kiếm và chia sẻ nguồn thức ăn là ấu trùng ong.\\\\n•\\\\tLoại từ: Cụm danh từ (Noun phrase).\\\\n•\\\\tTừ đồng nghĩa: has a working relationship\\\"},\\\"_orderId\\\":1}],\\\"vocab\\\":[{\\\"id\\\":\\\"v0\\\",\\\"word\\\":\\\"vulnerable\\\",\\\"meaning\\\":\\\"dễ bị tổn thương (susceptible, exposed)\\\",\\\"synonym\\\":\\\"The species is vulnerable to extinction. (Loài này dễ bị tuyệt chủng.)\\\",\\\"example\\\":\\\"/ˈvʌlnərəbl/\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"id\\\":\\\"v1\\\",\\\"word\\\":\\\"mammal\\\",\\\"meaning\\\":\\\"động vật có vú\\\",\\\"synonym\\\":\\\"Whales are mammals. (Cá voi là động vật có vú.)\\\",\\\"example\\\":\\\"/ˈmæməl/\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"id\\\":\\\"v2\\\",\\\"word\\\":\\\"reputation for\\\",\\\"meaning\\\":\\\"có tiếng về (known for, fame)\\\",\\\"synonym\\\":\\\"The city has a reputation for hospitality. (Thành phố có tiếng về lòng hiếu khách.)\\\",\\\"example\\\":\\\"/ˌrɛpjəˈteɪʃən fɔːr/\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"id\\\":\\\"v3\\\",\\\"word\\\":\\\"fearless\\\",\\\"meaning\\\":\\\"không sợ hãi (brave, bold)\\\",\\\"synonym\\\":\\\"She is fearless in facing challenges. (Cô ấy không sợ hãi khi đối mặt thử thách.)\\\",\\\"example\\\":\\\"/ˈfɪrləs/\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"id\\\":\\\"v4\\\",\\\"word\\\":\\\"aggressive\\\",\\\"meaning\\\":\\\"hung hăng, dữ dằn (hostile, forceful)\\\",\\\"synonym\\\":\\\"The dog became aggressive. (Con chó trở nên hung hăng.)\\\",\\\"example\\\":\\\"/əˈɡrɛsɪv/\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"id\\\":\\\"v5\\\",\\\"word\\\":\\\"tough creatures\\\",\\\"meaning\\\":\\\"sinh vật khỏe mạnh (hardy animals)\\\",\\\"synonym\\\":\\\"Crocodiles are tough creatures. (Cá sấu là sinh vật khỏe mạnh.)\\\",\\\"example\\\":\\\"/tʌf ˈkriːʧərz/\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"id\\\":\\\"v6\\\",\\\"word\\\":\\\"injuries\\\",\\\"meaning\\\":\\\"chấn thương (wounds, harm)\\\",\\\"synonym\\\":\\\"He suffered serious injuries. (Anh ấy bị chấn thương nghiêm trọng.)\\\",\\\"example\\\":\\\"/ˈɪnʤəriz/\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"id\\\":\\\"v7\\\",\\\"word\\\":\\\"instantly recognisable\\\",\\\"meaning\\\":\\\"dễ nhận ra ngay lập tức\\\",\\\"synonym\\\":\\\"The logo is instantly recognisable. (Logo dễ nhận ra ngay lập tức.)\\\",\\\"example\\\":\\\"/ˈɪnstəntli ˈrɛkəgnaɪzəbl/\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"id\\\":\\\"v8\\\",\\\"word\\\":\\\"reptiles\\\",\\\"meaning\\\":\\\"loài bò sát\\\",\\\"synonym\\\":\\\"Snakes and lizards are reptiles. (Rắn và thằn lằn là loài bò sát.)\\\",\\\"example\\\":\\\"/ˈrɛptaɪlz/\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"id\\\":\\\"v9\\\",\\\"word\\\":\\\"tree-dwelling creatures\\\",\\\"meaning\\\":\\\"sinh vật sống trên cây\\\",\\\"synonym\\\":\\\"Monkeys are tree-dwelling creatures. (Khỉ là sinh vật sống trên cây.)\\\",\\\"example\\\":\\\"/triː ˈdwɛlɪŋ ˈkriːʧərz/\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"id\\\":\\\"v10\\\",\\\"word\\\":\\\"nutritious\\\",\\\"meaning\\\":\\\"bổ dưỡng (healthy, nourishing)\\\",\\\"synonym\\\":\\\"Milk is very nutritious. (Sữa rất bổ dưỡng.)\\\",\\\"example\\\":\\\"/nuːˈtrɪʃəs/\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"id\\\":\\\"v11\\\",\\\"word\\\":\\\"traps\\\",\\\"meaning\\\":\\\"bẫy (snares, pitfalls)\\\",\\\"synonym\\\":\\\"Hunters set traps for animals. (Thợ săn đặt bẫy cho động vật.)\\\",\\\"example\\\":\\\"/træps/\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"id\\\":\\\"v12\\\",\\\"word\\\":\\\"deliberately\\\",\\\"meaning\\\":\\\"cố ý (intentionally, on purpose)\\\",\\\"synonym\\\":\\\"He deliberately broke the rule. (Anh ấy cố ý phá luật.)\\\",\\\"example\\\":\\\"/dɪˈlɪbərətli/\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"id\\\":\\\"v13\\\",\\\"word\\\":\\\"extracts\\\",\\\"meaning\\\":\\\"chiết xuất, lấy ra (removes, derives)\\\",\\\"synonym\\\":\\\"The machine extracts juice from fruit. (Máy chiết xuất nước từ trái cây.)\\\",\\\"example\\\":\\\"/ɪkˈstrækts/\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"id\\\":\\\"v14\\\",\\\"word\\\":\\\"brood\\\",\\\"meaning\\\":\\\"ổ trứng, con non (offspring, hatchlings)\\\",\\\"synonym\\\":\\\"The hen cares for her brood. (Con gà mái chăm sóc ổ trứng/con non.)\\\",\\\"example\\\":\\\"/bruːd/\\\",\\\"phonetic\\\":\\\"\\\"}],\\\"headings\\\":[],\\\"headingKey\\\":{},\\\"mifRange\\\":\\\"\\\",\\\"removeOpt\\\":false,\\\"removeFeatureOpt\\\":false,\\\"pairs\\\":[{\\\"eng\\\":\\\"vulnerable\\\",\\\"vie\\\":\\\"dễ bị tổn thương (susceptible, exposed)\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"eng\\\":\\\"mammal\\\",\\\"vie\\\":\\\"động vật có vú\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"eng\\\":\\\"reputation for\\\",\\\"vie\\\":\\\"có tiếng về (known for, fame)\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"eng\\\":\\\"fearless\\\",\\\"vie\\\":\\\"không sợ hãi (brave, bold)\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"eng\\\":\\\"aggressive\\\",\\\"vie\\\":\\\"hung hăng, dữ dằn (hostile, forceful)\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"eng\\\":\\\"tough creatures\\\",\\\"vie\\\":\\\"sinh vật khỏe mạnh (hardy animals)\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"eng\\\":\\\"injuries\\\",\\\"vie\\\":\\\"chấn thương (wounds, harm)\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"eng\\\":\\\"instantly recognisable\\\",\\\"vie\\\":\\\"dễ nhận ra ngay lập tức\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"eng\\\":\\\"reptiles\\\",\\\"vie\\\":\\\"loài bò sát\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"eng\\\":\\\"tree-dwelling creatures\\\",\\\"vie\\\":\\\"sinh vật sống trên cây\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"eng\\\":\\\"nutritious\\\",\\\"vie\\\":\\\"bổ dưỡng (healthy, nourishing)\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"eng\\\":\\\"traps\\\",\\\"vie\\\":\\\"bẫy (snares, pitfalls)\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"eng\\\":\\\"deliberately\\\",\\\"vie\\\":\\\"cố ý (intentionally, on purpose)\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"eng\\\":\\\"extracts\\\",\\\"vie\\\":\\\"chiết xuất, lấy ra (removes, derives)\\\",\\\"phonetic\\\":\\\"\\\"},{\\\"eng\\\":\\\"brood\\\",\\\"vie\\\":\\\"ổ trứng, con non (offspring, hatchlings)\\\",\\\"phonetic\\\":\\\"\\\"}],\\\"pData\\\":[{\\\"en\\\":[\\\"It looks harmless and vulnerable.\\\",\\\"But the honey badger is afraid of nothing... and will attack and eat almost anything\\\"],\\\"vi\\\":[\\\"Nó trông vô hại và dễ bị tổn thương.\\\",\\\"Nhưng con lửng mật chẳng sợ gì cả... và sẽ tấn công và ăn hầu hết mọi thứ\\\"]},{\\\"en\\\":[\\\"The honey badger (Melivora capensis), is an African and south-Asian mammal that has a reputation for being one of the world's most fearless animals, despite its small size.\\\",\\\"And in spite of its gentle-sounding name, it is also one of its most aggressive.\\\",\\\"Honey badgers have been known to attack lions, buffalo, and snakes three times their size.\\\",\\\"Even humans are not safe from a honey badger if it thinks the human will attack on harm it.\\\",\\\"They are also extremely tough creatures, and can recover quickly from injuries that would kill most other animals.\\\"],\\\"vi\\\":[\\\"Lửng mật (Melivora capensis), là một loài động vật có vú ở châu Phi và Nam Á, nổi tiếng là một trong những loài động vật dũng cảm nhất thế giới, mặc dù có kích thước nhỏ.\\\",\\\"Và mặc dù có cái tên nghe có vẻ hiền lành nhưng nó cũng là một trong những loài hung hãn nhất.\\\",\\\"Lửng mật được biết là có thể tấn công sư tử, trâu và rắn có kích thước gấp ba lần chúng.\\\",\\\"Ngay cả con người cũng không an toàn trước lửng mật nếu nó cho rằng con người sẽ tấn công làm hại nó.\\\",\\\"Chúng cũng là những sinh vật cực kỳ cứng rắn và có thể phục hồi nhanh chóng sau những vết thương có thể giết chết hầu hết các loài động vật khác.\\\"]},{\\\"en\\\":[\\\"At first glance, honey badgers look like the common European badger.\\\",\\\"They are usually between 75 cm and 1 metre long, although males are about twice the size of females.\\\",\\\"They are instantly recognisable by grey and white stripes that extend from the top of the head to the tail.\\\",\\\"Closer inspection, which is probably not a wise thing to do, reveals pointed teeth, and sharp front claws which can be four centimetres in length.\\\"],\\\"vi\\\":[\\\"Thoạt nhìn, lửng mật trông giống loài lửng thông thường ở châu Âu.\\\",\\\"Chúng thường dài từ 75 cm đến 1 mét, mặc dù con đực có kích thước gấp đôi con cái.\\\",\\\"Chúng có thể được nhận ra ngay lập tức bởi các sọc màu xám và trắng kéo dài từ đỉnh đầu đến đuôi.\\\",\\\"Kiểm tra kỹ hơn, có lẽ không phải là một điều khôn ngoan để làm, sẽ phát hiện ra những chiếc răng nhọn và những móng vuốt sắc nhọn phía trước có thể dài tới 4 cm.\\\"]},{\\\"en\\\":[\\\"Honey badgers are meat-eating animals with an extremely varied diet.\\\",\\\"They mainly eat a range of small creatures like beetles, lizards and birds, but will also catch larger reptiles like snakes and small crocodiles.\\\",\\\"Some mammals, such as foxes, antelope and wild cats also form part of their diet.\\\"],\\\"vi\\\":[\\\"Lửng mật là loài động vật ăn thịt với chế độ ăn vô cùng đa dạng.\\\",\\\"Chúng chủ yếu ăn nhiều loại sinh vật nhỏ như bọ cánh cứng, thằn lằn và chim, nhưng cũng sẽ bắt những loài bò sát lớn hơn như rắn và cá sấu nhỏ.\\\",\\\"Một số động vật có vú, chẳng hạn như cáo, linh dương và mèo hoang cũng là một phần trong chế độ ăn của chúng.\\\"]},{\\\"en\\\":[\\\"The badgers locate their prey mainly using their excellent sense of smell, and catch most of their prey through digging.\\\",\\\"During a 24-hour period, they may dig as many as fifty holes, and travel more than 40 kilometres.\\\",\\\"They are also good climbers, and can easily climb very tall trees to steal eggs from birds' nests, or catch other tree-dwelling creatures.\\\"],\\\"vi\\\":[\\\"Những con lửng xác định vị trí con mồi chủ yếu bằng khứu giác tuyệt vời và bắt hầu hết con mồi bằng cách đào bới.\\\",\\\"Trong khoảng thời gian 24 giờ, chúng có thể đào tới 50 hố và di chuyển hơn 40 km.\\\",\\\"Chúng cũng là loài leo trèo giỏi và có thể dễ dàng trèo lên những cây rất cao để trộm trứng từ tổ chim hoặc bắt những sinh vật sống trên cây khác.\\\"]},{\\\"en\\\":[\\\"As their name suggests, honey badgers have always been associated with honey, although they do not actually eat it.\\\",\\\"It is the highly nutritious bee eggs (called 'brood') that they prefer, and they will do anything to find it.\\\",\\\"They usually cause a lot of damage to the hive in the process, and for this reason, humans are one of their main predators.\\\",\\\"Bee-keepers will often set special traps for honey badgers, to protect their hives.\\\"],\\\"vi\\\":[\\\"Đúng như tên gọi của chúng, lửng mật luôn gắn liền với mật ong, mặc dù chúng không thực sự ăn mật ong.\\\",\\\"Chúng thích những quả trứng ong có hàm lượng dinh dưỡng cao (được gọi là 'cha mẹ') và chúng sẽ làm bất cứ điều gì để tìm được nó.\\\",\\\"Chúng thường gây ra nhiều thiệt hại cho tổ ong trong quá trình này và vì lý do này, con người là một trong những kẻ săn mồi chính của chúng.\\\",\\\"Những người nuôi ong thường đặt bẫy đặc biệt cho lửng mật để bảo vệ tổ ong của chúng.\\\"]},{\\\"en\\\":[\\\"One of the most fascinating aspects of the honey badger is its working relationship with a bird called the greater honeyguide (Indicator indicator).\\\",\\\"This bird deliberately guides the badger to beehives, then waits while the badger breaks into the hive and extracts the brood.\\\",\\\"The two creatures, bird and mammal, then share the brood between them.\\\"],\\\"vi\\\":[\\\"Một trong những khía cạnh hấp dẫn nhất của lửng mật là mối quan hệ làm việc của nó với một loài chim được gọi là chim dẫn mật lớn hơn (chỉ báo).\\\",\\\"Loài chim này cố tình dẫn con lửng đến tổ ong, sau đó chờ đợi con lửng đột nhập vào tổ và lấy đàn ong con ra.\\\",\\\"Hai sinh vật, chim và động vật có vú, sau đó chia sẻ con cái giữa chúng.\\\"]}],\\\"timeLimit\\\":20,\\\"rawInputs\\\":{\\\"rawText\\\":\\\"It looks harmless and vulnerable. But the honey badger is afraid of nothing... and will attack and eat almost anything \\\\n\\\\nThe honey badger (Melivora capensis), is an African and south-Asian mammal that has a reputation for being one of the world's most fearless animals, despite its small size. And in spite of its gentle-sounding name, it is also one of its most aggressive. Honey badgers have been known to attack lions, buffalo, and snakes three times their size. Even humans are not safe from a honey badger if it thinks the human will attack on harm it. They are also extremely tough creatures, and can recover quickly from injuries that would kill most other animals. \\\\n\\\\nAt first glance, honey badgers look like the common European badger. They are usually between 75 cm and 1 metre long, although males are about twice the size of females. They are instantly recognisable by grey and white stripes that extend from the top of the head to the tail. Closer inspection, which is probably not a wise thing to do, reveals pointed teeth, and sharp front claws which can be four centimetres in length. \\\\n\\\\nHoney badgers are meat-eating animals with an extremely varied diet. They mainly eat a range of small creatures like beetles, lizards and birds, but will also catch larger reptiles like snakes and small crocodiles. Some mammals, such as foxes, antelope and wild cats also form part of their diet. \\\\n\\\\nThe badgers locate their prey mainly using their excellent sense of smell, and catch most of their prey through digging. During a 24-hour period, they may dig as many as fifty holes, and travel more than 40 kilometres. They are also good climbers, and can easily climb very tall trees to steal eggs from birds' nests, or catch other tree-dwelling creatures. \\\\n\\\\nAs their name suggests, honey badgers have always been associated with honey, although they do not actually eat it. It is the highly nutritious bee eggs (called 'brood') that they prefer, and they will do anything to find it. They usually cause a lot of damage to the hive in the process, and for this reason, humans are one of their main predators. Bee-keepers will often set special traps for honey badgers, to protect their hives. \\\\n\\\\nOne of the most fascinating aspects of the honey badger is its working relationship with a bird called the greater honeyguide. This bird deliberately guides the badger to beehives, then waits while the badger breaks into the hive and extracts the brood. The two creatures, bird and mammal, then share the brood between them.\\\\n\\\",\\\"transText\\\":\\\"Nó trông vô hại và dễ bị tổn thương.\\\\nNhưng con lửng mật chẳng sợ gì cả... và sẽ tấn công và ăn hầu hết mọi thứ\\\\n\\\\nLửng mật (Melivora capensis), là một loài động vật có vú ở châu Phi và Nam Á, nổi tiếng là một trong những loài động vật dũng cảm nhất thế giới, mặc dù có kích thước nhỏ.\\\\nVà mặc dù có cái tên nghe có vẻ hiền lành nhưng nó cũng là một trong những loài hung hãn nhất.\\\\nLửng mật được biết là có thể tấn công sư tử, trâu và rắn có kích thước gấp ba lần chúng.\\\\nNgay cả con người cũng không an toàn trước lửng mật nếu nó cho rằng con người sẽ tấn công làm hại nó.\\\\nChúng cũng là những sinh vật cực kỳ cứng rắn và có thể phục hồi nhanh chóng sau những vết thương có thể giết chết hầu hết các loài động vật khác.\\\\n\\\\nThoạt nhìn, lửng mật trông giống loài lửng thông thường ở châu Âu.\\\\nChúng thường dài từ 75 cm đến 1 mét, mặc dù con đực có kích thước gấp đôi con cái.\\\\nChúng có thể được nhận ra ngay lập tức bởi các sọc màu xám và trắng kéo dài từ đỉnh đầu đến đuôi.\\\\nKiểm tra kỹ hơn, có lẽ không phải là một điều khôn ngoan để làm, sẽ phát hiện ra những chiếc răng nhọn và những móng vuốt sắc nhọn phía trước có thể dài tới 4 cm.\\\\n\\\\nLửng mật là loài động vật ăn thịt với chế độ ăn vô cùng đa dạng.\\\\nChúng chủ yếu ăn nhiều loại sinh vật nhỏ như bọ cánh cứng, thằn lằn và chim, nhưng cũng sẽ bắt những loài bò sát lớn hơn như rắn và cá sấu nhỏ.\\\\nMột số động vật có vú, chẳng hạn như cáo, linh dương và mèo hoang cũng là một phần trong chế độ ăn của chúng.\\\\n\\\\nNhững con lửng xác định vị trí con mồi chủ yếu bằng khứu giác tuyệt vời và bắt hầu hết con mồi bằng cách đào bới.\\\\nTrong khoảng thời gian 24 giờ, chúng có thể đào tới 50 hố và di chuyển hơn 40 km.\\\\nChúng cũng là loài leo trèo giỏi và có thể dễ dàng trèo lên những cây rất cao để trộm trứng từ tổ chim hoặc bắt những sinh vật sống trên cây khác.\\\\n\\\\nĐúng như tên gọi của chúng, lửng mật luôn gắn liền với mật ong, mặc dù chúng không thực sự ăn mật ong.\\\\nChúng thích những quả trứng ong có hàm lượng dinh dưỡng cao (được gọi là 'cha mẹ') và chúng sẽ làm bất cứ điều gì để tìm được nó.\\\\nChúng thường gây ra nhiều thiệt hại cho tổ ong trong quá trình này và vì lý do này, con người là một trong những kẻ săn mồi chính của chúng.\\\\nNhững người nuôi ong thường đặt bẫy đặc biệt cho lửng mật để bảo vệ tổ ong của chúng.\\\\n\\\\nMột trong những khía cạnh hấp dẫn nhất của lửng mật là mối quan hệ làm việc của nó với một loài chim được gọi là chim dẫn mật lớn hơn (chỉ báo).\\\\nLoài chim này cố tình dẫn con lửng đến tổ ong, sau đó chờ đợi con lửng đột nhập vào tổ và lấy đàn ong con ra.\\\\nHai sinh vật, chim và động vật có vú, sau đó chia sẻ con cái giữa chúng.\\\\n\\\",\\\"excelInput\\\":\\\"dễ bị tổn thương (susceptible, exposed)\\\\tThe species is vulnerable to extinction. (Loài này dễ bị tuyệt chủng.)\\\\t/ˈvʌlnərəbl/\\\\nđộng vật có vú\\\\tWhales are mammals. (Cá voi là động vật có vú.)\\\\t/ˈmæməl/\\\\ncó tiếng về (known for, fame)\\\\tThe city has a reputation for hospitality. (Thành phố có tiếng về lòng hiếu khách.)\\\\t/ˌrɛpjəˈteɪʃən fɔːr/\\\\nkhông sợ hãi (brave, bold)\\\\tShe is fearless in facing challenges. (Cô ấy không sợ hãi khi đối mặt thử thách.)\\\\t/ˈfɪrləs/\\\\nhung hăng, dữ dằn (hostile, forceful)\\\\tThe dog became aggressive. (Con chó trở nên hung hăng.)\\\\t/əˈɡrɛsɪv/\\\\nsinh vật khỏe mạnh (hardy animals)\\\\tCrocodiles are tough creatures. (Cá sấu là sinh vật khỏe mạnh.)\\\\t/tʌf ˈkriːʧərz/\\\\nchấn thương (wounds, harm)\\\\tHe suffered serious injuries. (Anh ấy bị chấn thương nghiêm trọng.)\\\\t/ˈɪnʤəriz/\\\\ndễ nhận ra ngay lập tức\\\\tThe logo is instantly recognisable. (Logo dễ nhận ra ngay lập tức.)\\\\t/ˈɪnstəntli ˈrɛkəgnaɪzəbl/\\\\nloài bò sát\\\\tSnakes and lizards are reptiles. (Rắn và thằn lằn là loài bò sát.)\\\\t/ˈrɛptaɪlz/\\\\nsinh vật sống trên cây\\\\tMonkeys are tree-dwelling creatures. (Khỉ là sinh vật sống trên cây.)\\\\t/triː ˈdwɛlɪŋ ˈkriːʧərz/\\\\nbổ dưỡng (healthy, nourishing)\\\\tMilk is very nutritious. (Sữa rất bổ dưỡng.)\\\\t/nuːˈtrɪʃəs/\\\\nbẫy (snares, pitfalls)\\\\tHunters set traps for animals. (Thợ săn đặt bẫy cho động vật.)\\\\t/træps/\\\\ncố ý (intentionally, on purpose)\\\\tHe deliberately broke the rule. (Anh ấy cố ý phá luật.)\\\\t/dɪˈlɪbərətli/\\\\nchiết xuất, lấy ra (removes, derives)\\\\tThe machine extracts juice from fruit. (Máy chiết xuất nước từ trái cây.)\\\\t/ɪkˈstrækts/\\\\nổ trứng, con non (offspring, hatchlings)\\\\tThe hen cares for her brood. (Con gà mái chăm sóc ổ trứng/con non.)\\\\t/bruːd/\\\",\\\"txtHeadingsList\\\":\\\"\\\",\\\"mifOptions\\\":\\\"\\\",\\\"txtTfngMifList\\\":\\\"\\\",\\\"txtMatchFeature\\\":\\\"\\\",\\\"rawQuestions\\\":\\\"Complete the questions 1-8 and write \\\\u003cb>\\\\u003cb>NO MORE THAN TWO WORDS\\\\u003c/b>\\\\u003c/b> from the passage for each answer. \\\\n•\\\\tAlthough they are not big animals, honey badgers are fearless, 1 ............. and tough. \\\\n•\\\\tHoney badgers will attack 2 ……… if they need to protect themselves. \\\\n•\\\\tThe pattern and colours on the honey badger's back make it 3 ………\\\\n•\\\\tThe food they eat is meat-based and 4 ………\\\\n•\\\\t5 ……… form the biggest part of a honey badger's diet. \\\\n•\\\\tHoney badgers find the creatures they eat by their 6 ………\\\\n•\\\\t7 ……… are often used to catch honey badgers which attack beehives.\\\\n•\\\\tFor one particular type of food, the honey badger has a 8 ……… with another creature.\\\\n\\\",\\\"bulkKeyInput\\\":\\\"1.\\\\taggressive \\\\n2.\\\\thumans \\\\n3.\\\\tinstantly recognisable \\\\n4.\\\\textremely varied \\\\n5.\\\\tsmall creatures \\\\n6.\\\\tsmell \\\\n7.\\\\tspecial traps \\\\n8.\\\\tworking relationship \\\",\\\"bulkLocInput\\\":\\\"\\\",\\\"bulkExpInput\\\":\\\"\\\",\\\"bulkLocExpInput\\\":\\\"1. And in spite of its gentle-sounding name, it is also one of its most aggressive\\\\n1. Explanation:\\\\n•\\\\tPhân tích: Đoạn văn mô tả rằng mặc dù có cái tên nghe có vẻ nhẹ nhàng, lửng mật lại là một trong những loài hung dữ nhất. Điều này bổ sung cho đặc tính không sợ hãi và cứng cỏi đã nêu trong câu hỏi.\\\\n•\\\\tLoại từ: Tính từ (Adjective).\\\\n•\\\\tTừ đồng nghĩa: aggressive ≈ hung dữ/hung hăng.\\\\n•\\\\tĐáp án: aggressive\\\\n2. Even humans are not safe from a honey badger if it thinks the human will attack on harm it\\\\n2. Explanation:\\\\n•\\\\tPhân tích: Lửng mật không chỉ tấn công các loài động vật lớn mà ngay cả con người cũng không an toàn nếu chúng cảm thấy cần phải tự vệ.\\\\n•\\\\tLoại từ: Danh từ số nhiều (Plural noun).\\\\n•\\\\tTừ đồng nghĩa: protect themselves ≈ safe from... if it thinks... attack on harm it.\\\\n•\\\\tĐáp án: humans\\\\n3. They are instantly recognisable by grey and white stripes that extend from the top of the head to the tail \\\\n3. Explanation:\\\\n•\\\\tPhân tích: Đặc điểm về màu sắc và các sọc xám trắng kéo dài từ đầu đến đuôi giúp chúng ta có thể nhận ra loài vật này ngay lập tức.\\\\n•\\\\tLoại từ: Cụm tính từ (Adjective phrase).\\\\n•\\\\tTừ đồng nghĩa: make it instantly recognisable ≈ giúp nhận ra ngay lập tức.\\\\n•\\\\tĐáp án: instantly recognisable\\\\n4. Honey badgers are meat-eating animals with an extremely varied diet\\\\n4. Explanation:\\\\n•\\\\tPhân tích: Thức ăn của lửng mật chủ yếu là thịt và chế độ ăn uống của chúng được mô tả là cực kỳ đa dạng.\\\\n•\\\\tLoại từ: Cụm tính từ (Adjective phrase).\\\\n•\\\\tTừ đồng nghĩa: meat-based ≈ meat-eating animals.\\\\n•\\\\tĐáp án: extremely varied\\\\n5. They mainly eat a range of small creatures like beetles, lizards and birds\\\\n5. Explanation:\\\\n•\\\\tPhân tích: Trong chế độ ăn đa dạng của mình, các loài sinh vật nhỏ như bọ cánh cứng, thằn lằn và chim chiếm phần lớn nhất.\\\\n•\\\\tLoại từ: Cụm danh từ (Noun phrase).\\\\n•\\\\tTừ đồng nghĩa: form the biggest part ≈ mainly eat.\\\\n•\\\\tĐáp án: small creatures\\\\n6. The badgers locate their prey mainly using their excellent sense of smell\\\\n6. Explanation:\\\\n•\\\\tPhân tích: Lửng mật sử dụng khứu giác tuyệt vời của mình như công cụ chính để tìm kiếm và định vị con mồi.\\\\n•\\\\tLoại từ: Cụm danh từ (Noun phrase).\\\\n•\\\\tTừ đồng nghĩa: find the creatures ≈ locate their prey.\\\\n•\\\\tĐáp án: sense of smell\\\\n7. Bee-keepers will often set special traps for honey badgers, to protect their hives\\\\n7. Explanation:\\\\n•\\\\tPhân tích: Những người nuôi ong thường xuyên sử dụng các loại bẫy đặc biệt để bắt lửng mật nhằm ngăn chặn chúng phá hoại tổ ong.\\\\n•\\\\tLoại từ: Cụm danh từ (Noun phrase).\\\\n•\\\\tTừ đồng nghĩa: catch honey badgers ≈ protect their hives.\\\\n•\\\\tĐáp án: special traps\\\\n8. One of the most fascinating aspects of the honey badger is its working relationship with a bird called the greater honeyguide\\\\n8. Explanation:\\\\n•\\\\tPhân tích: Lửng mật có một mối quan hệ cộng tác đặc biệt với loài chim honeyguide để cùng tìm kiếm và chia sẻ nguồn thức ăn là ấu trùng ong.\\\\n•\\\\tLoại từ: Cụm danh từ (Noun phrase).\\\\n•\\\\tTừ đồng nghĩa: has a working relationship \\\",\\\"timeLimitInput\\\":\\\"20\\\",\\\"chkMatchHeadings\\\":false,\\\"chkRemoveOpt\\\":false,\\\"chkTfngMif\\\":false,\\\"chkMatchFeature\\\":false,\\\"chkRemoveFeatureOpt\\\":false}}];\\n\\nlet currentLessonIndex = 0;\\nlet qs, vocab, headings, headingKey, mifRange, removeOpt, removeFeatureOpt, pairs, pData;\\n\\nlet timeLeft = 0;\\nlet timerInterval;\\nconst timerEl = document.getElementById('timer');\\n\\nfunction startTimer() {\\n    timerInterval = setInterval(() => {\\n        if(timeLeft <= 0) {\\n            clearInterval(timerInterval);\\n            timerEl.innerText = \\\"00:00\\\";\\n            alert(\\\"Time is up!\\\");\\n            return;\\n        }\\n        timeLeft--;\\n        const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');\\n        const s = (timeLeft % 60).toString().padStart(2, '0');\\n        timerEl.innerText = `${m}:${s}`;\\n    }, 1000);\\n}\\n\\nfunction switchLesson(idx) {\\n    currentLessonIndex = parseInt(idx);\\n    const l = lessonsData[currentLessonIndex];\\n    qs = l.qs; vocab = l.vocab; headings = l.headings; headingKey = l.headingKey;\\n    mifRange = l.mifRange; removeOpt = l.removeOpt; removeFeatureOpt = l.removeFeatureOpt;\\n    pairs = l.pairs; pData = l.pData;\\n\\n    // Reset UI\\n    document.getElementById('articleArea').innerHTML = l.articleHtml;\\n    document.getElementById('headingsArea').innerHTML = l.headingsHtml;\\n    document.getElementById('qs').innerHTML = '';\\n    document.getElementById('progressBar').innerHTML = '';\\n    document.getElementById('saveBtn').style.display = 'none';\\n    \\n    // Reset Timer\\n    clearInterval(timerInterval);\\n    timeLeft = l.timeLimit * 60;\\n    timerEl.innerText = \\\"--:--\\\";\\n    startTimer();\\n\\n    // Render Questions & Attach Events\\n    renderStudentQuestions();\\n    attachEvents();\\n\\n    // Manage Views\\n    if(document.getElementById('game-view').style.display === 'block') initGame();\\n    if(document.getElementById('mif-view').style.display === 'flex') {\\n        document.getElementById('mif-view').style.display = 'none';\\n    }\\n}\\n\\n// --- RENDERING QUESTIONS ---\\nfunction renderStudentQuestions() {\\n    const qDiv=document.getElementById('qs');\\n    qDiv.innerHTML = '';\\n    \\n    qs.forEach(q=>{\\n      if(q.type==='text-only'){ qDiv.innerHTML+=`<div class=\\\"text-only\\\">${q.text}</div>`; }\\n      else if(q.type==='summary') { \\n          let h = `<div class=\\\"q-block\\\" id=\\\"q-card-${q.id}\\\">`;\\n          let txt = q.text.replace(/\\\\n/g, '<br>');\\n          q.gapIds.forEach(gid => {\\n              const isFeat = q.isFeature ? 'true' : 'false';\\n              \\n              const loc = (q.locations && q.locations[gid]) ? q.locations[gid] : \\\"\\\";\\n              const locBtn = loc ? `<button class=\\\"loc-btn\\\" onclick=\\\"showLoc(${q.id}, ${gid})\\\">📍</button>` : \\\"\\\";\\n              \\n              const dz = `<span class=\\\"drop-zone\\\" id=\\\"dz-${gid}\\\" data-gid=\\\"${gid}\\\" data-isfeat=\\\"${isFeat}\\\" ondragover=\\\"allowDrop(event)\\\" ondrop=\\\"drop(event)\\\" onclick=\\\"clearDrop(${gid})\\\"></span><span class=\\\"q-num\\\" style=\\\"vertical-align:super;font-size:10px\\\">${gid}</span>${locBtn}&nbsp;`;\\n              \\n              // Dùng nối chuỗi (String concatenation) thay cho template literal để tránh lỗi invalid token\\n              let replaced = txt.replace(new RegExp(gid + '\\\\\\\\s*([._…-]{2,}|_{2,}|…+)'), dz);\\n              if(replaced === txt) replaced = txt.replace(new RegExp(gid + '[.]\\\\\\\\s+'), dz + ' ');\\n              txt = replaced;\\n              \\n              const d=document.createElement('div'); d.className='progress-circle'; d.id='prog-'+gid; d.innerText=gid;\\n              d.onclick=()=>document.getElementById('q-card-'+q.id).scrollIntoView({behavior:'smooth',block:'center'});\\n              document.getElementById('progressBar').appendChild(d);\\n          });\\n          h += `<div style=\\\"line-height:2;font-size:15px\\\">${txt}</div><div style=\\\"margin-top:15px;display:flex;flex-wrap:wrap;gap:8px;padding-top:10px;border-top:1px dashed #e2e8f0\\\">`;\\n          q.options.forEach(optLine => {\\n              const m = optLine.match(/^([A-Z])\\\\s*[.)]?\\\\s*(.+)/);\\n              if(m) h += `<div class=\\\"heading-item\\\" id=\\\"opt-${q.id}-${m[1]}\\\" style=\\\"display:inline-flex;width:auto;margin:0\\\" draggable=\\\"true\\\" ondragstart=\\\"drag(event)\\\" data-val=\\\"${m[1]}\\\"><span style=\\\"font-weight:bold;color:#2563eb\\\">${m[1]}</span> ${m[2]}</div>`;\\n          });\\n          h += `</div><div id=\\\"fb-${q.id}\\\" style=\\\"margin-top:10px; font-size:13px\\\"></div></div>`;\\n          qDiv.innerHTML += h;\\n      }\\n      else if(q.type==='gap-fill-block') { \\n          let h = `<div class=\\\"q-block\\\" id=\\\"q-card-${q.id}\\\">`;\\n          let txt = q.text.replace(/\\\\n/g, '<br>'); \\n          q.gapIds.forEach(gid => {\\n              const loc = (q.locations && q.locations[gid]) ? q.locations[gid] : \\\"\\\";\\n              const locBtn = loc ? `<button class=\\\"loc-btn\\\" onclick=\\\"showLoc(${q.id}, ${gid})\\\">📍</button>` : \\\"\\\";\\n              const inp = `<span class=\\\"q-num\\\">${gid}</span><input type=\\\"text\\\" class=\\\"gap-input\\\" data-gid=\\\"${gid}\\\" oninput=\\\"upd(${gid})\\\">${locBtn}&nbsp;`;\\t\\n              txt = txt.replace(new RegExp(`${gid}[\\\\\\\\s:.)]*(?:[_….\\\\\\\\-]\\\\\\\\s*){2,}`), inp);\\n              const d=document.createElement('div'); d.className='progress-circle'; d.id='prog-'+gid; d.innerText=gid;\\n              d.onclick=()=>document.getElementById('q-card-'+q.id).scrollIntoView({behavior:'smooth',block:'center'});\\n              document.getElementById('progressBar').appendChild(d);\\n          });\\n          h += `<div style=\\\"line-height:2.2;font-size:16px\\\">${txt}</div><div id=\\\"fb-${q.id}\\\" style=\\\"margin-top:10px; font-size:13px\\\"></div></div>`;\\n          qDiv.innerHTML += h;\\n      }\\n      else if(q.type==='mcq-multi') {\\n          let h = `<div class=\\\"q-block\\\" id=\\\"q-card-${q.id}\\\">`;\\n          const locBtn1 = (q.locations && q.locations[q.gapIds[0]]) ? `<button class=\\\"loc-btn\\\" onclick=\\\"showLoc(${q.id}, ${q.gapIds[0]})\\\">📍</button>` : \\\"\\\";\\n          h += `<div style=\\\"display:flex;align-items:baseline;margin-bottom:8px;\\\"><span class=\\\"q-num\\\">${q.gapIds[0]}-${q.gapIds[q.gapIds.length-1]}</span> <span>${q.text}</span> ${locBtn1}</div>`;\\n          q.options.forEach((o, i) => {\\n              const optLetterMatch = o.match(/^([A-Z])/i);\\n              const optLetter = optLetterMatch ? optLetterMatch[1].toUpperCase() : o.trim()[0].toUpperCase();\\n              h += `<label style=\\\"display:block;margin:5px 0;cursor:pointer;transition:all 0.2s;\\\">\\n                      <input type=\\\"checkbox\\\" name=\\\"mcq_${q.id}\\\" value=\\\"${optLetter}\\\" onchange=\\\"updMcqMulti(${q.id}, '${q.gapIds.join(',')}', event)\\\"> ${o} <span id=\\\"mcq-mark-${q.id}-${i}\\\" class=\\\"mcq-mark\\\"></span>\\n                    </label>`;\\n          });\\n          h += `<div id=\\\"fb-${q.id}\\\" class=\\\"feedback\\\" style=\\\"margin-top:8px;font-size:13px\\\"></div></div>`;\\n          qDiv.innerHTML += h;\\n          q.gapIds.forEach(gid => {\\n              const d=document.createElement('div'); d.className='progress-circle'; d.id='prog-'+gid; d.innerText=gid;\\n              d.onclick=()=>document.getElementById('q-card-'+q.id).scrollIntoView({behavior:'smooth',block:'center'});\\n              document.getElementById('progressBar').appendChild(d);\\n          });\\n      }\\n      else { \\n        let h=`<div class=\\\"q-block\\\" id=\\\"q-card-${q.id}\\\">`;\\n        const loc = q.location || \\\"\\\";\\n        const locBtn = loc ? `<button class=\\\"loc-btn\\\" onclick=\\\"showLoc(${q.id})\\\">📍</button>` : \\\"\\\";\\n        \\n        if(q.type==='gap-fill'){\\n           let t=q.text.replace(/(\\\\d+)[\\\\s:.)]*(?:[_….\\\\-]\\\\s*){2,}/g, '<span class=\\\"q-num\\\">$1</span><input type=\\\"text\\\" class=\\\"gap-input\\\" data-id=\\\"'+q.id+'\\\" oninput=\\\"upd('+q.id+')\\\">'+locBtn+'&nbsp;');\\n           h+=`<div>${t}</div>`;\\n        } else {\\n           h+=`<div style=\\\"display:flex;align-items:baseline\\\"><span class=\\\"q-num\\\">${q.id}.</span> <span>${q.text}</span> ${locBtn}</div>`;\\n           if(q.type==='mcq') q.options.forEach((o, i) => { h += `<label class=\\\"mcq-label\\\" style=\\\"display:block;margin:5px 0;cursor:pointer\\\"><input type=\\\"radio\\\" name=\\\"q${q.id}\\\" value=\\\"${o.trim()[0]}\\\" onchange=\\\"upd(${q.id})\\\"> ${o} <span id=\\\"mcq-mark-${q.id}-${i}\\\" class=\\\"mcq-mark\\\"></span></label>`; });\\n           if(q.type==='tfng') {\\n               h+='<div class=\\\"tfng-container\\\">';\\n               ['TRUE', 'FALSE', 'NOT GIVEN'].forEach(opt => {\\n                   h+=`<label class=\\\"tfng-label\\\"><input type=\\\"radio\\\" name=\\\"tfng${q.id}\\\" value=\\\"${opt}\\\" onchange=\\\"upd(${q.id})\\\"><span class=\\\"tfng-btn\\\">${opt}</span></label>`;\\n               });\\n               h+='</div>';\\n           }\\n           if(q.type==='ynng') {\\n               h+='<div class=\\\"tfng-container\\\">';\\n               ['YES', 'NO', 'NOT GIVEN'].forEach(opt => {\\n                   h+=`<label class=\\\"tfng-label\\\"><input type=\\\"radio\\\" name=\\\"ynng${q.id}\\\" value=\\\"${opt}\\\" onchange=\\\"upd(${q.id})\\\"><span class=\\\"tfng-btn\\\">${opt}</span></label>`;\\n               });\\n               h+='</div>';\\n           }\\n           if(q.type==='mif') {\\n               h+='<div class=\\\"mif-container\\\">';\\n               mifRange.split('').forEach(char => {\\n                   h+=`<label class=\\\"mif-label\\\"><input type=\\\"radio\\\" name=\\\"mif${q.id}\\\" value=\\\"${char}\\\" onchange=\\\"upd(${q.id})\\\"><span class=\\\"mif-circle\\\">${char}</span></label>`;\\n               });\\n               h+='</div>';\\n           }\\n        }\\n        h+=`<div id=\\\"fb-${q.id}\\\" class=\\\"feedback\\\" style=\\\"margin-top:8px;font-size:13px\\\"></div></div>`;\\n        qDiv.innerHTML+=h;\\n        const d=document.createElement('div'); d.className='progress-circle'; d.id='prog-'+q.id; d.innerText=q.id;\\n        d.onclick=()=>document.getElementById('q-card-'+q.id).scrollIntoView({behavior:'smooth',block:'center'});\\n        document.getElementById('progressBar').appendChild(d);\\n      }\\n    });\\n\\n    document.querySelectorAll('input[type=\\\"radio\\\"][name^=\\\"mif\\\"]').forEach(radio => {\\n        radio.addEventListener('change', (e) => {\\n            const qId = radio.name.replace('mif', '');\\n            const pChar = radio.value;\\n            document.querySelectorAll(`.mif-inline-btn[data-qid=\\\"${qId}\\\"]`).forEach(btn => {\\n                const btnPara = btn.closest('.mif-inline-box').dataset.para;\\n                if(btnPara === pChar) {\\n                    btn.classList.remove('hidden-by-other');\\n                    btn.classList.add('selected');\\n                } else {\\n                    btn.classList.remove('selected');\\n                    btn.classList.add('hidden-by-other');\\n                }\\n            });\\n        });\\n    });\\n}\\n\\nfunction attachEvents() {\\n    const pp = document.getElementById('popup');\\n    document.querySelectorAll('.vocab').forEach(s => {\\n      s.onclick = e => {\\n        const v = vocab.find(x => x.id === s.dataset.vid); if(!v) return;\\n        pp.innerHTML = `<div style=\\\"background:#1e293b;color:#fff;padding:12px;font-weight:700;display:flex;justify-content:space-between;align-items:center\\\"><div><span>${v.word}</span> <span style=\\\"font-weight:normal;font-size:12px;color:#94a3b8;margin-left:8px\\\">${v.phonetic||''}</span></div><span onclick=\\\"speak('${v.word}')\\\" style=\\\"cursor:pointer;background:#334155;padding:4px;border-radius:50%\\\">🔊</span></div><div style=\\\"padding:16px;font-size:14px;color:#334155\\\"><p style=\\\"margin-bottom:8px\\\"><b style=\\\"color:#0f172a\\\">Meaning:</b> ${v.meaning}</p><p style=\\\"margin-bottom:8px\\\"><b style=\\\"color:#0f172a\\\">Synonyms:</b> ${v.synonym}</p><div style=\\\"background:#f1f5f9;padding:8px;border-radius:6px;margin-top:8px;color:#475569;font-style:italic\\\">\\\"${v.example}\\\"</div></div>`;\\n        pp.style.display = 'block'; pp.style.top = (e.clientY+10) + 'px'; pp.style.left = Math.min(e.clientX, window.innerWidth-330) + 'px';\\n        e.stopPropagation();\\n      }\\n    });\\n\\n    document.querySelectorAll('.sent').forEach(el => {\\n        el.addEventListener('mouseenter', () => {\\n            const tid = el.getAttribute('data-target'); const t = document.getElementById(tid);\\n            if(t) t.style.backgroundColor = '#fef08a'; \\n        });\\n        el.addEventListener('mouseleave', () => {\\n            const tid = el.getAttribute('data-target'); const t = document.getElementById(tid);\\n            if(t) t.style.backgroundColor = 'transparent';\\n        });\\n    });\\n}\\n\\nfunction allowDrop(ev) { ev.preventDefault(); }\\nfunction drag(ev) { \\n    const el = ev.target.closest('[draggable=\\\"true\\\"]') || ev.target;\\n    const val = el.dataset.val || el.innerText.split('.')[0].trim();\\n    ev.dataTransfer.setData(\\\"text\\\", val); \\n    ev.dataTransfer.se
