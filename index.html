ers from the university.</p>\n<p data-time=\"71.800\">And what if I don\\'t like the other students in the flat?</p>\n<p data-time=\"77.180\">What else is there?</p>\n<p data-time=\"79.280\">Two buildings near the university.</p>\n<p data-time=\"82.220\">How would house and Morgan house?</p>\n<p data-time=\"84.361\">How would house is more expensive but there\\'s</p>\n<p data-time=\"88.180\">a canteen and the price includes meals.</p>\n<p data-time=\"92.900\">Morgan house is cheaper but you only pay for your room.</p>\n<p data-time=\"97.600\">So there\\'s no canteen in Morgan house.</p>\n<p data-time=\"100.660\">That\\'s right.</p>\n<p data-time=\"102.000\">But on each floor there\\'s a kitchen and four bathrooms.</p>\n<p data-time=\"107.100\">Oh, and there are 25 students on each floor.</p>\n<p data-time=\"111.930\">So, which one do you think is better?</p>\n<p data-time=\"115.370\">How would house or Morgan house?</p>\n<p data-time=\"118.170\">Well, they sound good but I want to see them and meet the students who live there.</p>\n<p data-time=\"125.090\">Right, because what do you do if you don\\'t like them?</p>\n<p data-time=\"129.390\">That could be a problem.</p>\n<p data-time=\"133.250\">Now listen again.</p>\n<p data-time=\"136.590\">Where are you going to live while you\\'re at university, Lisa?</p>\n<p data-time=\"141.710\">I\\'m not sure.</p>\n<p data-time=\"143.670\">It isn\\'t easy, is it Robin?</p>\n<p data-time=\"146.350\">A secretary I spoke to told me about some university flats.</p>\n<p data-time=\"151.330\">But I\\'d also like to look online and visit some other places.</p>\n<p data-time=\"156.870\">What does the university offer?</p>\n<p data-time=\"158.711\">There are 20 flats in an apartment building in the city centre.</p>\n<p data-time=\"164.310\">Four students share a flat.</p>\n<p data-time=\"167.150\">But I\\'m not sure about it.</p>\n<p data-time=\"170.170\">It\\'s 9 kilometers from the university.</p>\n<p data-time=\"173.890\">And what if I don\\'t like the other students in the flat?</p>\n<p data-time=\"179.030\">What else is there?</p>\n<p data-time=\"181.190\">Two buildings near the university.</p>\n<p data-time=\"184.190\">How would house and Morgan house?</p>\n<p data-time=\"186.311\">How would house is more expensive but there\\'s</p>\n<p data-time=\"190.103\">a canteen and the price includes meals.</p>\n<p data-time=\"194.710\">Morgan house is cheaper but you only pay for your room.</p>\n<p data-time=\"199.530\">So there\\'s no canteen in Morgan house.</p>\n<p data-time=\"202.590\">That\\'s right.</p>\n<p data-time=\"203.910\">But on each floor, there\\'s a kitchen and four bathrooms.</p>\n<p data-time=\"209.030\">Oh, and there are 25 students on each floor.</p>\n<p data-time=\"213.870\">So, which one do you think is better?</p>\n<p data-time=\"217.290\">How would house or Morgan house?</p>\n<p data-time=\"219.710\">Well, they sound good.</p>\n<p data-time=\"222.450\">But I want to see them and meet the students who live there.</p>\n<p data-time=\"226.690\">Right.</p>\n<p data-time=\"227.690\">Because what do you do if you don\\'t like them?</p>\n<p data-time=\"231.150\">That could be a problem.</p>\n<p data-time=\"234.970\">That is the end of Part 3.</p>\n","processedQuestions":"<div id=\"q-auto-0\" class=\"question-block bg-white p-3 rounded shadow-sm mb-3 border relative group\"><p class=\"font-bold mb-2\">11. Lisa</p><div class=\"space-y-1\"><label class=\"flex items-start cursor-pointer hover:bg-gray-50 rounded p-1\"><input type=\"radio\" name=\"q-auto-0\" class=\"mt-1 mr-2\"><span><b>A.</b> has found possible places to live online.</span></label><label class=\"flex items-start cursor-pointer hover:bg-gray-50 rounded p-1\"><input type=\"radio\" name=\"q-auto-0\" class=\"mt-1 mr-2\"><span><b>B.</b> has talked to someone about places to live.</span></label><label class=\"flex items-start cursor-pointer hover:bg-gray-50 rounded p-1\"><input type=\"radio\" name=\"q-auto-0\" class=\"mt-1 mr-             const sourceId = ev.dataTransfer.getData("sourceId");
            const lesson = lessonsData[currentLessonIndex];
            
            // Hoàn trả lại item cũ nếu drop-zone đã có item
            if (lesson.removeDragged && ev.currentTarget.dataset.sourceId) {
                const oldSource = document.getElementById(ev.currentTarget.dataset.sourceId);
                if(oldSource) oldSource.classList.remove('used');
            }

            ev.currentTarget.innerHTML = `<span class="dropped-item">${data}</span>`; 
            ev.currentTarget.dataset.value = data.split('.')[0].trim(); 
            ev.currentTarget.dataset.sourceId = sourceId;

            // Làm mờ item mới kéo vào
            if (lesson.removeDragged && sourceId) {
                const sourceEl = document.getElementById(sourceId);
                if(sourceEl) sourceEl.classList.add('used');
            }
        }

        // Xử lý Click vào Drop Zone để trả item về danh sách gốc
        function handleDropZoneClick(ev) {
            const lesson = lessonsData[currentLessonIndex];
            if (!lesson.removeDragged) return;
            const dz = ev.currentTarget;
            if (dz.dataset.sourceId) {
                const sourceEl = document.getElementById(dz.dataset.sourceId);
                if (sourceEl) sourceEl.classList.remove('used');
                dz.innerHTML = '';
                dz.dataset.value = '';
                dz.dataset.sourceId = '';
            }
        }

        function switchLesson(index) {
            currentLessonIndex = parseInt(index);
            renderLesson(lessonsData[currentLessonIndex]);
            resetState();
        }

        function renderLesson(lesson) {
            const audio = document.getElementById('audio');
            audio.src = lesson.audio;
            document.getElementById('transcript').innerHTML = lesson.processedTranscript;
            document.getElementById('questions-content').innerHTML = lesson.processedQuestions;
            
            const imgPane = document.getElementById('pane-image');
            const imgResizer = document.getElementById('resizer-2');
            if (lesson.image && lesson.image.trim() !== "") {
                document.getElementById('exercise-img').src = lesson.image;
                imgPane.classList.remove('hidden'); imgResizer.classList.remove('hidden');
            } else {
                imgPane.classList.add('hidden'); imgResizer.classList.add('hidden');
            }

            const transWrap = document.getElementById('transcript-container');
            const transPlace = document.getElementById('transcript-placeholder');
            document.getElementById('trans-btn-container').innerHTML = `<span class="text-xs text-slate-400"><i class="fa-solid fa-music mr-1"></i>Audio Source</span>
                <button onclick="toggleTrans()" class="bg-slate-700 hover:bg-slate-600 text-white px-3 py-1 rounded text-xs transition border border-slate-500">${lesson.hideTrans ? 'Hiện Văn Bản' : 'Ẩn Văn Bản'}</button>`;
            
            if (lesson.hideTrans) { transWrap.classList.add('hidden'); transPlace.classList.remove('hidden'); }
            else { transWrap.classList.remove('hidden'); transPlace.classList.add('hidden'); }

            attachAudioListeners();
            setTimeout(initResize, 100);
        }

        function toggleTrans() {
            document.getElementById('transcript-container').classList.toggle('hidden');
            document.getElementById('transcript-placeholder').classList.toggle('hidden');
        }

        function resetState() {
            document.getElementById('result-message').classList.add('hidden');
            seconds = 0; if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                seconds++;
                const m = Math.floor(seconds/60).toString().padStart(2, '0');
                const s = (seconds%60).toString().padStart(2, '0');
                document.getElementById('timer').innerText = `${m}:${s}`;
            }, 1000);
        }

        function attachAudioListeners() {
            const audio = document.getElementById('audio');
            const paras = document.querySelectorAll('#transcript p');
            activePara = null;
            
            audio.ontimeupdate = () => {
                const time = audio.currentTime;
                const alerts = document.querySelectorAll('.alert-trigger');
                let current = null;
                
                paras.forEach(p => {
                    const t = parseFloat(p.dataset.time);
                    p.classList.remove('active');
                    if (time >= t) current = p;
                });

                if (current) {
                    current.classList.add('active');
                    if (!document.getElementById('transcript-container').classList.contains('hidden')) {
                        if (current !== activePara) current.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                    activePara = current;

                    // Sparkles trigger
                    current.querySelectorAll('.keyword-sparkle').forEach(sp => {
                        sp.classList.remove('trigger');
                        void sp.offsetWidth;
                        sp.classList.add('trigger');
                        const targetId = sp.dataset.targetInput;
                        if (targetId) {
                            const inputEl = document.getElementById(targetId);
                            if (inputEl) {
                                inputEl.classList.add('highlight-input');
                                setTimeout(() => inputEl.classList.remove('highlight-input'), 2000);
                            }
                        }
                    });
                }
                
                // Alerts trigger (Chỉ kích hoạt highlight block, đã bỏ chuông)
                alerts.forEach(al => {
                    let parentP = al.closest('p');
                    if(!parentP) {
                        let prev = al.previousElementSibling;
                        while(prev && prev.tagName !== 'P') prev = prev.previousElementSibling;
                        if(prev) parentP = prev;
                    }
                    if(parentP && parentP.dataset.time) {
                        const t = parseFloat(parentP.dataset.time);
                        if (time >= t && time < t + 1) {
                            const targetId = al.dataset.targetQuestion;
                            if (targetId) {
                                const block = document.getElementById(targetId);
                                if(block) { block.classList.add('highlight-block'); setTimeout(() => block.classList.remove('highlight-block'), 5000); block.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
                            }
                        }
                    }
                });
            };
            paras.forEach(p => { p.onclick = () => { audio.currentTime = parseFloat(p.dataset.time); audio.play(); }; });
        }

        function initResize() {
           const mainContainer = document.getElementById('main-container');
           if(!mainContainer || window.innerWidth < 768) return; 

           const resizer1 = document.getElementById('resizer-1');
           const paneTrans = document.getElementById('pane-transcript');
           if(resizer1 && paneTrans) {
               const newResizer1 = resizer1.cloneNode(true);
               resizer1.parentNode.replaceChild(newResizer1, resizer1);
               newResizer1.addEventListener('mousedown', function(e) {
                   e.preventDefault(); newResizer1.classList.add('active'); document.body.style.cursor = 'col-resize';
                   const startX = e.clientX; const startWidth = paneTrans.getBoundingClientRect().width; const containerWidth = mainContainer.getBoundingClientRect().width;
                   function onMouseMove(e) { const dx = e.clientX - startX; let newWidth = ((startWidth + dx) / containerWidth) * 100; if(newWidth < 20) newWidth = 20; if(newWidth > 60) newWidth = 60; paneTrans.style.width = newWidth + '%'; }
                   function onMouseUp() { newResizer1.classList.remove('active'); document.body.style.cursor = ''; document.removeEventListener('mousemove', onMouseMove); document.removeEventListener('mouseup', onMouseUp); }
                   document.addEventListener('mousemove', onMouseMove); document.addEventListener('mouseup', onMouseUp);
               });
           }

           const resizer2 = document.getElementById('resizer-2');
           const paneImage = document.getElementById('pane-image');
           const paneRight = document.getElementById('pane-right');
           if(resizer2 && paneImage && paneRight && !paneImage.classList.contains('hidden')) {
               const newResizer2 = resizer2.cloneNode(true);
               resizer2.parentNode.replaceChild(newResizer2, resizer2);
               newResizer2.addEventListener('mousedown', function(e) {
                   e.preventDefault(); newResizer2.classList.add('active'); document.body.style.cursor = 'col-resize';
                   const startX = e.clientX; const startWidth = paneImage.getBoundingClientRect().width; const rightContainerWidth = paneRight.getBoundingClientRect().width;
                   function onMouseMove(e) { const dx = startX - e.clientX; let newWidth = ((startWidth + dx) / rightContainerWidth) * 100; if(newWidth < 15) newWidth = 15; if(newWidth > 50) newWidth = 50; paneImage.style.width = newWidth + '%'; }
                   function onMouseUp() { newResizer2.classList.remove('active'); document.body.style.cursor = ''; document.removeEventListener('mousemove', onMouseMove); document.removeEventListener('mouseup', onMouseUp); }
                   document.addEventListener('mousemove', onMouseMove); document.addEventListener('mouseup', onMouseUp);
               });
           }
        }
        window.addEventListener('resize', initResize);

        function checkResults() {
            const lesson = lessonsData[currentLessonIndex];
            const key = lesson.answerKey;
            let score = 0; let total = 0;
            if(Object.keys(key).length === 0) return alert("Chưa cài đặt đáp án.");

            document.querySelectorAll('.correct-feedback').forEach(e => e.remove());
            document.querySelectorAll('.correct-answer, .incorrect-answer, .correct-text').forEach(e => e.classList.remove('correct-answer', 'incorrect-answer', 'correct-text'));

            for(const [id, val] of Object.entries(key)) {
                const el = document.getElementById(id);
                if(el && (el.tagName === 'INPUT' || el.classList.contains('drop-zone'))) {
                    total++;
                    let userVal = el.tagName === 'INPUT' ? el.value.trim().toLowerCase() : (el.dataset.value || "").trim().toLowerCase();
                    const options = val.split(/[,\/]/).map(s => s.trim().toLowerCase());
                    if(options.includes(userVal)) {
                        score++; el.classList.add('correct-answer');
                    } else {
                        el.classList.add('incorrect-answer');
                        const div = document.createElement('div'); div.className = 'correct-feedback'; div.innerText = `Correct: ${val}`; el.after(div);
                    }
                } else {
                    const inputs = document.getElementsByName(id);
                    if(inputs.length > 0) {
                        const type = inputs[0].type;
                        if(type === 'radio') {
                            total++;
                            let selected = ""; for(let i of inputs) if(i.checked) selected = i.parentElement.innerText.trim().charAt(0).toUpperCase();
                            if(selected === val.toUpperCase()) { score++; }
                            for(let i of inputs) {
                                const char = i.parentElement.innerText.trim().charAt(0).toUpperCase();
                                if(char === val.toUpperCase()) i.parentElement.classList.add('correct-text');
                                if(i.checked && char !== val.toUpperCase()) i.parentElement.classList.add('incorrect-answer');
                            }
                        } else if(type === 'checkbox') {
                            const keyArr = val.toUpperCase().split(/[,\s/&]+/).filter(x=>x);
                            total += keyArr.length;
                            let correctCount = 0;
                            for(let i of inputs) {
                                const char = i.parentElement.innerText.trim().charAt(0).toUpperCase();
                                if(keyArr.includes(char)) {
                                    i.parentElement.classList.add('correct-text');
                                }
                                if(i.checked) {
                                    if(keyArr.includes(char)) {
                                        correctCount++;
                                    } else {
                                        i.parentElement.classList.add('incorrect-answer');
                                    }
                                }
                            }
                            score += correctCount;
                        }
                    }
                }
            }
            const msg = document.getElementById('result-message');
            msg.innerText = `Kết quả: ${score}/${total} câu đúng`;
            msg.classList.remove('hidden');
        }

        window.onload = () => {
            const selector = document.getElementById('lesson-selector');
            lessonsData.forEach((l, i) => {
                const opt = document.createElement('option'); opt.value = i; opt.innerText = l.name;
                selector.appendChild(opt);
            });
            switchLesson(0);
        };
    </script>
</body>
