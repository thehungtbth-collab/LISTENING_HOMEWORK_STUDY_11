xvi=\\\"Bọn trẻ đang chơi bên ngoài.\\\">outside</div><div class=\\\"token\\\" draggable=\\\"true\\\" data-id=\\\"3\\\" data-word=\\\"coach\\\" data-mean=\\\"huấn luyện viên\\\" data-syn=\\\"trainer, instructor\\\" data-exen=\\\"The football coach is very strict.\\\" data-exvi=\\\"Huấn luyện viên bóng đá rất nghiêm khắc.\\\">coach</div><div class=\\\"token\\\" draggable=\\\"true\\\" data-id=\\\"11\\\" data-word=\\\"upload\\\" data-mean=\\\"tải lên\\\" data-syn=\\\"send, transfer\\\" data-exen=\\\"Please upload the file to the system.\\\" data-exvi=\\\"Vui lòng tải tệp lên hệ thống.\\\">upload</div>\\n            </div>\\n            <p style=\\\"font-size:0.85em; color:#666; margin-top:10px\\\">Drag words to the gaps. Click a filled gap to remove the word.</p>\\n        </div>\\n    </div>\\n</div>\\n\\n<div class=\\\"vocab-overlay\\\" id=\\\"vocabOverlay\\\"></div>\\n<div class=\\\"vocab-popup\\\" id=\\\"vocabPopup\\\">\\n  <h4><span id=\\\"popWord\\\"></span><div><button class=\\\"speak-btn\\\" id=\\\"popSpeak\\\">🔊</button><button class=\\\"close-btn\\\" id=\\\"popClose\\\">&times;</button></div></h4>\\n  <p><strong>Nghĩa:</strong> <span id=\\\"popMeaning\\\"></span></p>\\n  <p><strong>Đồng nghĩa:</strong> <span id=\\\"popSynonym\\\"></span></p>\\n  <p class=\\\"ex-en\\\" id=\\\"popExEn\\\"></p>\\n  <p class=\\\"ex-vi\\\" id=\\\"popExVi\\\"></p>\\n</div>\\n\\n<script>\\n    const gapsData = [{\\\"index\\\":1,\\\"word\\\":\\\"birthday presents\\\"},{\\\"index\\\":2,\\\"word\\\":\\\"science project\\\"},{\\\"index\\\":3,\\\"word\\\":\\\"convenient\\\"},{\\\"index\\\":4,\\\"word\\\":\\\"boat tour\\\"},{\\\"index\\\":5,\\\"word\\\":\\\"boat tour\\\"},{\\\"index\\\":6,\\\"word\\\":\\\"boat tour\\\"},{\\\"index\\\":7,\\\"word\\\":\\\"tourists\\\"},{\\\"index\\\":8,\\\"word\\\":\\\"outside\\\"},{\\\"index\\\":9,\\\"word\\\":\\\"tickets\\\"},{\\\"index\\\":10,\\\"word\\\":\\\"notice\\\"},{\\\"index\\\":11,\\\"word\\\":\\\"cloudy\\\"},{\\\"index\\\":12,\\\"word\\\":\\\"upload\\\"},{\\\"index\\\":13,\\\"word\\\":\\\"coach\\\"}];\\n    const mcqData = [{\\\"id\\\":\\\"mcq0.8934157297518268\\\",\\\"question\\\":\\\"You will hear a girl, Teresa, talking to her friend.        Who’s Teresa waiting for?\\\",\\\"options\\\":[{\\\"key\\\":\\\"A\\\",\\\"text\\\":\\\"a classmate\\\",\\\"correct\\\":false},{\\\"key\\\":\\\"B\\\",\\\"text\\\":\\\"a member of her family\\\",\\\"correct\\\":true},{\\\"key\\\":\\\"C\\\",\\\"text\\\":\\\"a teacher\\\",\\\"correct\\\":false}],\\\"marker\\\":\\\"\\\"},{\\\"id\\\":\\\"mcq0.5473999199755432\\\",\\\"question\\\":\\\"You will hear a boy phoning his mother.        Why is he phoning her?\\\",\\\"options\\\":[{\\\"key\\\":\\\"A\\\",\\\"text\\\":\\\"to ask about something\\\",\\\"correct\\\":true},{\\\"key\\\":\\\"B\\\",\\\"text\\\":\\\"to give her some news\\\",\\\"correct\\\":false},{\\\"key\\\":\\\"C\\\",\\\"text\\\":\\\"to say sorry for something.\\\",\\\"correct\\\":false}],\\\"marker\\\":\\\"\\\"},{\\\"id\\\":\\\"mcq0.11969489012151724\\\",\\\"question\\\":\\\"You will hear two friends talking about a new café.        How will they find out where the new café is?\\\",\\\"options\\\":[{\\\"key\\\":\\\"A\\\",\\\"text\\\":\\\"They’ll ask another friend.\\\",\\\"correct\\\":false},{\\\"key\\\":\\\"B\\\",\\\"text\\\":\\\"They’ll check on the internet.\\\",\\\"correct\\\":false},{\\\"key\\\":\\\"C\\\",\\\"text\\\":\\\"They’ll look at a poster.\\\",\\\"correct\\\":true}],\\\"marker\\\":\\\"\\\"},{\\\"id\\\":\\\"mcq0.44634412216947494\\\",\\\"question\\\":\\\"You hear a girl and her dad talking about a boat tour.        Why do they decide to go on the boat tour today?\\\",\\\"options\\\":[{\\\"key\\\":\\\"A\\\",\\\"text\\\":\\\"It’s cheap today.\\\",\\\"correct\\\":false},{\\\"key\\\":\\\"B\\\",\\\"text\\\":\\\"The weather’s good.\\\",\\\"correct\\\":false},{\\\"key\\\":\\\"C\\\",\\\"text\\\":\\\"They know the guide.\\\",\\\"correct\\\":true}],\\\"marker\\\":\\\"\\\"},{\\\"id\\\":\\\"mcq0.29093994813607715\\\",\\\"question\\\":\\\"You will hear a boy, Hugo, talking to his teacher.        What must Hugo do first?\\\",\\\"options\\\":[{\\\"key\\\":\\\"A\\\",\\\"text\\\":\\\"help another teacher\\\",\\\"correct\\\":false},{\\\"key\\\":\\\"B\\\",\\\"text\\\":\\\"help the school secretary\\\",\\\"correct\\\":true},{\\\"key\\\":\\\"C\\\",\\\"text\\\":\\\"help another student\\\",\\\"correct\\\":false}],\\\"marker\\\":\\\"\\\"}];\\n    const transcriptData = [];\\n    const startTime = 0;\\n    const audio = document.getElementById('mainAudio');\\n\\n    function playFromStart() { audio.currentTime = startTime; audio.play(); }\\n\\n    const transDiv = document.getElementById('transcriptContent');\\n    if(transcriptData.length > 0) {\\n        transcriptData.forEach((seg, idx) => {\\n            const span = document.createElement('span');\\n            span.className = 'ts-seg';\\n            span.id = 'seg-' + idx;\\n            const badge = seg.isMarker ? ('<sup class=\\\"ts-marker\\\">' + seg.id + '</sup>') : '';\\n            span.innerHTML = seg.text + badge + ' '; \\n            transDiv.appendChild(span);\\n        });\\n    }\\n\\n    document.getElementById('toggleTranscript').addEventListener('change', (e) => {\\n        document.getElementById('transcriptBox').classList.toggle('visible', e.target.checked);\\n    });\\n\\n    let warningPlayedFor = {}; \\n    const AudioContext = window.AudioContext || window.webkitAudioContext;\\n    let audioCtx = new AudioContext();\\n    function playBeep() {\\n        if(audioCtx.state === 'suspended') audioCtx.resume();\\n        const osc = audioCtx.createOscillator();\\n        const gain = audioCtx.createGain();\\n        osc.connect(gain);\\n        gain.connect(audioCtx.destination);\\n        osc.type = 'sine'; osc.frequency.setValueAtTime(440, audioCtx.currentTime); \\n        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);\\n        osc.start(); osc.stop(audioCtx.currentTime + 0.3);\\n    }\\n\\n    audio.addEventListener('timeupdate', () => {\\n        const ct = audio.currentTime;\\n        transcriptData.forEach((seg, idx) => {\\n            if(!seg.isMarker || !seg.time || seg.time <= 0) return;\\n\\n            // Warning: 5s before\\n            if(ct >= (seg.time - 5) && ct < seg.time) {\\n                if(!warningPlayedFor[idx]) {\\n                    playBeep(); \\n                    \\n                    // --- WARNING TRIGGER ---\\n                    // Select by data-marker\\n                    const qDiv = document.querySelector('.mcq-q[data-marker=\\\"' + seg.id + '\\\"]');\\n                    if(qDiv) {\\n                        qDiv.classList.add('warning-active');\\n                        setTimeout(() => qDiv.classList.remove('warning-active'), 4000);\\n                        qDiv.scrollIntoView({behavior: \\\"smooth\\\", block: \\\"center\\\"});\\n                    }\\n                    \\n                    warningPlayedFor[idx] = true;\\n                }\\n            }\\n            \\n            const el = document.getElementById('seg-' + idx);\\n            if(el) {\\n                if(ct >= (seg.time - 8) && ct <= (seg.time + 2)) {\\n                    el.classList.add('active');\\n                } else {\\n                    el.classList.remove('active');\\n                }\\n            }\\n        });\\n    });\\n\\n    // Gaps Logic\\n    const tokens = document.querySelectorAll('.token');\\n    tokens.forEach(t => {\\n        // Drag\\n        t.addEventListener('dragstart', e => e.dataTransfer.setData('text/plain', t.dataset.id));\\n        \\n        // CLICK TO SPEAK (NEW)\\n        // CLICK MỞ POPUP CHO HỌC SINH\\n        t.addEventListener('click', () => {\\n            document.getElementById('popWord').textContent = t.dataset.word;\\n            document.getElementById('popMeaning').textContent = t.dataset.mean || '---';\\n            document.getElementById('popSynonym').textContent = t.dataset.syn || '---';\\n            document.getElementById('popExEn').textContent = t.dataset.exen ? '\\\"' + t.dataset.exen + '\\\"' : '';\\n            document.getElementById('popExVi').textContent = t.dataset.exvi || '';\\n            \\n            document.getElementById('vocabOverlay').style.display = 'block';\\n            document.getElementById('vocabPopup').style.display = 'block';\\n            \\n            document.getElementById('popSpeak').onclick = () => {\\n                if('speechSynthesis' in window) {\\n                    window.speechSynthesis.cancel();\\n                    const u = new SpeechSynthesisUtterance(t.dataset.word);\\n                    u.lang='en-US'; window.speechSynthesis.speak(u);\\n                }\\n            };\\n        });\\n        \\n        // Đóng pop-up\\n        const closePop = () => { document.getElementById('vocabOverlay').style.display = 'none'; document.getElementById('vocabPopup').style.display = 'none'; };\\n        document.getElementById('popClose').onclick = closePop;\\n        document.getElementById('vocabOverlay').onclick = closePop;\\n    });\\n\\n    const gaps = document.querySelectorAll('.gap');\\n    gaps.forEach(g => {\\n        g.addEventListener('dragover', e => e.preventDefault());\\n        g.addEventListener('drop', e => {\\n            e.preventDefault();\\n            const id = e.dataTransfer.getData('text/plain');\\n            const token = document.querySelector('.token[data-id=\\\"'+id+'\\\"]');\\n            if(!token) return;\\n            if(g.dataset.tid) { const old = document.querySelector('.token[data-id=\\\"'+g.dataset.tid+'\\\"]'); if(old) old.classList.remove('used'); }\\n            g.textContent = token.textContent; g.dataset.tid = id; token.classList.add('used');\\n            g.classList.remove('correct','wrong');\\n            const fb = g.nextSibling; if(fb && fb.classList.contains('gap-feedback')) fb.remove();\\n        });\\n        g.addEventListener('click', () => {\\n            if(g.dataset.tid) {\\n                const t = document.querySelector('.token[data-id=\\\"'+g.dataset.tid+'\\\"]');\\n                if(t) t.classList.remove('used');\\n                g.textContent = ''; delete g.dataset.tid; g.classList.remove('correct','wrong');\\n                const fb = g.nextSibling; if(fb && fb.classList.contains('gap-feedback')) fb.remove();\\n            }\\n        });\\n    });\\n\\n    window.checkGaps = function() {\\n        let score = 0; document.querySelectorAll('.gap-feedback').forEach(e => e.remove());\\n        gaps.forEach(g => {\\n            const idx = parseInt(g.dataset.idx); const ansObj = gapsData.find(x => x.index === idx); if(!ansObj) return;\\n            if(g.textContent.trim().toLowerCase() === ansObj.word.trim().toLowerCase()) { g.classList.add('correct'); g.classList.remove('wrong'); score++; } \\n            else { g.classList.add('wrong'); g.classList.remove('correct'); const s = document.createElement('span'); s.className = 'gap-feedback'; s.textContent = ansObj.word; g.parentNode.insertBefore(s, g.nextSibling); }\\n        });\\n        alert('Score: ' + score + '/' + gapsData.length);\\n    };\\n    window.resetGaps = function() {\\n        gaps.forEach(g => { if(g.dataset.tid) { const t = document.querySelector('.token[data-id=\\\"'+g.dataset.tid+'\\\"]'); if(t) t.classList.remove('used'); } g.textContent = ''; delete g.dataset.tid; g.classList.remove('correct','wrong'); });\\n        document.querySelectorAll('.gap-feedback').forEach(e => e.remove());\\n    };\\n\\n    // MCQ Logic\\n    const mcqContainer = document.getElementById('mcqContainer');\\n    mcqData.forEach((m, i) => {\\n        const d = document.createElement('div'); d.className = 'mcq-q'; d.dataset.id = m.id;\\n        if(m.marker) d.dataset.marker = m.marker;\\n        \\n        d.innerHTML = '<strong>' + (i+1) + '. ' + m.question + '</strong>';\\n        m.options.forEach(o => d.innerHTML += '<label><input type=\\\"checkbox\\\" value=\\\"'+o.key+'\\\"> '+o.key+'. '+o.text+'</label>');\\n        mcqContainer.appendChild(d);\\n    });\\n    window.checkMcq = function() {\\n        let score = 0; document.querySelectorAll('.mcq-feedback').forEach(e=>e.remove());\\n        mcqData.forEach(m => {\\n            const div = document.querySelector('.mcq-q[data-id=\\\"'+m.id+'\\\"]');\\n            const inputs = div.querySelectorAll('input:checked');\\n            const chosen = Array.from(inputs).map(i=>i.value);\\n            const correct = m.options.filter(o=>o.correct).map(o=>o.key);\\n            const isCorrect = chosen.length === correct.length && chosen.every(v => correct.includes(v));\\n            const fb = document.createElement('div'); fb.className = 'mcq-feedback';\\n            if(isCorrect) { fb.style.color = 'green'; fb.textContent = 'Correct!'; score++; } \\n            else { fb.style.color = 'red'; fb.textContent = 'Incorrect. Key: ' + correct.join(', '); }\\n            div.appendChild(fb);\\n        });\\n        document.getElementById('mcqScore').textContent = 'MCQ Score: ' + score + '/' + mcqData.length;\\n    };\\n    window.resetMcq = function() { document.querySelectorAll('.mcq-q input').forEach(i => i.checked = false); document.querySelectorAll('.mcq-feedback').forEach(e=>e.remove()); document.getElementById('mcqScore').textContent = ''; };\\n<\\/script>\\n</body>\\n</html>\"}];\n    const select = document.getElementById('selectBai');\n    const openBtn = document.getElementById('openBtn');\n    const clearBtn = document.getElementById('clearBtn');\n    const frame = document.getElementById('frame');\n    const controlsBar = document.getElementById('controlsBar');\n\n    // populate select\n    items.forEach((it, idx) => {\n      const opt = document.createElement('option');\n      opt.value = idx;\n      opt.textContent = it.name || it.filename || ('Bài ' + (idx+1));\n      select.appendChild(opt);\n    });\n\n    function enterFullscreenMode() {\n      // hide controls and expand iframe\n      controlsBar.classList.add('hidden');\n      frame.classList.add('fullscreen-frame');\n\n      // create close button if chưa có\n      if (!document.getElementById('closeFullscreen')) {\n        const btn = document.createElement('button');\n        btn.id = 'closeFullscreen';\n        btn.textContent = 'Đóng toàn màn hình';\n        btn.onclick = exitFullscreenMode;\n        document.body.appendChild(btn);\n      }\n    }\n\n    function exitFullscreenMode() {\n      // restore controls and iframe\n      controlsBar.classList.remove('hidden');\n      frame.classList.remove('fullscreen-frame');\n      const btn = document.getElementById('closeFullscreen');\n      if (btn) btn.remove();\n    }\n\n    openBtn.onclick = () => {\n      const v = select.value;\n      if (v === '') {\n        alert('Vui lòng chọn một bài.');\n        return;\n      }\n      const it = items[+v];\n      frame.srcdoc = it.content;\n\n      // vào chế độ toàn màn hình\n      enterFullscreenMode();\n    };\n\n    clearBtn.onclick = () => {\n      select.value = '';\n      frame.srcdoc = '<p>Chưa chọn bài</p>';\n    };\n\n    // allow Enter key to open when select focused\n    select.addEventListener('keydown', (e) => {\n      if (e.key === 'Enter') openBtn.click();\n    });\n\n    // Escape để thoát toàn màn hình\n    document.addEventListener('keydown', (e) => {\n      if (e.key === 'Escape') {\n        exitFullscreenMode();\n      }\n    });\n  <\/script>\n</body>\n</html>"}];
    const select = document.getElementById('selectBai');
    const openBtn = document.getElementById('openBtn');
    const clearBtn = document.getElementById('clearBtn');
    const frame = document.getElementById('frame');
    const controlsBar = document.getElementById('controlsBar');

    // populate select
    items.forEach((it, idx) => {
      const opt = document.createElement('option');
      opt.value = idx;
      opt.textContent = it.name || it.filename || ('Bài ' + (idx+1));
      select.appendChild(opt);
    });

    function enterFullscreenMode() {
      // hide controls and expand iframe
      controlsBar.classList.add('hidden');
      frame.classList.add('fullscreen-frame');

      // create close button if chưa có
      if (!document.getElementById('closeFullscreen')) {
        const btn = document.createElement('button');
        btn.id = 'closeFullscreen';
        btn.textContent = 'Đóng toàn màn hình';
        btn.onclick = exitFullscreenMode;
        document.body.appendChild(btn);
      }
    }

    function exitFullscreenMode() {
      // restore controls and iframe
      controlsBar.classList.remove('hidden');
      frame.classList.remove('fullscreen-frame');
      const btn = document.getElementById('closeFullscreen');
      if (btn) btn.remove();
    }

    openBtn.onclick = () => {
      const v = select.value;
      if (v === '') {
        alert('Vui lòng chọn một bài.');
        return;
      }
      const it = items[+v];
      frame.srcdoc = it.content;

      // vào chế độ toàn màn hình
      enterFullscreenMode();
    };

    clearBtn.onclick = () => {
      select.value = '';
      frame.srcdoc = '<p>Chưa chọn bài</p>';
    };

    // allow Enter key to open when select focused
    select.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') openBtn.click();
    });

    // Escape để thoát toàn màn hình
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        exitFullscreenMode();
      }
    });
  </script>
